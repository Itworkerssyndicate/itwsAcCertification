<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle"></title>
    <meta name="description" id="metaDescription" content="" />
    <meta name="keywords" id="metaKeywords" content="" />

    <!-- Open Graph -->
    <meta property="og:title" id="ogTitle" content="" />
    <meta property="og:description" id="ogDescription" content="" />
    <meta property="og:image" id="ogImage" content="" />
    <meta property="og:url" id="ogUrl" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" id="ogSiteName" content="" />
    <meta property="og:locale" content="ar_EG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="twitterTitle" content="" />
    <meta name="twitter:description" id="twitterDescription" content="" />
    <meta name="twitter:image" id="twitterImage" content="" />

    <!-- Icons -->
    <link rel="icon" id="favicon" href="" />
    <link rel="apple-touch-icon" id="appleIcon" href="" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <style>
        /* ============================================================
           التصميم الخرافي لإدارة المستخدمين
           كل حرف من الإعدادات
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.06);
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.12);
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.12);
            --info: #3B82F6;
            --info-bg: rgba(59,130,246,0.12);
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.03);
            --card-bg: rgba(255,255,255,0.04);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 22s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 550px; height: 550px; border-color: rgba(124,58,237,0.04); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 750px; height: 750px; border-color: rgba(59,130,246,0.03); animation-duration: 60s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -150px;
            background: var(--primary-glow);
        }

        .glow-orb:nth-child(2) {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -200px;
            background: var(--accent-glow);
            animation-delay: 6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: headerFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: logoSpin 20s linear infinite;
            box-shadow: 0 0 35px var(--primary-glow);
            position: relative;
            background-size: cover;
            background-position: center;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-box:hover {
            animation-duration: 3s;
            transform: scale(1.08);
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
        }

        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-president {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 14px;
            background: var(--bg-hover);
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-president:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .header-president .president-icon { font-size: 16px; }
        .header-president .president-label { font-size: 11px; color: var(--text-muted); font-weight: 300; }
        .header-president .president-name {
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 25px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 40px var(--primary-glow); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--primary-color); transform: translateY(-3px); }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 4px 25px rgba(16,185,129,0.25);
        }
        .btn-success:hover { transform: translateY(-3px) scale(1.02); }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), #dc2626);
            color: #fff;
            box-shadow: 0 4px 25px rgba(239,68,68,0.25);
        }
        .btn-danger:hover { transform: translateY(-3px) scale(1.02); }

        .btn-sm { padding: 5px 14px; font-size: 12px; }

        .role-badge {
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 20px;
            background: var(--primary-glow);
            color: var(--primary-color);
            font-weight: 600;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover { border-color: var(--primary-color); }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-title .badge {
            font-size: 10px;
            background: var(--primary-glow);
            color: var(--primary-color);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stats-row .stat-mini {
            text-align: center;
            padding: 10px 12px;
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .stats-row .stat-mini:hover {
            background: var(--bg-hover);
            border-color: var(--primary-color);
        }

        .stats-row .stat-mini .num {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1.2;
        }

        .stats-row .stat-mini .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .filter-bar input,
        .filter-bar select {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 150px;
            font-family: inherit;
        }

        .filter-bar input::placeholder {
            color: var(--text-muted);
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .filter-bar select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .filter-bar .btn { flex-shrink: 0; }

        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .table thead {
            border-bottom: 1px solid var(--border);
        }

        .table thead th {
            text-align: right;
            padding: 10px 12px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background: var(--bg-hover);
        }

        .table .user-name {
            font-weight: 600;
            color: var(--text-color);
        }

        .table .user-email {
            font-size: 12px;
            color: var(--text-muted);
        }

        .table .role-badge-table {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .role-badge-table.super_admin {
            background: rgba(139,92,246,0.15);
            color: #8b5cf6;
            border: 1px solid rgba(139,92,246,0.1);
        }

        .role-badge-table.admin {
            background: var(--info-bg);
            color: var(--info);
            border: 1px solid rgba(59,130,246,0.1);
        }

        .table .status-badge {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.active {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.1);
        }

        .status-badge.inactive {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid rgba(239,68,68,0.1);
        }

        .table .actions {
            display: flex;
            gap: 4px;
            flex-wrap: nowrap;
        }

        .table .actions .btn {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 20px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
        }

        .modal::-webkit-scrollbar { width: 4px; }
        .modal::-webkit-scrollbar-track { background: var(--bg-hover); border-radius: 4px; }
        .modal::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal-close {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--error-bg);
            color: var(--error);
            border-color: var(--error);
        }

        .modal-body {
            margin-bottom: 18px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .form-group select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            flex-wrap: wrap;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .modal-footer .btn {
            padding: 10px 24px;
            border-radius: 30px;
        }

        .msg {
            display: none;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }

        .msg.show { display: block; animation: fadeIn 0.3s ease; }
        .msg.error { background: var(--error-bg); border: 1px solid var(--error); color: var(--error); }

                if (logo) {
                    logo.style.backgroundImage = 'url(' + settings.logoUrl + ')';
                    logo.style.backgroundSize = 'cover';
                    logo.style.backgroundPosition = 'center';
                    logo.textContent = '';
                }
            }

            // OG Tags
            const pageTitle = document.getElementById('pageTitle');
            const metaDescription = document.getElementById('metaDescription');
            const ogTitle = document.getElementById('ogTitle');
            const ogDescription = document.getElementById('ogDescription');
            const ogImage = document.getElementById('ogImage');
            const ogUrl = document.getElementById('ogUrl');
            const ogSiteName = document.getElementById('ogSiteName');
            const twitterTitle = document.getElementById('twitterTitle');
            const twitterDescription = document.getElementById('twitterDescription');
            const twitterImage = document.getElementById('twitterImage');
            const favicon = document.getElementById('favicon');
            const appleIcon = document.getElementById('appleIcon');

            if (pageTitle) pageTitle.textContent = settings.pageTitleHeader;
            if (metaDescription) metaDescription.content = 'إدارة المستخدمين - ' + settings.pageTitleHeader;
            if (ogTitle) ogTitle.content = settings.pageTitleHeader;
            if (ogDescription) ogDescription.content = 'إدارة المستخدمين - نظام توثيق الشهادات';
            if (ogUrl) ogUrl.content = window.location.href;
            if (ogSiteName) ogSiteName.content = settings.pageTitleHeader;
            if (twitterTitle) twitterTitle.content = settings.pageTitleHeader;
            if (twitterDescription) twitterDescription.content = 'إدارة المستخدمين - نظام توثيق الشهادات';

            if (settings.logoUrl) {
                if (ogImage) ogImage.content = settings.logoUrl;
                if (twitterImage) twitterImage.content = settings.logoUrl;
                if (favicon) favicon.href = settings.logoUrl;
                if (appleIcon) appleIcon.href = settings.logoUrl;
            }
        }

        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
            if (colors.success) root.style.setProperty('--success', colors.success);
            if (colors.error) root.style.setProperty('--error', colors.error);
            if (colors.warning) root.style.setProperty('--warning', colors.warning);
            if (colors.info) root.style.setProperty('--info', colors.info);
            if (colors.border) root.style.setProperty('--border', colors.border);
            if (colors.cardBg) root.style.setProperty('--card-bg', colors.cardBg);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

        function loadLocalSettings() {
            try {
                const localSettings = localStorage.getItem('userSettings');
                if (localSettings) {
                    const parsed = JSON.parse(localSettings);
                    if (parsed.theme && parsed.theme.colors) {
                        applyColors(parsed.theme.colors);
                    }
                }
            } catch (e) {}
        }

        // ============================================================
        // 4. المصادقة والصلاحيات
        // ============================================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                currentUser = user;
                db.collection('users').doc(user.uid).get()
                    .then(function(doc) {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.role === 'super_admin') {
                                currentUserRole = 'super_admin';
                                const roleBadge = document.getElementById('roleBadge');
                                if (roleBadge) {
                                    roleBadge.textContent = 'سوبر أدمن';
                                    roleBadge.style.background = 'rgba(139,92,246,0.15)';
                                    roleBadge.style.color = '#8b5cf6';
                                }
                                loadUsers();
                                startOnlineTracking();
                            } else {
                                showMsg('غير مصرح بالوصول إلى إدارة المستخدمين', 'error');
                                setTimeout(function() { window.location.href = 'dashboard.html'; }, 2000);
                            }
                        } else {
                            window.location.href = 'login.html';
                        }
                    })
                    .catch(function() {
                        window.location.href = 'login.html';
                    });
            } else {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            auth.signOut().then(function() {
                window.location.href = 'login.html';
            });
        });

        // ============================================================
        // 5. تتبع المستخدمين النشطين
        // ============================================================
        function startOnlineTracking() {
            // تحديث حالة المستخدم الحالي
            if (currentUser) {
                updateUserOnlineStatus(currentUser.uid, true);
            }

            // تحديث كل دقيقة
            setInterval(function() {
                if (currentUser) {
                    updateUserOnlineStatus(currentUser.uid, true);
                }
                updateOnlineStatuses();
            }, 60000);

            // عند إغلاق الصفحة
            window.addEventListener('beforeunload', function() {
                if (currentUser) {
                    updateUserOnlineStatus(currentUser.uid, false);
                }
            });

            updateOnlineStatuses();
        }

        function updateUserOnlineStatus(uid, isOnline) {
            db.collection('users').doc(uid).update({
                isOnline: isOnline,
                lastSeen: isOnline ? null : new Date(),
                lastActive: new Date()
            }).catch(function() {});
        }

        function updateOnlineStatuses() {
            // تحديث حالة المستخدمين في الواجهة
            const now = new Date();
            const fiveMinutesAgo = new Date(now.getTime() - 5 * 60 * 1000);

            users.forEach(function(user) {
                if (user.uid === currentUser?.uid) {
                    // المستخدم الحالي دائماً نشط
                    user.isOnline = true;
                } else if (user.lastActive) {
                    const lastActive = user.lastActive.toDate ? user.lastActive.toDate() : new Date(user.lastActive);
                    user.isOnline = lastActive >= fiveMinutesAgo;
                } else {
                    user.isOnline = false;
                }
            });

            // تحديث الإحصائيات
            const onlineCount = users.filter(function(u) { return u.isOnline === true; }).length;
            document.getElementById('statOnline').textContent = onlineCount;

            // إعادة عرض المستخدمين إذا كان الفلتر الحالي هو "نشط"
            const currentFilter = document.getElementById('statusFilter').value;
            if (currentFilter === 'active') {
                renderUsers(getFilteredUsers());
            }
        }

        // ============================================================
        // 6. تحميل المستخدمين
        // ============================================================
        function loadUsers() {
            const loader = document.getElementById('pageLoader');
            const content = document.getElementById('pageContent');
            if (loader) loader.classList.add('show');
            if (content) content.style.display = 'none';

            db.collection('users')
                .get()
                .then(function(snapshot) {
                    users = [];
                    snapshot.forEach(function(doc) {
                        const data = doc.data();
                        data.uid = doc.id;
                        users.push(data);
                    });

                    // ترتيب حسب تاريخ الإنشاء
                    users.sort(function(a, b) {
                        const dateA = a.createdAt ? (a.createdAt.toDate ? a.createdAt.toDate() : new Date(a.createdAt)) :
                            new Date(0);
                        const dateB = b.createdAt ? (b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt)) :
                            new Date(0);
                        return dateB - dateA;
                    });

                    if (loader) loader.classList.remove('show');
                    if (content) content.style.display = 'block';
                    updateStats();
                    renderUsers();
                    updateOnlineStatuses();
                })
                .catch(function(err) {
                    if (loader) loader.classList.remove('show');
                    if (content) content.style.display = 'block';
                    showMsg('حدث خطأ في تحميل المستخدمين: ' + err.message, 'error');
                });
        }

        // ============================================================
        // 7. تحديث الإحصائيات
        // ============================================================
        function updateStats() {
            const total = users.length;
            const active = users.filter(function(u) { return u.isActive !== false; }).length;
            const admins = users.filter(function(u) { return u.role === 'admin'; }).length;
            const superAdmins = users.filter(function(u) { return u.role === 'super_admin'; }).length;
            const online = users.filter(function(u) { return u.isOnline === true; }).length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statAdmins').textContent = admins;
            document.getElementById('statSuperAdmins').textContent = superAdmins;
            document.getElementById('statOnline').textContent = online;
        }

        // ============================================================
        // 8. عرض المستخدمين
        // ============================================================
        function renderUsers(filteredData) {
            const data = filteredData || users;
            const tbody = document.getElementById('usersBody');
            const emptyState = document.getElementById('emptyState');

            document.getElementById('userCount').textContent = data.length;

            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = data.map(function(user, index) {
                const isCurrentUser = user.uid === currentUser?.uid;
                const roleLabel = user.role === 'super_admin' ? 'سوبر أدمن' : 'أدمن';
                const roleClass = user.role === 'super_admin' ? 'super_admin' : 'admin';

                const isOnline = user.isOnline === true;
                const statusClass = user.isActive !== false ? (isOnline ? 'active' : 'inactive') : 'inactive';
                const statusLabel = user.isActive !== false ? (isOnline ? '🟢 نشط' : '⚪ غير نشط') : '🔴 محذوف';

                const lastSeen = user.lastSeen ? (user.lastSeen.toDate ? user.lastSeen.toDate() : new Date(user.lastSeen)) :
                    null;
                const lastActive = user.lastActive ? (user.lastActive.toDate ? user.lastActive.toDate() : new Date(user
                    .lastActive)) : null;

                let lastDisplay = 'لم يسجل بعد';
                if (isOnline) {
                    lastDisplay = '🟢 متصل الآن';
                } else if (lastSeen) {
                    lastDisplay = lastSeen.toLocaleString('ar-EG');
                } else if (lastActive) {
                    lastDisplay = lastActive.toLocaleString('ar-EG');
                }

                return `
                    <tr>
                        <td data-label="${settings.thNum}"><span style="color:var(--text-muted);font-weight:600;">${index + 1}</span></td>
                        <td data-label="${settings.thUser}">
                            <div class="user-name">${user.displayName || '-'}</div>
                            <div class="user-email">${user.email || '-'}</div>
                        </td>
                        <td data-label="${settings.thRole}">
                            <span class="role-badge-table ${roleClass}">${roleLabel}</span>
                        </td>
                        <td data-label="${settings.thStatus}">
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                        </td>
                        <td data-label="${settings.thLastLogin}" style="font-size:11px;color:var(--text-muted);">
                            ${lastDisplay}
                        </td>
                        <td data-label="${settings.thActions}">
                            <div class="actions">
                                ${!isCurrentUser ? `
                                    <button class="btn btn-success btn-sm" onclick="editUser('${user.uid}')">تعديل</button>
                                    <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${user.uid}')">حذف</button>
                                ` : `
                                    <span style="font-size:10px;color:var(--text-muted);">أنت</span>
                                `}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ============================================================
        // 9. الفلترة
        // ============================================================
        function getFilteredUsers() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const roleFilter = document.getElementById('roleFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            return users.filter(function(user) {
                let match = true;

                if (search) {
                    match = match && (
                        (user.displayName || '').toLowerCase().includes(search) ||
                        (user.email || '').toLowerCase().includes(search) ||
                        (user.role || '').toLowerCase().includes(search) ||
                        (user.phone || '').includes(search)
                    );
                }

                if (roleFilter) {
                    match = match && user.role === roleFilter;
                }

                if (statusFilter === 'active') {
                    match = match && user.isActive !== false;
                } else if (statusFilter === 'inactive') {
                    match = match && user.isActive === false;
                }

                return match;
            });
        }

        function filterUsers() {
            renderUsers(getFilteredUsers());
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('roleFilter').value = '';
            document.getElementById('statusFilter').value = '';
            renderUsers(users);
        }

        // ============================================================
        // 10. فتح مودال الإضافة
        // ============================================================
        function openAddModal() {
            document.getElementById('modalTitle').textContent = settings.modalTitle;
            document.getElementById('editUid').value = '';
            document.getElementById('userForm').reset();
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('userPassword').required = true;
            document.getElementById('userEmail').disabled = false;
            document.getElementById('userModal').classList.add('show');
            editingUid = null;
        }

        // ============================================================
        // 11. تعديل مستخدم
        // ============================================================
        function editUser(uid) {
            const user = users.find(function(u) { return u.uid === uid; });
            if (!user) {
                showMsg('المستخدم غير موجود', 'error');
                return;
            }

            document.getElementById('modalTitle').textContent = 'تعديل مستخدم';
            document.getElementById('editUid').value = uid;
            document.getElementById('userEmail').value = user.email || '';
            document.getElementById('userEmail').disabled = true;
            document.getElementById('userName').value = user.displayName || '';
            document.getElementById('userPhone').value = user.phone || '';
            document.getElementById('userRole').value = user.role || 'admin';
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('userPassword').required = false;

            document.getElementById('userModal').classList.add('show');
            editingUid = uid;
        }

        // ============================================================
        // 12. حفظ المستخدم
        // ============================================================
        function saveUser(e) {
            e.preventDefault();

            const editUid = document.getElementById('editUid').value;
            const email = document.getElementById('userEmail').value.trim();
            const password = document.getElementById('userPassword').value;
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const role = document.getElementById('userRole').value;

            if (!email || !name || !phone) {
                showMsg('الرجاء ملء جميع الحقول المطلوبة', 'info');
                return false;
            }

            if (!editUid && !password) {
                showMsg('الرجاء إدخال كلمة المرور للمستخدم الجديد', 'info');
                return false;
            }

            if (!editUid && password.length < 6) {
                showMsg('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'info');
                return false;
            }

            const userData = {
                displayName: name,
                phone: phone,
                role: role,
                updatedAt: new Date(),
                updatedBy: currentUser?.uid || 'system'
            };

            let savePromise;

            if (editUid) {
                savePromise = db.collection('users').doc(editUid).update(userData);
            } else {
                userData.createdAt = new Date();
                userData.createdBy = currentUser?.uid || 'system';
                userData.isActive = true;
                userData.email = email;
                userData.lastLogin = null;
                userData.isOnline = false;

                savePromise = auth.createUserWithEmailAndPassword(email, password)
                    .then(function(cred) {
                        const uid = cred.user.uid;
                        return db.collection('users').doc(uid).set({
                            uid: uid,
                            ...userData
                        });
                    });
            }

            savePromise.then(function() {
                closeModal();
                showMsg('تم ' + (editUid ? 'تحديث' : 'إضافة') + ' المستخدم بنجاح', 'success');

                db.collection('activities').add({
                    userId: currentUser?.uid || 'system',
                    userEmail: currentUser?.email || 'system',
                    userName: 'سوبر أدمن',
                    userRole: 'super_admin',
                    type: editUid ? 'user_update' : 'user_create',
                    description: (editUid ? 'تحديث' : 'إضافة') + ' مستخدم: ' + email,
                    details: {
                        email: email,
                        role: role,
                        name: name,
                        action: editUid ? 'update' : 'create'
                    },
                    timestamp: new Date(),
                    ipAddress: 'auto',
                    userAgent: navigator.userAgent
                }).catch(function() {});

                loadUsers();
            }).catch(function(err) {
                let msg = 'حدث خطأ: ' + err.message;
                if (err.code === 'auth/email-already-in-use') {
                    msg = 'البريد الإلكتروني مستخدم بالفعل';
                }
                showMsg(msg, 'error');
            });

            return false;
        }

        // ============================================================
        // 13. مودال الحذف
        // ============================================================
        function openDeleteModal(uid) {
            const user = users.find(function(u) { return u.uid === uid; });
            if (!user) {
                showMsg('المستخدم غير موجود', 'error');
                return;
            }

            deleteTargetUid = uid;
            document.getElementById('deleteUserName').textContent = user.displayName || '-';
            document.getElementById('deleteUserEmail').textContent = user.email || '-';
            document.getElementById('deleteReason').value = '';
            document.getElementById('deleteModal').classList.add('show');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            deleteTargetUid = null;
        }

        function confirmDelete() {
            const reason = document.getElementById('deleteReason').value.trim();
            if (!reason) {
                showMsg('الرجاء إدخال سبب الحذف', 'info');
                return;
            }

            if (!deleteTargetUid) {
                showMsg('لم يتم تحديد المستخدم', 'error');
                return;
            }

            const user = users.find(function(u) { return u.uid === deleteTargetUid; });
            if (!user) {
                showMsg('المستخدم غير موجود', 'error');
                return;
            }

            db.collection('users').doc(deleteTargetUid).update({
                isActive: false,
                isOnline: false,
                deletedAt: new Date(),
                deletedBy: currentUser?.uid || 'system',
                deletionReason: reason
            }).then(function() {
                closeDeleteModal();
                showMsg('تم حذف المستخدم بنجاح', 'success');

                db.collection('activities').add({
                    userId: currentUser?.uid || 'system',
                    userEmail: currentUser?.email || 'system',
                    userName: 'سوبر أدمن',
                    userRole: 'super_admin',
                    type: 'user_delete',
                    description: 'حذف مستخدم: ' + (user.email || ''),
                    details: {
                        email: user.email,
                        reason: reason,
                        deletedBy: currentUser?.email || 'system'
                    },
                    timestamp: new Date(),
                    ipAddress: 'auto',
                    userAgent: navigator.userAgent
                }).catch(function() {});

                loadUsers();
            }).catch(function(err) {
                showMsg('حدث خطأ: ' + err.message, 'error');
            });
        }

        // ============================================================
        // 14. إغلاق المودالات
        // ============================================================
        function closeModal() {
            document.getElementById('userModal').classList.remove('show');
            document.getElementById('userEmail').disabled = false;
            document.getElementById('passwordGroup').style.display = 'block';
            editingUid = null;
        }

        document.getElementById('userModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) closeDeleteModal();
        });

        // ============================================================
        // 15. عرض الرسائل
        // ============================================================
        function showMsg(msg, type) {
            const el = document.getElementById('pageMsg');
            if (!el) return;
            el.textContent = msg;
            el.className = 'msg show ' + type;
            setTimeout(function() { el.className = 'msg'; }, 4000);
        }

        // ============================================================
        // 16. تحميل الصفحة
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            console.log('✅ إدارة المستخدمين - كل حرف من الإعدادات');
            console.log('👤 النقيب العام: ' + settings.presidentName);
            console.log('🎨 الألوان من الإعدادات مع دعم المظهر المحلي');
            console.log('🔒 صلاحية السوبر أدمن فقط');
            console.log('🟢 تتبع المستخدمين النشطين في الوقت الفعلي');
            console.log('📊 إحصائيات دقيقة عن المستخدمين');
        });
    </script>
