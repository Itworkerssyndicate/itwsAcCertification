<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle"></title>
    <meta name="description" id="metaDescription" content="" />
    <meta name="keywords" id="metaKeywords" content="" />

    <!-- Open Graph -->
    <meta property="og:title" id="ogTitle" content="" />
    <meta property="og:description" id="ogDescription" content="" />
    <meta property="og:image" id="ogImage" content="" />
    <meta property="og:url" id="ogUrl" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" id="ogSiteName" content="" />
    <meta property="og:locale" content="ar_EG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="twitterTitle" content="" />
    <meta name="twitter:description" id="twitterDescription" content="" />
    <meta name="twitter:image" id="twitterImage" content="" />

    <!-- Icons -->
    <link rel="icon" id="favicon" href="" />
    <link rel="apple-touch-icon" id="appleIcon" href="" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>

    <style>
        /* ============================================================
           التصميم الخرافي لإدارة الأكاديميات - بدون أي نصوص ثابتة
           كل حرف ولون وصورة من الإعدادات
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.06);
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.12);
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.12);
            --info: #3B82F6;
            --info-bg: rgba(59,130,246,0.12);
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.03);
            --card-bg: rgba(255,255,255,0.04);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 22s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 550px; height: 550px; border-color: rgba(124,58,237,0.04); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 750px; height: 750px; border-color: rgba(59,130,246,0.03); animation-duration: 60s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -150px;
            background: var(--primary-glow);
        }

        .glow-orb:nth-child(2) {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -200px;
            background: var(--accent-glow);
            animation-delay: 6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: headerFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 2;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: logoSpin 20s linear infinite;
            box-shadow: 0 0 35px var(--primary-glow);
            position: relative;
            background-size: cover;
            background-position: center;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-box:hover {
            animation-duration: 3s;
            transform: scale(1.08);
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
        }

        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-president {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 14px;
            background: var(--bg-hover);
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-president:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .header-president .president-icon { font-size: 16px; }
        .header-president .president-label { font-size: 11px; color: var(--text-muted); font-weight: 300; }
        .header-president .president-name {
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 25px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 40px var(--primary-glow); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--primary-color); transform: translateY(-3px); }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 4px 25px rgba(16,185,129,0.25);
        }
        .btn-success:hover { transform: translateY(-3px) scale(1.02); }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), #dc2626);
            color: #fff;
            box-shadow: 0 4px 25px rgba(239,68,68,0.25);
        }
        .btn-danger:hover { transform: translateY(-3px) scale(1.02); }

        .btn-ghost {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }

        .btn-sm { padding: 5px 14px; font-size: 12px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover { border-color: var(--primary-color); }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-title .badge {
            font-size: 10px;
            background: var(--primary-glow);
            color: var(--primary-color);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stats-row .stat-mini {
            text-align: center;
            padding: 10px 12px;
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .stats-row .stat-mini:hover {
            background: var(--bg-hover);
            border-color: var(--primary-color);
        }

        .stats-row .stat-mini .num {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1.2;
        }

        .stats-row .stat-mini .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .filters-grid .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filters-grid .filter-group label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .filters-grid .filter-group input,
        .filters-grid .filter-group select {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            width: 100%;
        }

        .filters-grid .filter-group input::placeholder {
            color: var(--text-muted);
        }

        .filters-grid .filter-group input:focus,
        .filters-grid .filter-group select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .filters-grid .filter-group select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .table thead {
            border-bottom: 1px solid var(--border);
        }

        .table thead th {
            text-align: right;
            padding: 12px 14px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background: var(--bg-hover);
        }

        .table .academy-name {
            font-weight: 600;
            color: var(--text-color);
        }

        .table .academy-license {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }

        .table .status-badge {
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.active {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.1);
        }

        .status-badge.inactive {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid rgba(239,68,68,0.1);
        }

        .table .actions {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .table .actions .btn {
            padding: 4px 12px;
            font-size: 11px;
            border-radius: 20px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
        }

        .modal::-webkit-scrollbar { width: 4px; }
        .modal::-webkit-scrollbar-track { background: var(--bg-hover); border-radius: 4px; }
        .modal::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal-close {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--error-bg);
            color: var(--error);
            border-color: var(--error);
        }

        .modal-body {
            margin-bottom: 18px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-group select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .branches-container {
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .branches-container .branch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .branches-container .branch-header h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .branch-item {

        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
            if (colors.success) root.style.setProperty('--success', colors.success);
            if (colors.error) root.style.setProperty('--error', colors.error);
            if (colors.warning) root.style.setProperty('--warning', colors.warning);
            if (colors.info) root.style.setProperty('--info', colors.info);
            if (colors.border) root.style.setProperty('--border', colors.border);
            if (colors.cardBg) root.style.setProperty('--card-bg', colors.cardBg);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);

            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';

        auth.onAuthStateChanged(function(user) {
            if (user) {
                currentUser = user;
                db.collection('users').doc(user.uid).get()
                    .then(function(doc) {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.role === 'super_admin' || data.role === 'admin') {
                                userRole = data.role;
                                loadAcademies();
                            } else {
                                window.location.href = 'home.html';
                            }
                        } else {
                            window.location.href = 'login.html';
                        }
                    })
                    .catch(function() {
                        window.location.href = 'login.html';
                    });
            } else {
                window.location.href = 'login.html';
            }
        });

        // ============================================================
        // 5. تحميل الأكاديميات
        // ============================================================
        function loadAcademies() {
            const loader = document.getElementById('pageLoader');
            const content = document.getElementById('pageContent');
            if (loader) loader.classList.add('show');
            if (content) content.style.display = 'none';

            db.collection('academies')
                .where('isDeleted', '==', false)
                .get()
                .then(function(snapshot) {
                    academies = [];
                    snapshot.forEach(function(doc) {
                        const data = doc.data();
                        data.id = doc.id;
                        academies.push(data);
                    });

                    academies.sort(function(a, b) {
                        return (a.name || '').localeCompare(b.name || '');
                    });

                    if (loader) loader.classList.remove('show');
                    if (content) content.style.display = 'block';
                    populateGovernorates();
                    updateStats();
                    renderAcademies();
                })
                .catch(function(err) {
                    if (loader) loader.classList.remove('show');
                    if (content) content.style.display = 'block';
                    showMsg('حدث خطأ في تحميل الأكاديميات: ' + err.message, 'error');
                });
        }

        // ============================================================
        // 6. تحديث الإحصائيات
        // ============================================================
        function updateStats() {
            const total = academies.length;
            let mainCount = 0;
            let branchesCount = 0;
            const govs = new Set();

            academies.forEach(function(a) {
                if (a.branches && a.branches.length > 0) {
                    mainCount++;
                    branchesCount += a.branches.length;
                    a.branches.forEach(function(b) {
                        if (b.governorate) govs.add(b.governorate);
                    });
                }
            });

            const statTotal = document.getElementById('statTotal');
            const statMain = document.getElementById('statMain');
            const statBranches = document.getElementById('statBranches');
            const statGovs = document.getElementById('statGovernorates');

            if (statTotal) statTotal.textContent = total;
            if (statMain) statMain.textContent = mainCount;
            if (statBranches) statBranches.textContent = branchesCount;
            if (statGovs) statGovs.textContent = govs.size;
        }

        // ============================================================
        // 7. عرض الأكاديميات
        // ============================================================
        function renderAcademies(filteredData) {
            const data = filteredData || academies;
            const tbody = document.getElementById('academiesBody');
            const emptyState = document.getElementById('emptyState');
            const countEl = document.getElementById('academyCount');

            if (countEl) countEl.textContent = data.length;

            if (!tbody) return;

            if (data.length === 0) {
                tbody.innerHTML = '';
                if (emptyState) emptyState.style.display = 'block';
                return;
            }

            if (emptyState) emptyState.style.display = 'none';

            tbody.innerHTML = data.map(function(academy, index) {
                const branchCount = academy.branches ? academy.branches.length : 0;
                const govs = academy.branches ? academy.branches.map(function(b) { return b.governorate; }).filter(
                    function(g) { return g; }) : [];
                const govsStr = govs.length > 0 ? govs.join('، ') : '-';
                const statusHtml = academy.isDeleted ?
                    '<span class="status-badge inactive">محذوفة</span>' :
                    '<span class="status-badge active">نشطة</span>';

                return `
                    <tr>
                        <td data-label="${settings.thNum}"><span style="color:var(--text-muted);font-weight:600;">${index + 1}</span></td>
                        <td data-label="${settings.thName}">
                            <div class="academy-name">${academy.name || '-'}</div>
                            <div style="font-size:11px;color:var(--text-dim);">${academy.licenseNumber || '-'}</div>
                        </td>
                        <td data-label="${settings.thLicense}">
                            <span class="academy-license">${academy.licenseNumber || '-'}</span>
                        </td>
                        <td data-label="${settings.thBranches}">${branchCount}</td>
                        <td data-label="${settings.thGovernorates}" style="font-size:12px;">${govsStr}</td>
                        <td data-label="${settings.thStatus}">${statusHtml}</td>
                        <td data-label="${settings.thActions}">
                            <div class="actions">
                                <button class="btn btn-primary btn-sm" onclick="editAcademy('${academy.id}')">${settings.thActions}</button>
                                <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${academy.id}')">${settings.deleteTitle}</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ============================================================
        // 8. الفلاتر
        // ============================================================
        function populateGovernorates() {
            const select = document.getElementById('filterGovernorate');
            if (!select) return;

            select.innerHTML = '<option value="">' + settings.filterAllOption + '</option>';
            const govs = new Set();
            academies.forEach(function(a) {
                if (a.branches) {
                    a.branches.forEach(function(b) {
                        if (b.governorate) govs.add(b.governorate);
                    });
                }
            });
            govs.forEach(function(g) {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                select.appendChild(opt);
            });
        }

        function applyFilters() {
            const nameFilter = document.getElementById('filterName')?.value.trim().toLowerCase() || '';
            const licenseFilter = document.getElementById('filterLicense')?.value.trim().toLowerCase() || '';
            const govFilter = document.getElementById('filterGovernorate')?.value || '';

            const filtered = academies.filter(function(academy) {
                let match = true;

                if (nameFilter) {
                    match = match && (academy.name || '').toLowerCase().includes(nameFilter);
                }

                if (licenseFilter) {
                    match = match && (academy.licenseNumber || '').toLowerCase().includes(licenseFilter);
                }

                if (govFilter) {
                    let hasGov = false;
                    if (academy.branches) {
                        for (var i = 0; i < academy.branches.length; i++) {
                            if (academy.branches[i].governorate === govFilter) {
                                hasGov = true;
                                break;
                            }
                        }
                    }
                    match = match && hasGov;
                }

                return match;
            });

            renderAcademies(filtered);
        }

        function resetFilters() {
            const nameInput = document.getElementById('filterName');
            const licenseInput = document.getElementById('filterLicense');
            const govSelect = document.getElementById('filterGovernorate');

            if (nameInput) nameInput.value = '';
            if (licenseInput) licenseInput.value = '';
            if (govSelect) govSelect.value = '';
            renderAcademies();
        }

            badge.className = 'branch-main-badge';
            badge.textContent = isMain ? 'الفرع الرئيسي' : 'فرع ' + branchCounter;
            div.appendChild(badge);

            const grid = document.createElement('div');
            grid.className = 'branch-grid';

            govGroup.className = 'form-group';
            const govLabel = document.createElement('label');
            govLabel.textContent = 'المحافظة *';
            const govSelect = document.createElement('select');
            govSelect.className = 'branch-governorate';
            govSelect.required = true;
            const govOptions = [
                '', 'القاهرة', 'الإسكندرية', 'الجيزة', 'القليوبية', 'الشرقية',
                'الدقهلية', 'المنوفية', 'الغربية', 'كفر الشيخ', 'دمياط',
                'بورسعيد', 'الإسماعيلية', 'السويس', 'شمال سيناء', 'جنوب سيناء',
                'البحر الأحمر', 'الأقصر', 'أسوان', 'أسيوط', 'سوهاج',
                'قنا', 'المنيا', 'بني سويف', 'الفيوم', 'مطروح', 'الوادي الجديد',
                'حلوان', 'العاشر من رمضان'
            ];
            govOptions.forEach(function(opt) {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt || 'اختر المحافظة';
                govSelect.appendChild(option);
            });
            govGroup.appendChild(govLabel);
            govGroup.appendChild(govSelect);
            grid.appendChild(govGroup);

            // العنوان
            const addrGroup = document.createElement('div');
            addrGroup.className = 'form-group';
            const addrLabel = document.createElement('label');
            addrLabel.textContent = 'العنوان *';
            const addrInput = document.createElement('input');
            addrInput.type = 'text';
            addrInput.className = 'branch-address';
            addrInput.placeholder = 'العنوان';
            addrInput.required = true;
            addrGroup.appendChild(addrLabel);
            addrGroup.appendChild(addrInput);
            grid.appendChild(addrGroup);

            // الهاتف
            const phoneGroup = document.createElement('div');
            phoneGroup.className = 'form-group';
            const phoneLabel = document.createElement('label');
            phoneLabel.textContent = 'رقم الهاتف *';
            const phoneInput = document.createElement('input');
            phoneInput.type = 'text';
            phoneInput.className = 'branch-phone';
            phoneInput.placeholder = 'رقم الهاتف';
            phoneInput.required = true;
            phoneGroup.appendChild(phoneLabel);
            phoneGroup.appendChild(phoneInput);
            grid.appendChild(phoneGroup);

            div.appendChild(grid);

            if (!isMain) {
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'branch-remove';
                removeBtn.textContent = '✕';
                removeBtn.onclick = function() { removeBranch(div.id); };
                div.appendChild(removeBtn);
            }

            branchCounter++;
            return div;

        function initializeBranches() {
            const container = document.getElementById('branchesContainer');
            if (!container) return;

            container.innerHTML = '';
            const mainBranch = getBranchTemplate(true);
            container.appendChild(mainBranch);
        }

        function addBranchField() {
            const container = document.getElementById('branchesContainer');
            if (!container) return;

            const newBranch = getBranchTemplate(false);
            container.appendChild(newBranch);
        }

        function removeBranch(id) {
            const element = document.getElementById(id);
            if (element) {
                const branches = document.querySelectorAll('.branch-item');
                if (branches.length > 1) {
                    element.remove();
                } else {
                    showMsg('يجب أن يكون هناك فرع رئيسي واحد على الأقل', 'info');
                }
            }
        }

        function getBranchesData() {
            const items = document.querySelectorAll('.branch-item');
            const branches = [];

            items.forEach(function(item, index) {
                const gov = item.querySelector('.branch-governorate')?.value || '';
                const address = item.querySelector('.branch-address')?.value.trim() || '';
                const phone = item.querySelector('.branch-phone')?.value.trim() || '';

                if (gov && address && phone) {
                    branches.push({
                        branchId: 'branch_' + (index + 1),
                        governorate: gov,
                        address: address,
                        phone: phone,
                        isMainBranch: index === 0
                    });
                }
            });

            return branches;
        }

        // ============================================================
        // 10. فتح مودال الإضافة
        // ============================================================
        function openAddModal() {
            const titleEl = document.getElementById('modalTitle');
            const editIdEl = document.getElementById('editId');
            const formEl = document.getElementById('academyForm');

            if (titleEl) titleEl.textContent = settings.modalTitle;
            if (editIdEl) editIdEl.value = '';
            if (formEl) formEl.reset();
            initializeBranches();

            const modal = document.getElementById('academyModal');
            if (modal) modal.classList.add('show');
        }

        // ============================================================
        // 11. تعديل أكاديمية
        // ============================================================
        function editAcademy(id) {
            const academy = academies.find(function(a) { return a.id === id; });
            if (!academy) {
                showMsg('الأكاديمية غير موجودة', 'error');
                return;
            }

            const titleEl = document.getElementById('modalTitle');
            const editIdEl = document.getElementById('editId');
            const nameEl = document.getElementById('academyName');
            const licenseEl = document.getElementById('academyLicense');
            const taxEl = document.getElementById('academyTax');

            if (titleEl) titleEl.textContent = 'تعديل أكاديمية';
            if (editIdEl) editIdEl.value = id;
            if (nameEl) nameEl.value = academy.name || '';
            if (licenseEl) licenseEl.value = academy.licenseNumber || '';
            if (taxEl) taxEl.value = academy.taxNumber || '';

            const container = document.getElementById('branchesContainer');
            if (container) {
                container.innerHTML = '';
                const branches = academy.branches || [];
                if (branches.length === 0) {
                    initializeBranches();
                } else {
                    branches.forEach(function(branch, index) {
                        const isMain = index === 0;
                        const div = getBranchTemplate(isMain);
                        const govSelect = div.querySelector('.branch-governorate');
                        const addrInput = div.querySelector('.branch-address');
                        const phoneInput = div.querySelector('.branch-phone');

                        if (govSelect) govSelect.value = branch.governorate || '';
                        if (addrInput) addrInput.value = branch.address || '';
                        if (phoneInput) phoneInput.value = branch.phone || '';
                        container.appendChild(div);
                    });
                }
            }

            const modal = document.getElementById('academyModal');
            if (modal) modal.classList.add('show');
        }

        // ============================================================
        // 12. حفظ الأكاديمية
        // ============================================================
        function saveAcademy(e) {
            e.preventDefault();

            const editId = document.getElementById('editId')?.value || '';
            const name = document.getElementById('academyName')?.value.trim() || '';
            const licenseNumber = document.getElementById('academyLicense')?.value.trim() || '';
            const taxNumber = document.getElementById('academyTax')?.value.trim() || '';

            if (!name || !licenseNumber || !taxNumber) {
                showMsg('الرجاء ملء جميع الحقول المطلوبة', 'info');
                return false;
            }

            const branches = getBranchesData();
            if (branches.length === 0) {
                showMsg('يجب إضافة فرع واحد على الأقل', 'info');
                return false;
            }

            const academyData = {
                name: name,
                licenseNumber: licenseNumber,
                taxNumber: taxNumber,
                branches: branches,
                updatedAt: new Date(),
                updatedBy: currentUser ? currentUser.uid : 'system'
            };

            let savePromise;
            let actionType;

            if (editId) {
                savePromise = db.collection('academies').doc(editId).update(academyData);
                actionType = 'update';
                db.collection('activities').add({
                    userId: currentUser ? currentUser.uid : 'system',
                    userEmail: currentUser ? currentUser.email : 'system',
                    userName: 'أدمن',
                    userRole: userRole || 'admin',
                    type: 'update_academy',
                    description: 'تعديل أكاديمية: ' + name,
                    timestamp: new Date(),
                    ipAddress: 'auto',
                    userAgent: navigator.userAgent
                }).catch(function() {});
            } else {
                academyData.createdAt = new Date();
                academyData.createdBy = currentUser ? currentUser.uid : 'system';
                academyData.isDeleted = false;
                savePromise = db.collection('academies').add(academyData);
                actionType = 'create';
                db.collection('activities').add({
                    userId: currentUser ? currentUser.uid : 'system',
                    userEmail: currentUser ? currentUser.email : 'system',
                    userName: 'أدمن',
                    userRole: userRole || 'admin',
                    type: 'create_academy',
                    description: 'إضافة أكاديمية: ' + name,
                    timestamp: new Date(),
                    ipAddress: 'auto',
                    userAgent: navigator.userAgent
                }).catch(function() {});
            }

            savePromise.then(function() {
                closeModal();
                showMsg('تم ' + (actionType === 'update' ? 'تحديث' : 'إضافة') + ' الأكاديمية بنجاح', 'success');
                loadAcademies();
            }).catch(function(err) {
                showMsg('حدث خطأ: ' + err.message, 'error');
            });

            return false;
        }

        // ============================================================
        // 13. مودال الحذف
        // ============================================================
        function openDeleteModal(id) {
            const academy = academies.find(function(a) { return a.id === id; });
            if (!academy) {
                showMsg('الأكاديمية غير موجودة', 'error');
                return;
            }

            deleteTargetId = id;
            const nameEl = document.getElementById('deleteAcademyName');
            const licenseEl = document.getElementById('deleteAcademyLicense');
            const reasonEl = document.getElementById('deleteReason');

            if (nameEl) nameEl.textContent = academy.name || '-';
            if (licenseEl) licenseEl.textContent = academy.licenseNumber || '-';
            if (reasonEl) reasonEl.value = '';

            const modal = document.getElementById('deleteModal');
            if (modal) modal.classList.add('show');
        }

        function closeDeleteModal() {
            const modal = document.getElementById('deleteModal');
            if (modal) modal.classList.remove('show');
            deleteTargetId = null;
        }

        function confirmDelete() {
            const reason = document.getElementById('deleteReason')?.value.trim() || '';
            if (!reason) {
                showMsg('الرجاء إدخال سبب الحذف', 'info');
                return;
            }

            if (!deleteTargetId) {
                showMsg('لم يتم تحديد الأكاديمية', 'error');
                return;
            }

            const academy = academies.find(function(a) { return a.id === deleteTargetId; });
            if (!academy) {
                showMsg('الأكاديمية غير موجودة', 'error');
                return;
            }

            db.collection('academies').doc(deleteTargetId).update({
                isDeleted: true,
                deletedAt: new Date(),
                deletedBy: currentUser ? currentUser.uid : 'system',
                deletionReason: reason
            }).then(function() {
                closeDeleteModal();
                showMsg('تم حذف الأكاديمية بنجاح', 'success');
                db.collection('activities').add({
                    userId: currentUser ? currentUser.uid : 'system',
                    userEmail: currentUser ? currentUser.email : 'system',
                    userName: 'أدمن',
                    userRole: userRole || 'admin',
                    type: 'delete_academy',
                    description: 'حذف أكاديمية: ' + (academy.name || ''),
                    details: { reason: reason, academyId: deleteTargetId },
                    timestamp: new Date(),
                    ipAddress: 'auto',
                    userAgent: navigator.userAgent
                }).catch(function() {});
                loadAcademies();
            }).catch(function(err) {
                showMsg('حدث خطأ: ' + err.message, 'error');
            });
        }

        // ============================================================
        // 14. إغلاق المودالات
        // ============================================================
        function closeModal() {
            const modal = document.getElementById('academyModal');
            if (modal) modal.classList.remove('show');
        }

        document.getElementById('academyModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('deleteModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeDeleteModal();
        });

        // ============================================================
        // 15. عرض الرسائل
        // ============================================================
        function showMsg(msg, type) {
            const el = document.getElementById('pageMsg');
            if (!el) return;

            el.textContent = msg;
            el.className = 'msg show ' + type;
            setTimeout(function() { el.className = 'msg'; }, 4000);
        }

        // ============================================================
        // 16. تصدير نتائج البحث كـ PDF
        // ============================================================
        function exportSearchResultsPDF() {
            const tbody = document.getElementById('academiesBody');
            if (!tbody) return;

            const rows = tbody.querySelectorAll('tr');

            if (rows.length === 0) {
                showMsg('لا توجد بيانات لطباعتها', 'info');
                return;
            }

            const data = [];
            rows.forEach(function(row, index) {
                const cells = row.querySelectorAll('td');
                if (cells.length > 0) {
                    data.push({
                        num: index + 1,
                        name: cells[1]?.textContent.trim() || '-',
                        license: cells[2]?.textContent.trim() || '-',
                        branches: cells[3]?.textContent.trim() || '-',
                        governorates: cells[4]?.textContent.trim() || '-',
                        status: cells[5]?.textContent.trim() || '-'
                    });
                }
            });

            const total = data.length;
            const now = new Date();
            const dateStr = now.toLocaleDateString('ar-EG');

            const logoHtml = settings.logoUrl ?
                `<img src="${settings.logoUrl}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid var(--primary-color);" />` :
                '<div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--primary-color),var(--accent-color));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;">ن.ت</div>';

            let tableRows = '';
            data.forEach(function(item) {
                tableRows += `
                    <tr>
                        <td>${item.num}</td>
                        <td>${item.name}</td>
                        <td>${item.license}</td>
                        <td>${item.branches}</td>
                        <td>${item.governorates}</td>
                        <td>${item.status}</td>
                    </tr>
                `;
            });

            const html = `
                <div style="width:780px;padding:30px 35px;background:#ffffff;color:#1a1a2e;font-family:'Cairo','Segoe UI','Tahoma',sans-serif;direction:rtl;border:3px solid var(--primary-color);border-radius:16px;box-shadow:0 20px 40px rgba(0,0,0,0.1);margin:0 auto;">
                    <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--primary-color);padding-bottom:14px;margin-bottom:16px;">
                        <div style="display:flex;align-items:center;gap:14px;">
                            ${logoHtml}
                            <div>
                                <h1 style="font-size:18px;font-weight:800;color:var(--primary-color);margin:0;">${settings.pageTitleHeader || 'نقابة تكنولوجيا المعلومات'}</h1>
                                <p style="font-size:11px;color:#666;margin:1px 0 0;">${settings.committeeName}</p>
                            </div>
                        </div>
                        <div style="text-align:left;font-size:12px;color:#666;">
                            <div>التاريخ: ${dateStr}</div>
                        </div>
                    </div>

                    <div style="text-align:center;font-size:22px;font-weight:800;color:var(--primary-color);margin:6px 0 2px;">${settings.academiesListTitle || 'تقرير الأكاديميات'}</div>
                    <div style="text-align:center;font-size:12px;color:#666;margin-bottom:14px;">قائمة الأكاديميات المعتمدة في النظام</div>

                    <div style="display:flex;justify-content:center;gap:20px;margin:8px 0 12px;font-size:12px;color:#666;flex-wrap:wrap;">
                        <span style="background:#f0f4ff;padding:4px 14px;border-radius:20px;">إجمالي الأكاديميات: ${total}</span>
                        <span style="background:#f0f4ff;padding:4px 14px;border-radius:20px;">التاريخ: ${dateStr}</span>
                    </div>

                    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;">
                        <thead>
                            <tr>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thNum || '#'}</th>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thName || 'اسم الأكاديمية'}</th>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thLicense || 'الرقم الاعتمادي'}</th>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thBranches || 'الفروع'}</th>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thGovernorates || 'المحافظات'}</th>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thStatus || 'الحالة'}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>

                    <div style="text-align:center;margin-top:14px;padding-top:10px;border-top:1px solid #eee;font-size:10px;color:#999;">
                        <div>تم إنشاء هذا التقرير بواسطة نظام نقابة تكنولوجيا المعلومات</div>
                        <div style="margin-top:6px;font-size:12px;color:var(--primary-color);font-weight:700;">${settings.presidentLabel}: ${settings.presidentName}</div>
                        <div style="font-size:9px;color:#aaa;margin-top:4px;">${settings.footerText} | الإصدار 1.0</div>
                    </div>
                </div>
            `;

            const container = document.getElementById('print-container');
            if (!container) return;

            container.innerHTML = html;

            const element = container.firstElementChild;

            const opt = {
                margin: 10,
                filename: 'تقرير_الأكاديميات_' + now.toISOString().split('T')[0] + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save()
                .then(function() {
                    container.innerHTML = '';
                    showMsg('تم تصدير التقرير بنجاح', 'success');
                })
                .catch(function(err) {
                    showMsg('حدث خطأ في تصدير التقرير: ' + err.message, 'error');
                    container.innerHTML = '';
                });
        }

        // ============================================================
        // 17. تحميل الصفحة
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            console.log('✅ إدارة الأكاديميات - كل حرف من الإعدادات');
            console.log('👤 النقيب العام: ' + settings.presidentName);
            console.log('🎨 الألوان من الإعدادات');
            console.log('🏛️ إدارة الأكاديميات متطورة');
        });
    </script>

</body>
</html>
