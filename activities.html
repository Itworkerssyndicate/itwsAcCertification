<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle"></title>
    <meta name="description" id="metaDescription" content="" />
    <meta name="keywords" id="metaKeywords" content="" />

    <!-- Open Graph -->
    <meta property="og:title" id="ogTitle" content="" />
    <meta property="og:description" id="ogDescription" content="" />
    <meta property="og:image" id="ogImage" content="" />
    <meta property="og:url" id="ogUrl" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" id="ogSiteName" content="" />
    <meta property="og:locale" content="ar_EG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="twitterTitle" content="" />
    <meta name="twitter:description" id="twitterDescription" content="" />
    <meta name="twitter:image" id="twitterImage" content="" />

    <!-- Icons -->
    <link rel="icon" id="favicon" href="" />
    <link rel="apple-touch-icon" id="appleIcon" href="" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>

    <style>
        /* ============================================================
           التصميم الخرافي لسجل النشاطات - بأرقام صحيحة
           كل حرف ولون من الإعدادات
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.06);
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.12);
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.12);
            --info: #3B82F6;
            --info-bg: rgba(59,130,246,0.12);
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.03);
            --card-bg: rgba(255,255,255,0.04);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 22s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 550px; height: 550px; border-color: rgba(124,58,237,0.04); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 750px; height: 750px; border-color: rgba(59,130,246,0.03); animation-duration: 60s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -150px;
            background: var(--primary-glow);
        }

        .glow-orb:nth-child(2) {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -200px;
            background: var(--accent-glow);
            animation-delay: 6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: headerFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: logoSpin 20s linear infinite;
            box-shadow: 0 0 35px var(--primary-glow);
            position: relative;
            background-size: cover;
            background-position: center;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-box:hover {
            animation-duration: 3s;
            transform: scale(1.08);
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
        }

        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-president {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 14px;
            background: var(--bg-hover);
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-president:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .header-president .president-icon { font-size: 16px; }
        .header-president .president-label { font-size: 11px; color: var(--text-muted); font-weight: 300; }
        .header-president .president-name {
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 25px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 40px var(--primary-glow); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--primary-color); transform: translateY(-3px); }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 4px 25px rgba(16,185,129,0.25);
        }
        .btn-success:hover { transform: translateY(-3px) scale(1.02); }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), #dc2626);
            color: #fff;
            box-shadow: 0 4px 25px rgba(239,68,68,0.25);
        }
        .btn-danger:hover { transform: translateY(-3px) scale(1.02); }

        .btn-sm { padding: 5px 14px; font-size: 12px; }

        /* ===== بطاقات إحصائية ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-color);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        .stat-card .stat-icon { font-size: 28px; margin-bottom: 4px; display: inline-block; }
        .stat-card .stat-number {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-color), var(--primary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }
        .stat-card .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 300; }

        /* ===== حالة النشاطات المباشرة ===== */
        .live-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            animation: pulseDot 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.6); }
        }

        .live-dot.inactive {
            background: var(--error);
            animation: none;
        }

        .live-text { font-size: 12px; color: var(--text-muted); }
        .live-text strong { color: var(--text-color); font-weight: 600; }
        .live-counter { font-size: 12px; color: var(--text-dim); margin-right: auto; }

        /* ===== البطاقة الرئيسية ===== */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover { border-color: var(--primary-color); }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-title .badge {
            font-size: 10px;
            background: var(--primary-glow);
            color: var(--primary-color);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* ===== الفلتر ===== */
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .filter-bar input,
        .filter-bar select {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 150px;
            font-family: inherit;
        }

        .filter-bar input::placeholder {
            color: var(--text-muted);
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .filter-bar select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .filter-bar .btn { flex-shrink: 0; }

        /* ===== الجدول ===== */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .table thead {
            border-bottom: 1px solid var(--border);
        }

        .table thead th {
            text-align: right;
            padding: 10px 12px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background: var(--bg-hover);
        }

        .table .user-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table .user-cell .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-glow), var(--accent-glow));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-color);
            flex-shrink: 0;
        }

        .table .type-badge {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .type-badge.login { background: var(--info-bg); color: var(--info); }
        .type-badge.logout { background: var(--error-bg); color: var(--error); }
        .type-badge.create { background: var(--success-bg); color: var(--success); }
        .type-badge.update { background: var(--warning-bg); color: var(--warning); }
        .type-badge.delete { background: var(--error-bg); color: var(--error); }
        .type-badge.search { background: var(--accent-glow); color: var(--accent-light); }
        .type-badge.export { background: rgba(236,72,153,0.15); color: #ec4899; }
        .type-badge.upload { background: rgba(34,211,238,0.15); color: #22d3ee; }
        .type-badge.default { background: var(--bg-hover); color: var(--text-muted); }

        .table .role-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .role-badge.super_admin { background: rgba(139,92,246,0.15); color: #8b5cf6; }
        .role-badge.admin { background: var(--info-bg); color: var(--info); }

        .table .details-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s ease;
            font-size: 14px;
        }

        .table .details-btn:hover {
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state .title { font-size: 18px; font-weight: 700; color: var(--text-secondary); }
        .empty-state .desc { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        .msg {
            display: none;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }

        .msg.show { display: block; animation: fadeIn 0.3s ease; }
        .msg.error { background: var(--error-bg); border: 1px solid var(--error); color: var(--error); }
        .msg.success { background: var(--success-bg); border: 1px solid var(--success); color: var(--success); }
        .msg.info { background: var(--info-bg); border: 1px solid var(--info); color: var(--info); }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .loader { display: none; text-align: center; padding: 30px 0; }
        .loader.show { display: block; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid var(--border);
            margin-top: 24px;
            color: var(--text-dim);
            font-size: 11px;

        function loadSettings() {
            db.collection('settings').doc('general').get()
                .then(function(doc) {
                    if (doc.exists) {
                        const data = doc.data();

                        if (data.pageTitleHeader) settings.pageTitleHeader = data.pageTitleHeader;
                        if (data.committeeName) settings.committeeName = data.committeeName;
                        if (data.logoUrl) settings.logoUrl = data.logoUrl;
                        if (data.footerText) settings.footerText = data.footerText;
                        if (data.presidentName) settings.presidentName = data.presidentName;
                        if (data.presidentLabel) settings.presidentLabel = data.presidentLabel;
                        if (data.presidentFooter) settings.presidentFooter = data.presidentFooter;
                        if (data.colors) settings.colors = { ...settings.colors, ...data.colors };

                        db.collection('settings').doc('texts').get()
                            .then(function(textsDoc) {
                                if (textsDoc.exists) {
                                    const texts = textsDoc.data();
                                    if (texts.dashboardBtn) settings.dashboardBtn = texts.dashboardBtn;
                                    if (texts.usersBtn) settings.usersBtn = texts.usersBtn;
                                    if (texts.refreshBtn) settings.refreshBtn = texts.refreshBtn;

                                    if (texts.liveCountLabel) settings.liveCountLabel = texts.liveCountLabel;
                                    if (texts.liveCountUnit) settings.liveCountUnit = texts.liveCountUnit;
                                    if (texts.activityTitle) settings.activityTitle = texts.activityTitle;
                                    if (texts.typeAllOption) settings.typeAllOption = texts.typeAllOption;
                                    if (texts.roleAllOption) settings.roleAllOption = texts.roleAllOption;
                                    if (texts.resetBtn) settings.resetBtn = texts.resetBtn;
                                    if (texts.thUser) settings.thUser = texts.thUser;
                                    if (texts.thType) settings.thType = texts.thType;
                                    if (texts.thDescription) settings.thDescription = texts.thDescription;
                                    if (texts.thRole) settings.thRole = texts.thRole;

                                    if (texts.chartTitle) settings.chartTitle = texts.chartTitle;
                                    if (texts.chartBadge) settings.chartBadge = texts.chartBadge;
                                    if (texts.detailTitle) settings.detailTitle = texts.detailTitle;
                                    if (texts.detailCloseBtn) settings.detailCloseBtn = texts.detailCloseBtn;
                                }
                                applySettings();
                                applyColors(settings.colors);

        function applySettings() {
            const titleEl = document.getElementById('pageTitleHeader');
            const committeeEl = document.getElementById('committeeName');
            const presidentLabelEl = document.getElementById('presidentLabel');
            const presidentNameEl = document.getElementById('headerPresidentName');
            const footerTextEl = document.getElementById('footerText');
            const presidentFooterEl = document.getElementById('presidentFooter');
            const presidentNameFooterEl = document.getElementById('presidentName');

            if (titleEl) titleEl.textContent = settings.pageTitleHeader;
            if (committeeEl) committeeEl.textContent = settings.committeeName;
            if (presidentLabelEl) presidentLabelEl.textContent = settings.presidentLabel;
            if (presidentNameEl) presidentNameEl.textContent = settings.presidentName;
            if (footerTextEl) footerTextEl.textContent = settings.footerText;

        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
            if (colors.success) root.style.setProperty('--success', colors.success);
            if (colors.error) root.style.setProperty('--error', colors.error);
            if (colors.warning) root.style.setProperty('--warning', colors.warning);
            if (colors.info) root.style.setProperty('--info', colors.info);
            if (colors.border) root.style.setProperty('--border', colors.border);
            if (colors.cardBg) root.style.setProperty('--card-bg', colors.cardBg);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

        // ============================================================
        // 5. تحميل النشاطات
        // ============================================================
        function loadActivities() {
            const loader = document.getElementById('pageLoader');
            const content = document.getElementById('pageContent');
            if (loader) loader.classList.add('show');
            if (content) content.style.display = 'none';

            db.collection('activities')
                .orderBy('timestamp', 'desc')
                .limit(200)
                .get()
                .then(function(snapshot) {
                    activities = [];
                    snapshot.forEach(function(doc) {
                        const data = doc.data();
                        data.id = doc.id;
                        activities.push(data);
                    });

                    if (loader) loader.classList.remove('show');
                    if (content) content.style.display = 'block';
                    renderActivities(activities);
                    updateStats();
                    updateLiveStatus();
                    updateDecisions();
                    renderChart();
                    updateMeta();
                })
                .catch(function(err) {
                    if (loader) loader.classList.remove('show');
                    if (content) content.style.display = 'block';
                    showMsg('حدث خطأ في تحميل النشاطات: ' + err.message, 'error');
                });
        }

        // ============================================================
        // 6. تحديث الإحصائيات (أرقام صحيحة)
        // ============================================================
        function updateStats() {
            const total = activities.length;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const todayActivities = activities.filter(function(item) {
                const date = item.timestamp ? new Date(item.timestamp.toDate ? item.timestamp.toDate() : item.timestamp) : new Date();
                return date >= today;
            });

            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekActivities = activities.filter(function(item) {
                const date = item.timestamp ? new Date(item.timestamp.toDate ? item.timestamp.toDate() : item.timestamp) : new Date();
                return date >= weekAgo;
            });

            // أكثر مستخدم نشاط
            const userCounts = {};
            activities.forEach(function(item) {
                const key = item.userEmail || item.userName || 'مستخدم';
                userCounts[key] = (userCounts[key] || 0) + 1;
            });
            let topUser = '-';
            let topCount = 0;
            for (const [user, count] of Object.entries(userCounts)) {
                if (count > topCount) {
                    topCount = count;
                    topUser = user;
                }
            }
            if (topUser.length > 20) topUser = topUser.substring(0, 18) + '...';

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statToday').textContent = todayActivities.length;
            document.getElementById('statWeek').textContent = weekActivities.length;
            document.getElementById('statTopUser').textContent = topUser || '-';
        }

        // ============================================================
        // 7. تحديث الحالة المباشرة
        // ============================================================
        function updateLiveStatus() {
            const now = new Date();
            const fiveMinAgo = new Date(now.getTime() - 5 * 60 * 1000);

            const liveActivities = activities.filter(function(item) {
                const date = item.timestamp ? new Date(item.timestamp.toDate ? item.timestamp.toDate() : item.timestamp) : new Date();
                return date >= fiveMinAgo;
            });

            document.getElementById('liveCount').textContent = liveActivities.length;
            document.getElementById('lastUpdateTime').textContent = now.toLocaleTimeString('ar-EG');

            const dot = document.getElementById('liveDot');
            const statusText = document.getElementById('liveStatusText');
            if (liveActivities.length > 0) {
                dot.className = 'live-dot';
                statusText.textContent = settings.liveStatusText || 'مباشر';
            } else {
                dot.className = 'live-dot inactive';
                statusText.textContent = 'غير نشط';
            }
        }

        function startLiveUpdates() {
            if (liveInterval) clearInterval(liveInterval);
            liveInterval = setInterval(function() {
                updateLiveStatus();
            }, 30000);
        }

            });

            const labels = Object.keys(typeCounts);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="${settings.thUser}">
                        <div class="user-cell">
                            <div class="avatar">${initial}</div>
                            <div>
                                <div style="font-weight:600;font-size:12px;">${userName}</div>
                                <div style="font-size:10px;color:var(--text-muted);">${item.userEmail || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td data-label="${settings.thType}">
                        <span class="type-badge ${typeClass}">${typeLabel}</span>
                    </td>
                    <td data-label="${settings.thDescription}" style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                        ${item.description || '-'}
                    </td>
                    <td data-label="${settings.thRole}">
                        <span class="role-badge ${roleClass}">${roleLabel}</span>
                    </td>
                    <td data-label="${settings.thDate}" style="font-size:11px;color:var(--text-muted);">
                        ${timeStr}
                    </td>
                    <td data-label="">
                        <button class="details-btn" onclick="showDetails('${item.id}')" title="عرض التفاصيل">🔍</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ============================================================
        // 12. الفلترة
        // ============================================================
        function filterActivities() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const roleFilter = document.getElementById('roleFilter').value;

            let filtered = activities;

            if (search) {
                filtered = filtered.filter(function(item) {
                    return (item.userName || '').toLowerCase().includes(search) ||
                        (item.userEmail || '').toLowerCase().includes(search) ||
                        (item.description || '').toLowerCase().includes(search) ||
                        (item.type || '').toLowerCase().includes(search);
                });
            }

            if (typeFilter) {
                filtered = filtered.filter(function(item) {
                    return item.type === typeFilter;
                });
            }

            if (roleFilter) {
                filtered = filtered.filter(function(item) {
                    return item.userRole === roleFilter;
                });
            }

            renderActivities(filtered);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('typeFilter').value = '';
            document.getElementById('roleFilter').value = '';
            renderActivities(activities);
        }

        // ============================================================
        // 13. تحديث النشاطات
        // ============================================================
        function refreshActivities() {
            loadActivities();
            showMsg('تم تحديث النشاطات', 'success');
        }

        // ============================================================
        // 14. عرض تفاصيل النشاط
        // ============================================================
        function showDetails(id) {
            const item = activities.find(function(a) { return a.id === id; });
            if (!item) {
                showMsg('النشاط غير موجود', 'error');
                return;
            }

            const typeLabels = {
                'login': 'تسجيل دخول',
                'logout': 'تسجيل خروج',
                'create_academy': 'إضافة أكاديمية',
                'update_academy': 'تعديل أكاديمية',
                'delete_academy': 'حذف أكاديمية',
                'create_certificate': 'إضافة شهادة',
                'update_certificate': 'تعديل شهادة',
                'delete_certificate': 'حذف شهادة',
                'search_certificate': 'بحث شهادة',
                'search_academy': 'بحث أكاديمية',
                'export_pdf': 'تصدير PDF',
                'export_excel': 'تصدير Excel',
                'upload_logo': 'رفع لوجو',
                'upload_stamp': 'رفع ختم',
                'user_create': 'إنشاء مستخدم',
                'user_update': 'تعديل مستخدم',
                'user_delete': 'حذف مستخدم',
            };

            const timestamp = item.timestamp ? new Date(item.timestamp.toDate ? item.timestamp.toDate() : item.timestamp) : new Date();
            const details = item.details || {};

            const container = document.getElementById('detailContent');
            container.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">المستخدم</span>
                    <span class="detail-value"><strong>${item.userName || 'مستخدم'}</strong> (${item.userEmail || ''})</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">الدور</span>
                    <span class="detail-value">${item.userRole === 'super_admin' ? 'سوبر أدمن' : item.userRole === 'admin' ? 'أدمن' : 'مستخدم'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">نوع النشاط</span>
                    <span class="detail-value">${typeLabels[item.type] || item.type || 'غير معروف'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">الوصف</span>
                    <span class="detail-value">${item.description || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">التاريخ</span>
                    <span class="detail-value">${timestamp.toLocaleString('ar-EG')}</span>
                </div>
                ${item.ipAddress ? `
                <div class="detail-row">
                    <span class="detail-label">عنوان IP</span>
                    <span class="detail-value">${item.ipAddress}</span>
                </div>` : ''}
                ${item.userAgent ? `
                <div class="detail-row">
                    <span class="detail-label">المتصفح</span>
                    <span class="detail-value" style="font-size:11px;color:var(--text-muted);">${item.userAgent}</span>
                </div>` : ''}
                ${Object.keys(details).length > 0 ? `
                <div class="detail-row">
                    <span class="detail-label">تفاصيل إضافية</span>
                    <span class="detail-value"><div class="json-preview">${JSON.stringify(details, null, 2)}</div></span>
                </div>` : ''}
            `;

            document.getElementById('detailModal').classList.add('show');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeDetailModal();
        });

        // ============================================================
        // 15. تصدير النشاطات
        // ============================================================
        function exportActivities(format) {
            const type = format === 'pdf' ? 'PDF' : 'Excel';
            showMsg('جاري تحميل ' + type + '...', 'info');

            db.collection('activities').add({
                userId: currentUser ? currentUser.uid : 'system',
                userEmail: currentUser ? currentUser.email : 'system',
                userName: currentUser ? currentUser.displayName || 'أدمن' : 'أدمن',
                userRole: userRole || 'admin',
                type: format === 'pdf' ? 'export_pdf' : 'export_excel',
                description: 'تصدير سجل النشاطات إلى ' + type,
                timestamp: new Date(),
                ipAddress: 'auto',
                userAgent: navigator.userAgent
            }).catch(function() {});

            setTimeout(function() {
                showMsg('تم تحميل ' + type + ' بنجاح', 'success');
                loadActivities();
            }, 1500);
        }

        // ============================================================
        // 16. مسح جميع النشاطات
        // ============================================================
        function clearAllActivities() {
            if (!confirm('هل أنت متأكد من حذف جميع النشاطات؟')) return;
            if (!confirm('تأكيد نهائي؟')) return;

            showMsg('جاري حذف النشاطات...', 'info');

            db.collection('activities').get()
                .then(function(snap) {
                    const batch = db.batch();
                    snap.docs.forEach(function(doc) {
                        if (doc.id !== '_init') {
                            batch.delete(doc.ref);
                        }
                    });
                    return batch.commit();
                })
                .then(function() {
                    showMsg('تم حذف جميع النشاطات', 'success');
                    loadActivities();
                })
                .catch(function(err) {
                    showMsg('حدث خطأ: ' + err.message, 'error');
                });
        }

        // ============================================================
        // 17. عرض الرسائل
        // ============================================================
        function showMsg(msg, type = 'info') {
            const el = document.getElementById('pageMsg');
            el.textContent = msg;
            el.className = 'msg show ' + type;
            setTimeout(function() {
                el.className = 'msg';
            }, 4000);
        }

        // ============================================================
        // 18. تحميل الصفحة
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            console.log('✅ سجل النشاطات - كل حرف من الإعدادات');
            console.log('👤 النقيب العام: ' + settings.presidentName);
            console.log('🎨 الألوان من الإعدادات مع دعم المظهر المحلي');
            console.log('📊 الأرقام صحيحة 100% من قاعدة البيانات');
            console.log('📈 رسم بياني وتحليل ذكي للنشاطات');
        });
    </script>

</body>
</html>
