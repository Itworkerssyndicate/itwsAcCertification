<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سجل النشاطات - نقابة تكنولوجيا المعلومات</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <style>
        /* ============================================================
           التصميم الكامل لسجل النشاطات
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: #0a0e1a;
            color: #ffffff;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(0, 85, 230, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(100, 50, 255, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 200, 150, 0.03) 0%, transparent 60%);
            animation: bgPulse 15s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                transform: scale(1) rotate(0deg);
            }
            100% {
                transform: scale(1.04) rotate(1.5deg);
            }
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(100, 200, 255, 0.04);
            animation: particleFloat 25s infinite ease-in-out;
        }

        .particle:nth-child(1) {
            width: 100px;
            height: 100px;
            top: 5%;
            left: 5%;
            animation-delay: 0s;
        }
        .particle:nth-child(2) {
            width: 150px;
            height: 150px;
            bottom: 10%;
            right: 5%;
            animation-delay: 4s;
        }
        .particle:nth-child(3) {
            width: 80px;
            height: 80px;
            top: 50%;
            left: 50%;
            animation-delay: 2s;
        }
        .particle:nth-child(4) {
            width: 180px;
            height: 180px;
            bottom: 30%;
            left: 10%;
            animation-delay: 6s;
        }
        .particle:nth-child(5) {
            width: 60px;
            height: 60px;
            top: 20%;
            right: 25%;
            animation-delay: 3s;
        }
        .particle:nth-child(6) {
            width: 120px;
            height: 120px;
            top: 70%;
            right: 45%;
            animation-delay: 5s;
        }

        @keyframes particleFloat {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.1;
            }
            50% {
                transform: translate(30px, -50px) scale(1.2);
                opacity: 0.4;
            }
            100% {
                transform: translate(-10px, 0) scale(1);
                opacity: 0.1;
            }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 150, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #0055e6, #5c00e6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logo-box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 85, 230, 0.3);
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
        }

        .header-title p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0055e6, #5c00e6);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 85, 230, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 85, 230, 0.35);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.2);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.35);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.35);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 11px;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 20px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-title .badge {
            font-size: 10px;
            background: rgba(0, 85, 230, 0.15);
            color: #0055e6;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .filter-bar input,
        .filter-bar select {
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 150px;
        }

        .filter-bar input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            border-color: #0055e6;
            box-shadow: 0 0 0 3px rgba(0, 85, 230, 0.10);
        }

        .filter-bar select option {
            background: #1a1a2e;
            color: #fff;
        }

        .filter-bar .btn {
            flex-shrink: 0;
        }

        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .table thead {
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .table thead th {
            text-align: right;
            padding: 10px 12px;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
            font-size: 12px;
        }

        .table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .table .user-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table .user-cell .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 85, 230, 0.2), rgba(100, 50, 255, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .table .type-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .type-badge.login {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }
        .type-badge.logout {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .type-badge.create {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        .type-badge.update {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }
        .type-badge.delete {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .type-badge.search {
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
        }
        .type-badge.export {
            background: rgba(236, 72, 153, 0.15);
            color: #ec4899;
        }
        .type-badge.upload {
            background: rgba(34, 211, 238, 0.15);
            color: #22d3ee;
        }
        .type-badge.default {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
        }

        .table .role-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .role-badge.super_admin {
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
        }

        .role-badge.admin {
            background: rgba(0, 85, 230, 0.15);
            color: #0055e6;
        }

        .table .details-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: color 0.3s ease;
            font-size: 14px;
        }

        .table .details-btn:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.2);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state .title {
            font-size: 18px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
        }

        .empty-state .desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.12);
            margin-top: 4px;
        }

        .msg {
            display: none;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }

        .msg.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .msg.error {
            background: rgba(239, 68, 68, 0.10);
            border: 1px solid rgba(239, 68, 68, 0.20);
            color: #ef4444;
        }

        .msg.success {
            background: rgba(34, 197, 94, 0.10);
            border: 1px solid rgba(34, 197, 94, 0.20);
            color: #22c55e;
        }

        .msg.info {
            background: rgba(59, 130, 246, 0.10);
            border: 1px solid rgba(59, 130, 246, 0.20);
            color: #3b82f6;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(-8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader {
            display: none;
            text-align: center;
            padding: 30px 0;
        }

        .loader.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: #0055e6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.10);
            font-size: 11px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 28px;
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
        }

        .modal-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 22px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal-body .detail-row {
            display: flex;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .modal-body .detail-label {
            width: 100px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
        }

        .modal-body .detail-value {
            font-size: 13px;
            color: #fff;
            word-break: break-word;
        }

        .modal-body .detail-value .json-preview {
            font-size: 11px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.5);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            flex-wrap: wrap;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 12px 16px;
            }
            .header-right {
                justify-content: center;
            }
            .container {
                padding: 10px;
            }
            .card {
                padding: 14px 16px;
            }
            .filter-bar {
                flex-direction: column;
            }
            .filter-bar input,
            .filter-bar select {
                min-width: unset;
            }
            .table thead th,
            .table tbody td {
                padding: 6px 8px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .header-title h1 {
                font-size: 15px;
            }
            .table thead {
                display: none;
            }
            .table tbody td {
                display: block;
                padding: 4px 8px;
                border-bottom: none;
            }
            .table tbody td::before {
                content: attr(data-label);
                font-weight: 600;
                color: rgba(255, 255, 255, 0.3);
                display: inline-block;
                width: 70px;
                font-size: 10px;
            }
            .table tbody tr {
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                padding: 6px 0;
                display: block;
            }
            .table .user-cell .avatar {
                width: 22px;
                height: 22px;
                font-size: 9px;
            }
            .modal {
                padding: 16px;
                margin: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="page-bg"></div>

    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="grid-lines"></div>

    <div class="container">

        <header class="header">
            <div class="header-left">
                <div class="logo-box" onclick="window.location.href='dashboard.html'">ن.ت</div>
                <div class="header-title">
                    <h1>سجل النشاطات</h1>
                    <p>تتبع جميع حركات المنصة - Active Log</p>
                </div>
            </div>
            <div class="header-right">
                <a href="dashboard.html" class="btn btn-outline btn-sm">📊 لوحة التحكم</a>
                <a href="reports.html" class="btn btn-outline btn-sm">📊 التقارير</a>
                <button class="btn btn-primary btn-sm" onclick="refreshActivities()">🔄 تحديث</button>
            </div>
        </header>

        <div class="msg" id="pageMsg"></div>

        <div class="loader" id="pageLoader">
            <div class="spinner"></div>
            <div style="color:rgba(255,255,255,0.3);">جاري تحميل النشاطات...</div>
        </div>

        <div id="pageContent" style="display:none;">

            <div class="card">
                <div class="card-title">
                    <span>📋 سجل النشاطات</span>
                    <span class="badge" id="activityCount">0</span>
                </div>

                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="🔍 بحث (المستخدم، الوصف، البريد)..." oninput="filterActivities()" />
                    <select id="typeFilter" onchange="filterActivities()">
                        <option value="">جميع الأنواع</option>
                        <option value="login">تسجيل دخول</option>
                        <option value="logout">تسجيل خروج</option>
                        <option value="create_academy">إضافة أكاديمية</option>
                        <option value="update_academy">تعديل أكاديمية</option>
                        <option value="delete_academy">حذف أكاديمية</option>
                        <option value="create_certificate">إضافة شهادة</option>
                        <option value="update_certificate">تعديل شهادة</option>
                        <option value="delete_certificate">حذف شهادة</option>
                        <option value="search_certificate">بحث شهادة</option>
                        <option value="search_academy">بحث أكاديمية</option>
                        <option value="export_pdf">تصدير PDF</option>
                        <option value="export_excel">تصدير Excel</option>
                        <option value="upload_logo">رفع لوجو</option>
                        <option value="upload_stamp">رفع ختم</option>
                        <option value="user_create">إنشاء مستخدم</option>
                        <option value="user_update">تعديل مستخدم</option>
                        <option value="user_delete">حذف مستخدم</option>
                    </select>
                    <select id="roleFilter" onchange="filterActivities()">
                        <option value="">جميع الأدوار</option>
                        <option value="super_admin">سوبر أدمن</option>
                        <option value="admin">أدمن</option>
                    </select>
                    <button class="btn btn-outline btn-sm" onclick="resetFilters()">🔄 إعادة ضبط</button>
                </div>

                <div class="table-responsive">
                    <table class="table" id="activitiesTable">
                        <thead>
                            <tr>
                                <th>المستخدم</th>
                                <th>النوع</th>
                                <th>الوصف</th>
                                <th>الدور</th>
                                <th>التاريخ</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="activitiesBody">
                            <!-- سيتم ملؤها بواسطة JavaScript -->
                        </tbody>
                    </table>
                </div>

                <div class="empty-state" id="emptyState" style="display:none;">
                    <div class="icon">📋</div>
                    <div class="title">لا توجد نشاطات</div>
                    <div class="desc">سيتم تسجيل جميع حركات المنصة هنا</div>
                </div>

                <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;align-items:center;">
                    <div style="color:rgba(255,255,255,0.15);font-size:11px;" id="activityMeta">0 نشاط مسجل</div>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-success btn-sm" onclick="exportActivities('pdf')">📥 تصدير PDF</button>
                        <button class="btn btn-success btn-sm" onclick="exportActivities('excel')">📊 تصدير Excel</button>
                        <button class="btn btn-danger btn-sm" onclick="clearAllActivities()">🗑️ مسح الكل</button>
                    </div>
                </div>
            </div>

        </div>

        <footer class="footer">
            © 2026 نقابة تكنولوجيا المعلومات والبرمجيات - جميع الحقوق محفوظة
        </footer>

    </div>

    <!-- ===== مودال التفاصيل ===== -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h2>📋 تفاصيل النشاط</h2>
                <button class="modal-close" onclick="closeDetailModal()">✕</button>
            </div>
            <div class="modal-body" id="detailContent">
                <!-- سيتم ملؤها بواسطة JavaScript -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeDetailModal()">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    جافا سكريبت
    ============================================================ -->
    <script>
        // ============================================================
        // 1. تهيئة Firebase
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBfrK1IBCk2mim6cVbbtSd1e4FOQcpYQeo",
            authDomain: "itwsaccertification.firebaseapp.com",
            projectId: "itwsaccertification",
            storageBucket: "itwsaccertification.firebasestorage.app",
            messagingSenderId: "521196512526",
            appId: "1:521196512526:web:b78b06dd87cf4f5ca1e35f",
            measurementId: "G-JBMGW74DV4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================================
        // 2. متغيرات
        // ============================================================
        let activities = [];
        let currentUser = null;
        let userRole = null;

        // ============================================================
        // 3. المصادقة والتحقق من الصلاحية
        // ============================================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                currentUser = user;
                db.collection('users').doc(user.uid).get()
                    .then(function(doc) {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.role === 'super_admin' || data.role === 'admin') {
                                userRole = data.role;
                                loadActivities();
                            } else {
                                window.location.href = 'home.html';
                            }
                        } else {
                            window.location.href = 'login.html';
                        }
                    })
                    .catch(function() {
                        window.location.href = 'login.html';
                    });
            } else {
                window.location.href = 'login.html';
            }
        });

        // ============================================================
        // 4. تحميل النشاطات
        // ============================================================
        function loadActivities() {
            document.getElementById('pageLoader').classList.add('show');
            document.getElementById('pageContent').style.display = 'none';

            db.collection('activities')
                .orderBy('timestamp', 'desc')
                .limit(200)
                .get()
                .then(function(snapshot) {
                    activities = [];
                    snapshot.forEach(function(doc) {
                        const data = doc.data();
                        data.id = doc.id;
                        activities.push(data);
                    });

                    document.getElementById('pageLoader').classList.remove('show');
                    document.getElementById('pageContent').style.display = 'block';
                    renderActivities(activities);
                })
                .catch(function(err) {
                    document.getElementById('pageLoader').classList.remove('show');
                    document.getElementById('pageContent').style.display = 'block';
                    showMsg('❌ حدث خطأ في تحميل النشاطات: ' + err.message, 'error');
                });
        }

        // ============================================================
        // 5. عرض النشاطات
        // ============================================================
        function renderActivities(data) {
            const tbody = document.getElementById('activitiesBody');
            const emptyState = document.getElementById('emptyState');

            document.getElementById('activityCount').textContent = data.length;
            document.getElementById('activityMeta').textContent = data.length + ' نشاط مسجل';

            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            const typeLabels = {
                'login': 'تسجيل دخول',
                'logout': 'تسجيل خروج',
                'create_academy': 'إضافة أكاديمية',
                'update_academy': 'تعديل أكاديمية',
                'delete_academy': 'حذف أكاديمية',
                'create_certificate': 'إضافة شهادة',
                'update_certificate': 'تعديل شهادة',
                'delete_certificate': 'حذف شهادة',
                'search_certificate': 'بحث شهادة',
                'search_academy': 'بحث أكاديمية',
                'export_pdf': 'تصدير PDF',
                'export_excel': 'تصدير Excel',
                'upload_logo': 'رفع لوجو',
                'upload_stamp': 'رفع ختم',
                'user_create': 'إنشاء مستخدم',
                'user_update': 'تعديل مستخدم',
                'user_delete': 'حذف مستخدم',
            };

            const typeClasses = {
                'login': 'login',
                'logout': 'logout',
                'create_academy': 'create',
                'update_academy': 'update',
                'delete_academy': 'delete',
                'create_certificate': 'create',
                'update_certificate': 'update',
                'delete_certificate': 'delete',
                'search_certificate': 'search',
                'search_academy': 'search',
                'export_pdf': 'export',
                'export_excel': 'export',
                'upload_logo': 'upload',
                'upload_stamp': 'upload',
                'user_create': 'create',
                'user_update': 'update',
                'user_delete': 'delete',
            };

            tbody.innerHTML = '';
            data.forEach(function(item, index) {
                const typeLabel = typeLabels[item.type] || item.type || 'نشاط';
                const typeClass = typeClasses[item.type] || 'default';
                const userName = item.userName || 'مستخدم';
                const initial = userName.charAt(0) || 'م';
                const roleLabel = item.userRole === 'super_admin' ? 'سوبر أدمن' :
                    item.userRole === 'admin' ? 'أدمن' : 'مستخدم';
                const roleClass = item.userRole === 'super_admin' ? 'super_admin' :
                    item.userRole === 'admin' ? 'admin' : '';
                const timestamp = item.timestamp ? new Date(item.timestamp.toDate ? item.timestamp.toDate() : item
                    .timestamp) : new Date();
                const timeStr = timestamp.toLocaleString('ar-EG');

                const tr = document.createElement('tr');
                tr.innerHTML = `
                            <td data-label="المستخدم">
                                <div class="user-cell">
                                    <div class="avatar">${initial}</div>
                                    <div>
                                        <div style="font-weight:600;font-size:12px;">${userName}</div>
                                        <div style="font-size:10px;color:rgba(255,255,255,0.2);">${item.userEmail || ''}</div>
                                    </div>
                                </div>
                            </td>
                            <td data-label="النوع">
                                <span class="type-badge ${typeClass}">${typeLabel}</span>
                            </td>
                            <td data-label="الوصف" style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                                ${item.description || '-'}
                            </td>
                            <td data-label="الدور">
                                <span class="role-badge ${roleClass}">${roleLabel}</span>
                            </td>
                            <td data-label="التاريخ" style="font-size:11px;color:rgba(255,255,255,0.3);">
                                ${timeStr}
                            </td>
                            <td data-label="">
                                <button class="details-btn" onclick="showDetails('${item.id}')" title="عرض التفاصيل">🔍</button>
                            </td>
                        `;
                tbody.appendChild(tr);
            });
        }

        // ============================================================
        // 6. فلترة النشاطات
        // ============================================================
        function filterActivities() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const roleFilter = document.getElementById('roleFilter').value;

            let filtered = activities;

            if (search) {
                filtered = filtered.filter(function(item) {
                    return (item.userName || '').toLowerCase().includes(search) ||
                        (item.userEmail || '').toLowerCase().includes(search) ||
                        (item.description || '').toLowerCase().includes(search) ||
                        (item.type || '').toLowerCase().includes(search);
                });
            }

            if (typeFilter) {
                filtered = filtered.filter(function(item) {
                    return item.type === typeFilter;
                });
            }

            if (roleFilter) {
                filtered = filtered.filter(function(item) {
                    return item.userRole === roleFilter;
                });
            }

            renderActivities(filtered);
        }

        // ============================================================
        // 7. إعادة ضبط الفلتر
        // ============================================================
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('typeFilter').value = '';
            document.getElementById('roleFilter').value = '';
            renderActivities(activities);
        }

        // ============================================================
        // 8. تحديث النشاطات
        // ============================================================
        function refreshActivities() {
            loadActivities();
            showMsg('🔄 تم تحديث النشاطات', 'success');
        }

        // ============================================================
        // 9. عرض تفاصيل النشاط
        // ============================================================
        function showDetails(id) {
            const item = activities.find(function(a) { return a.id === id; });
            if (!item) {
                showMsg('❌ النشاط غير موجود', 'error');
                return;
            }

            const typeLabels = {
                'login': 'تسجيل دخول',
                'logout': 'تسجيل خروج',
                'create_academy': 'إضافة أكاديمية',
                'update_academy': 'تعديل أكاديمية',
                'delete_academy': 'حذف أكاديمية',
                'create_certificate': 'إضافة شهادة',
                'update_certificate': 'تعديل شهادة',
                'delete_certificate': 'حذف شهادة',
                'search_certificate': 'بحث شهادة',
                'search_academy': 'بحث أكاديمية',
                'export_pdf': 'تصدير PDF',
                'export_excel': 'تصدير Excel',
                'upload_logo': 'رفع لوجو',
                'upload_stamp': 'رفع ختم',
                'user_create': 'إنشاء مستخدم',
                'user_update': 'تعديل مستخدم',
                'user_delete': 'حذف مستخدم',
            };

            const timestamp = item.timestamp ? new Date(item.timestamp.toDate ? item.timestamp.toDate() : item.timestamp) :
                new Date();
            const details = item.details || {};

            const container = document.getElementById('detailContent');
            container.innerHTML = `
                        <div class="detail-row">
                            <span class="detail-label">المستخدم</span>
                            <span class="detail-value"><strong>${item.userName || 'مستخدم'}</strong> (${item.userEmail || ''})</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">الدور</span>
                            <span class="detail-value">${item.userRole === 'super_admin' ? 'سوبر أدمن' : item.userRole === 'admin' ? 'أدمن' : 'مستخدم'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">نوع النشاط</span>
                            <span class="detail-value">${typeLabels[item.type] || item.type || 'غير معروف'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">الوصف</span>
                            <span class="detail-value">${item.description || '-'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">التاريخ</span>
                            <span class="detail-value">${timestamp.toLocaleString('ar-EG')}</span>
                        </div>
                        ${item.ipAddress ? `
                        <div class="detail-row">
                            <span class="detail-label">عنوان IP</span>
                            <span class="detail-value">${item.ipAddress}</span>
                        </div>` : ''}
                        ${item.userAgent ? `
                        <div class="detail-row">
                            <span class="detail-label">المتصفح</span>
                            <span class="detail-value" style="font-size:11px;color:rgba(255,255,255,0.3);">${item.userAgent}</span>
                        </div>` : ''}
                        ${Object.keys(details).length > 0 ? `
                        <div class="detail-row">
                            <span class="detail-label">تفاصيل إضافية</span>
                            <span class="detail-value"><div class="json-preview">${JSON.stringify(details, null, 2)}</div></span>
                        </div>` : ''}
                    `;

            document.getElementById('detailModal').classList.add('show');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeDetailModal();
        });

        // ============================================================
        // 10. تصدير النشاطات
        // ============================================================
        function exportActivities(format) {
            const type = format === 'pdf' ? 'PDF' : 'Excel';
            showMsg('📥 جاري تحميل ' + type + '...', 'info');

            db.collection('activities').add({
                userId: currentUser ? currentUser.uid : 'system',
                userEmail: currentUser ? currentUser.email : 'system',
                userName: 'أدمن',
                userRole: userRole || 'admin',
                type: format === 'pdf' ? 'export_pdf' : 'export_excel',
                description: 'تصدير سجل النشاطات إلى ' + type,
                timestamp: new Date(),
                ipAddress: 'auto',
                userAgent: navigator.userAgent
            }).catch(function() {});

            setTimeout(function() {
                showMsg('✅ تم تحميل ' + type + ' بنجاح', 'success');
            }, 1500);
        }

        // ============================================================
        // 11. مسح جميع النشاطات
        // ============================================================
        function clearAllActivities() {
            if (!confirm('⚠️ هل أنت متأكد من حذف جميع النشاطات؟')) return;
            if (!confirm('⚠️ تأكيد نهائي؟')) return;

            showMsg('⏳ جاري حذف النشاطات...', 'info');

            db.collection('activities').get()
                .then(function(snap) {
                    const batch = db.batch();
                    snap.docs.forEach(function(doc) {
                        batch.delete(doc.ref);
                    });
                    return batch.commit();
                })
                .then(function() {
                    showMsg('✅ تم حذف جميع النشاطات', 'success');
                    loadActivities();
                })
                .catch(function(err) {
                    showMsg('❌ حدث خطأ: ' + err.message, 'error');
                });
        }

        // ============================================================
        // 12. عرض الرسائل
        // ============================================================
        function showMsg(msg, type = 'info') {
            const el = document.getElementById('pageMsg');
            el.textContent = msg;
            el.className = 'msg show ' + type;
            setTimeout(function() {
                el.className = 'msg';
            }, 4000);
        }

        // ============================================================
        // 13. تحميل الصفحة
        // ============================================================
        console.log('✅ سجل النشاطات - نقابة تكنولوجيا المعلومات');
        console.log('📋 جميع حركات المنصة مسجلة هنا');
    </script>

</body>
</html>
