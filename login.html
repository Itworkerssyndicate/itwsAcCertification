<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.5s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --text-color: #FFFFFF;
            --text-muted: rgba(255,255,255,0.4);
            --text-secondary: rgba(255,255,255,0.7);
            --success: #10B981;
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --border: rgba(255,255,255,0.06);
        }

        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 18s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 8px; height: 8px; top: 10%; left: 10%; animation-delay: 0s; background: var(--primary-color); opacity: 0.25; }
        .particle:nth-child(2) { width: 12px; height: 12px; top: 25%; left: 40%; animation-delay: 2s; background: var(--accent-color); opacity: 0.2; }
        .particle:nth-child(3) { width: 6px; height: 6px; top: 40%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.35; }
        .particle:nth-child(4) { width: 10px; height: 10px; top: 55%; left: 20%; animation-delay: 1.5s; background: var(--accent-color); opacity: 0.2; }
        .particle:nth-child(5) { width: 7px; height: 7px; top: 70%; left: 80%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 14px; height: 14px; top: 85%; left: 30%; animation-delay: 5s; background: var(--accent-color); opacity: 0.15; }
        .particle:nth-child(7) { width: 5px; height: 5px; top: 15%; left: 90%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 9px; height: 9px; top: 50%; left: 60%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.2; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            25% { transform: translate(30px, -40px) scale(1.2); opacity: 0.6; }
            50% { transform: translate(-20px, -60px) scale(0.8); opacity: 0.3; }
            75% { transform: translate(40px, -30px) scale(1.3); opacity: 0.7; }
        }

        .rings {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: spin 35s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 500px; height: 500px; border-color: rgba(124,58,237,0.04); animation-duration: 45s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 650px; height: 650px; border-color: rgba(59,130,246,0.03); animation-duration: 55s; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 40px 45px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow);
            animation: fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 50px var(--primary-glow);
            background-size: cover;
            background-position: center;
            transition: all 0.5s ease;
        }

        .login-title {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--text-color) 0%, var(--primary-color) 40%, var(--accent-light) 70%, var(--text-color) 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titleFlow 5s ease-in-out infinite;
        }

        @keyframes titleFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 30px var(--primary-glow);
            background: rgba(255,255,255,0.06);
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: inherit;
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 400px; height: 400px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 30px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 50px var(--primary-glow); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--primary-color); transform: translateY(-2px); }

        .login-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-footer a:hover {
            color: var(--accent-light);
            text-decoration: underline;
        }

        .msg {
            display: none;
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            margin-bottom: 12px;
            text-align: center;
            font-size: 13px;
        }

        .msg.show { display: block; animation: fadeIn 0.3s ease; }
        .msg.error { background: var(--error-bg); border: 1px solid var(--error); color: var(--error); }
        .msg.success { background: rgba(16,185,129,0.12); border: 1px solid var(--success); color: var(--success); }
        .msg.info { background: rgba(59,130,246,0.12); border: 1px solid #3B82F6; color: #3B82F6; }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .login-divider span {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .login-version {
            text-align: center;
            margin-top: 12px;
            font-size: 10px;
            color: var(--text-muted);
            opacity: 0.3;
        }

        @media (max-width: 480px) {
            .login-card { padding: 24px 20px; }
            .login-logo { width: 64px; height: 64px; font-size: 26px; }
            .login-title { font-size: 20px; }
            .btn { font-size: 14px; padding: 10px 16px; }
        }
    </style>
</head>
<body>

    <div class="login-bg"></div>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo" id="loginLogo">ن.ت</div>
            <h1 class="login-title" id="loginTitle">نقابة تكنولوجيا المعلومات والبرمجيات</h1>
            <p class="login-subtitle" id="loginSubtitle">تسجيل الدخول إلى النظام الرسمي</p>

            <div class="msg" id="loginMsg"></div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label id="emailLabel">البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="example@domain.com" required />
                </div>
                <div class="form-group">
                    <label id="passwordLabel">كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span id="loginBtnText">تسجيل الدخول</span>
                </button>
            </form>

            <div class="login-divider">
                <span>أو</span>
            </div>

            <button class="btn btn-outline" id="backHomeBtn" onclick="window.location.href='index.html'">
                <span id="backHomeText">العودة إلى الصفحة الرئيسية</span>
            </button>

            <div class="login-footer">
                <span id="loginFooterText">ليس لديك حساب؟</span>
                <a href="#" id="contactSupport">تواصل مع الدعم الفني</a>
            </div>

            <div class="login-version" id="loginVersion">v2.0</div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. تهيئة Firebase
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBfrK1IBCk2mim6cVbbtSd1e4FOQcpYQeo",
            authDomain: "itwsaccertification.firebaseapp.com",
            projectId: "itwsaccertification",
            storageBucket: "itwsaccertification.firebasestorage.app",
            messagingSenderId: "521196512526",
            appId: "1:521196512526:web:b78b06dd87cf4f5ca1e35f",
            measurementId: "G-JBMGW74DV4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================================
        // 2. متغيرات
        // ============================================================
        let settings = {
            unionName: 'نقابة تكنولوجيا المعلومات والبرمجيات',
            logoUrl: '',
            colors: {
                primary: '#C9A84C',
                accent: '#7C3AED',
                background: '#0A0E1A',
                text: '#FFFFFF',
                textMuted: 'rgba(255,255,255,0.4)',
                textSecondary: 'rgba(255,255,255,0.7)',
                border: 'rgba(255,255,255,0.06)',
            }
        };

        let isReady = false;

        // ============================================================
        // 3. جلب الإعدادات (onSnapshot للتحديث الفوري)
        // ============================================================
        function loadSettings() {
            let loadedCount = 0;
            const totalDocs = 2;

            function checkReady() {
                loadedCount++;
                if (loadedCount >= totalDocs && !isReady) {
                    isReady = true;
                    document.querySelector('.login-card').style.display = 'block';
                    console.log('تم تحميل إعدادات تسجيل الدخول');
                }
            }

            // إخفاء البطاقة مؤقتاً
            document.querySelector('.login-card').style.display = 'none';

            db.collection('settings').doc('general').onSnapshot(function(doc) {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.unionName) settings.unionName = data.unionName;
                    if (data.logoUrl) settings.logoUrl = data.logoUrl;
                    if (data.colors) settings.colors = { ...settings.colors, ...data.colors };
                }
                applySettings();
                applyColors(settings.colors);
                if (!isReady) checkReady();
                console.log('تحديث فوري: الإعدادات العامة (Login)');
            }, function(error) {
                console.warn('خطأ في الاستماع للإعدادات العامة:', error);
                if (!isReady) checkReady();
            });

            db.collection('settings').doc('design').onSnapshot(function(doc) {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.colors) {
                        settings.colors = { ...settings.colors, ...data.colors };
                    }
                }
                applyColors(settings.colors);
                if (!isReady) checkReady();
                console.log('تحديث فوري: التصميم (Login)');
            }, function(error) {
                console.warn('خطأ في الاستماع للتصميم:', error);
                if (!isReady) checkReady();
            });
        }

        // ============================================================
        // 4. تطبيق الإعدادات
        // ============================================================
        function applySettings() {
            const titleEl = document.getElementById('loginTitle');
            const logoEl = document.getElementById('loginLogo');

            if (titleEl) titleEl.textContent = settings.unionName;

            if (settings.logoUrl) {
                if (logoEl) {
                    logoEl.style.backgroundImage = 'url(' + settings.logoUrl + ')';
                    logoEl.style.backgroundSize = 'cover';
                    logoEl.style.backgroundPosition = 'center';
                    logoEl.textContent = '';
                }
            } else {
                if (logoEl) {
                    logoEl.style.backgroundImage = '';
                    logoEl.textContent = 'ن.ت';
                }
            }

            // ===== عنوان الصفحة =====
            const pageTitle = document.getElementById('pageTitle');
            if (pageTitle) {
                pageTitle.textContent = 'نقابة تكنولوجيا المعلومات والبرمجيات - تسجيل الدخول';
            }

            // ===== OG Tags =====
            const ogTitle = document.getElementById('ogTitle');
            const ogDescription = document.getElementById('ogDescription');
            const ogImage = document.getElementById('ogImage');
            const ogUrl = document.getElementById('ogUrl');
            const ogSiteName = document.getElementById('ogSiteName');
            const twitterTitle = document.getElementById('twitterTitle');
            const twitterDescription = document.getElementById('twitterDescription');
            const twitterImage = document.getElementById('twitterImage');
            const favicon = document.getElementById('favicon');
            const appleIcon = document.getElementById('appleIcon');

            if (ogTitle) ogTitle.content = 'نقابة تكنولوجيا المعلومات والبرمجيات - تسجيل الدخول';
            if (ogDescription) ogDescription.content = 'تسجيل الدخول إلى النظام الرسمي للتحقق من صحة الشهادات التدريبية';
            if (ogUrl) ogUrl.content = window.location.href;
            if (ogSiteName) ogSiteName.content = 'نقابة تكنولوجيا المعلومات والبرمجيات';
            if (twitterTitle) twitterTitle.content = 'نقابة تكنولوجيا المعلومات والبرمجيات - تسجيل الدخول';
            if (twitterDescription) twitterDescription.content = 'تسجيل الدخول إلى النظام الرسمي للتحقق من صحة الشهادات التدريبية';

            if (settings.logoUrl) {
                if (ogImage) ogImage.content = settings.logoUrl;
                if (twitterImage) twitterImage.content = settings.logoUrl;
                if (favicon) favicon.href = settings.logoUrl;
                if (appleIcon) appleIcon.href = settings.logoUrl;
            }
        }

        // ============================================================
        // 5. تطبيق الألوان
        // ============================================================
        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.border) root.style.setProperty('--border', colors.border);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

        // ============================================================
        // 6. عرض الرسائل
        // ============================================================
        function showMsg(msg, type) {
            const el = document.getElementById('loginMsg');
            if (!el) return;
            el.textContent = msg;
            el.className = 'msg show ' + type;
        }

        function hideMsg() {
            const el = document.getElementById('loginMsg');
            if (!el) return;
            el.className = 'msg';
        }

        // ============================================================
        // 7. معالجة تسجيل الدخول
        // ============================================================
        function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');

            if (!email || !password) {
                showMsg('الرجاء إدخال البريد الإلكتروني وكلمة المرور', 'error');
                return false;
            }

            hideMsg();

            loginBtn.disabled = true;
            loginBtnText.innerHTML = '<span class="spinner"></span> جاري تسجيل الدخول...';

            auth.signInWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    const user = userCredential.user;
                    return db.collection('users').doc(user.uid).get().then(function(doc) {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.isActive !== false) {
                                return { user: user, data: data };
                            } else {
                                auth.signOut();
                                throw new Error('الحساب غير نشط، يرجى التواصل مع الدعم الفني');
                            }
                        } else {
                            auth.signOut();
                            throw new Error('المستخدم غير موجود في النظام');
                        }
                    });
                })
                .then(function(result) {
                    showMsg('تم تسجيل الدخول بنجاح، جاري التوجيه...', 'success');
                    setTimeout(function() {
                        window.location.href = 'home.html';
                    }, 1000);
                })
                .catch(function(error) {
                    let msg = 'فشل تسجيل الدخول';
                    if (error.code === 'auth/user-not-found') {
                        msg = 'البريد الإلكتروني غير مسجل';
                    } else if (error.code === 'auth/wrong-password') {
                        msg = 'كلمة المرور غير صحيحة';
                    } else if (error.code === 'auth/invalid-email') {
                        msg = 'البريد الإلكتروني غير صحيح';
                    } else if (error.code === 'auth/too-many-requests') {
                        msg = 'تم حظر الحساب مؤقتاً، حاول لاحقاً';
                    } else if (error.message) {
                        msg = error.message;
                    }
                    showMsg(msg, 'error');
                    loginBtn.disabled = false;
                    loginBtnText.textContent = 'تسجيل الدخول';
                });

            return false;
        }

        // ============================================================
        // 8. التحقق من حالة المستخدم
        // ============================================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                // مستخدم مسجل دخول بالفعل، توجيه للصفحة الرئيسية
                window.location.href = 'home.html';
            }
        });

        // ============================================================
        // 9. بدء التشغيل
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('شاشة تسجيل الدخول - التحميل المسبق للإعدادات');
            loadSettings();
        });
    </script>

</body>
</html>
