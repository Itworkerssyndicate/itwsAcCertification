    <style>
        /* ============================================================
           التصميم الخرافي لشاشة تسجيل الدخول
           مع توجيه للداش بورد وزر للشاشة الهوم
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            direction: rtl;
            background: var(--bg-color);
            transition: background 0.8s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.06);
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.12);
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.12);
            --info: #3B82F6;
            --info-bg: rgba(59,130,246,0.12);
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.03);
            --card-bg: rgba(255,255,255,0.04);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
        }

        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.06) rotate(1.5deg); opacity: 0.9; }
        }

        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 22s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 550px; height: 550px; border-color: rgba(124,58,237,0.04); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 750px; height: 750px; border-color: rgba(59,130,246,0.03); animation-duration: 60s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -150px;
            background: var(--primary-glow);
        }

        .glow-orb:nth-child(2) {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -200px;
            background: var(--accent-glow);
            animation-delay: 6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: contentEntrance 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes contentEntrance {
            0% { opacity: 0; transform: scale(0.8) translateY(60px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 42px 38px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .login-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .logo-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 14px;
            position: relative;
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(201,168,76,0.25), rgba(124,58,237,0.2), rgba(59,130,246,0.2), transparent);
            animation: conicSpin 8s linear infinite;
            mask: radial-gradient(circle, transparent 60%, black 62%);
            -webkit-mask: radial-gradient(circle, transparent 60%, black 62%);
        }

        @keyframes conicSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(201,168,76,0.2);
            box-shadow: 0 0 40px var(--primary-glow);
            object-fit: cover;
            position: relative;
            z-index: 2;
            transition: all 0.5s ease;
            background: var(--bg-color);
        }

        .login-logo:hover {
            box-shadow: 0 0 60px var(--primary-glow);
            border-color: var(--primary-color);
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        .login-header .sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .login-header .committee {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
            font-weight: 300;
        }

        .login-header .president {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 4px;
            font-weight: 400;
        }

        .login-header .president span {
            color: var(--text-muted);
        }

        .login-form {
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.25;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .form-group input:focus~.input-icon {
            opacity: 0.6;
        }

        .form-group input {
            width: 100%;
            padding: 14px 46px 14px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(255,255,255,0.06);
        }

        .form-group .toggle-password {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            padding: 4px;
        }

        .form-group .toggle-password:hover {
            color: var(--text-secondary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            font-size: 13px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            transition: color 0.3s ease;
        }

        .form-options label:hover {
            color: var(--text-secondary);
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg-hover);
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .form-options a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 13px;
        }

        .form-options a:hover {
            color: var(--text-secondary);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-sm);
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 25px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg) translate(-100%, -100%);
            transition: transform 0.6s;
        }

        .btn-login:hover::before {
            transform: rotate(45deg) translate(100%, 100%);
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px var(--primary-glow);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner-sm {
            display: none;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn-login.loading .spinner-sm {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: var(--text-dim);
            position: relative;
            z-index: 1;
        }

        .login-footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: var(--text-secondary);
        }

        .login-footer .divider {
            margin: 0 8px;
            color: var(--text-dim);
        }

        .back-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .back-links a {
            color: var(--text-dim);
            font-size: 12px;
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .back-links a:hover {
            color: var(--text-muted);
        }

        .msg {
            display: none;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.3s ease;
        }

        .msg.show { display: block; }
        .msg.error { background: var(--error-bg); border: 1px solid var(--error); color: var(--error); }
        .msg.success { background: var(--success-bg); border: 1px solid var(--success); color: var(--success); }
        .msg.info { background: var(--info-bg); border: 1px solid var(--info); color: var(--info); }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; border-radius: 20px; }
            .login-header h1 { font-size: 20px; }
            .logo-wrapper { width: 65px; height: 65px; }
            .form-group input { padding: 12px 40px 12px 14px; font-size: 14px; }
            .btn-login { padding: 14px; font-size: 15px; }
            .form-options { flex-direction: column; align-items: flex-start; gap: 4px; }
            .ring { display: none; }
            .glow-orb { display: none; }
            .back-links { flex-direction: column; gap: 6px; align-items: center; }
        }

        @media (max-width: 380px) {
            .login-container { padding: 12px; }
            .login-card { padding: 20px 14px; }
            .logo-wrapper { width: 55px; height: 55px; }
        }
    </style>
</head>

        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="grid-lines"></div>

        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="glow-orb"></div>

            </form>

            <div class="login-footer">

        </div>

    </div>

            rememberLabel: 'تذكرني',
            loginBtnText: 'تسجيل الدخول',
            homeLink: 'الرئيسية',
            searchPageLink: 'شاشة البحث',
            dashboardLink: 'لوحة التحكم',
            colors: {
                primary: '#C9A84C',
                accent: '#7C3AED',
                background: '#0A0E1A',
                text: '#FFFFFF',
                textSecondary: 'rgba(255,255,255,0.7)',
                textMuted: 'rgba(255,255,255,0.4)',
                textDim: 'rgba(255,255,255,0.15)',
                success: '#10B981',
                error: '#EF4444',
                warning: '#F59E0B',
                info: '#3B82F6',
                border: 'rgba(255,255,255,0.06)',
                cardBg: 'rgba(255,255,255,0.04)'
            }
        };

        // ============================================================
        // 3. جلب الإعدادات
        // ============================================================
        function loadSettings() {
            db.collection('settings').doc('general').get()
                .then(function(doc) {
                    if (doc.exists) {
                        const data = doc.data();

                        if (data.unionName) settings.unionName = data.unionName;
                        if (data.committeeName) settings.committeeName = data.committeeName;
                        if (data.presidentName) settings.presidentName = data.presidentName;
                        if (data.logoUrl) settings.logoUrl = data.logoUrl;
                        if (data.footerText) settings.footerText = data.footerText;
                        if (data.loginSubtitle) settings.loginSubtitle = data.loginSubtitle;
                        if (data.presidentLabel) settings.presidentLabel = data.presidentLabel;

                        if (data.colors) settings.colors = { ...settings.colors, ...data.colors };

                        // نصوص إضافية من texts
                        db.collection('settings').doc('texts').get()
                            .then(function(textsDoc) {
                                if (textsDoc.exists) {
                                    const texts = textsDoc.data();
                                    if (texts.loginBtnText) settings.loginBtnText = texts.loginBtnText;
                                    if (texts.emailLabel) settings.emailLabel = texts.emailLabel;
                                    if (texts.passwordLabel) settings.passwordLabel = texts.passwordLabel;
                                    if (texts.rememberLabel) settings.rememberLabel = texts.rememberLabel;
                                    if (texts.homeLink) settings.homeLink = texts.homeLink;
                                    if (texts.searchPageLink) settings.searchPageLink = texts.searchPageLink;
                                    if (texts.dashboardLink) settings.dashboardLink = texts.dashboardLink;
                                    if (texts.loginSubtitle) settings.loginSubtitle = texts.loginSubtitle;
                                }
                                applySettings();
                                applyColors(settings.colors);
                            })
                            .catch(function() {
                                applySettings();
                                applyColors(settings.colors);
                            });

                    } else {
                        applySettings();
                        applyColors(settings.colors);
                    }
                })
                .catch(function() {
                    applySettings();
                    applyColors(settings.colors);
                });
        }

        function applySettings() {
            const unionNameEl = document.getElementById('unionName');
            const committeeNameEl = document.getElementById('committeeName');
            const presidentNameEl = document.getElementById('presidentName');
            const presidentLabelEl = document.getElementById('presidentLabel');
            const footerTextEl = document.getElementById('footerText');
            const loginSubtitleEl = document.getElementById('loginSubtitle');
            const emailLabelEl = document.getElementById('emailLabel');
            const passwordLabelEl = document.getElementById('passwordLabel');
            const rememberLabelEl = document.getElementById('rememberLabel');
            const loginBtnTextEl = document.getElementById('loginBtnText');
            const homeLinkEl = document.getElementById('homeLink');
            const searchPageLinkEl = document.getElementById('searchPageLink');
            const dashboardLinkEl = document.getElementById('dashboardLink');
            const emailInput = document.getElementById('emailInput');
            const passwordInput = document.getElementById('passwordInput');

            if (unionNameEl) unionNameEl.textContent = settings.unionName;
            if (committeeNameEl) committeeNameEl.textContent = settings.committeeName;
            if (presidentNameEl) presidentNameEl.textContent = settings.presidentName;
            if (presidentLabelEl) presidentLabelEl.textContent = settings.presidentLabel;
            if (footerTextEl) footerTextEl.textContent = settings.footerText;
            if (loginSubtitleEl) loginSubtitleEl.textContent = settings.loginSubtitle;
            if (emailLabelEl) emailLabelEl.textContent = settings.emailLabel;
            if (passwordLabelEl) passwordLabelEl.textContent = settings.passwordLabel;
            if (rememberLabelEl) rememberLabelEl.textContent = settings.rememberLabel;
            if (loginBtnTextEl) loginBtnTextEl.textContent = settings.loginBtnText;
            if (homeLinkEl) homeLinkEl.textContent = settings.homeLink;
            if (searchPageLinkEl) searchPageLinkEl.textContent = settings.searchPageLink;
            if (dashboardLinkEl) dashboardLinkEl.textContent = settings.dashboardLink;

            if (emailInput) emailInput.placeholder = settings.emailLabel;
            if (passwordInput) passwordInput.placeholder = settings.passwordLabel;

            // Logo
            if (settings.logoUrl) {
                const logo = document.getElementById('loginLogo');
                if (logo) {
                    logo.src = settings.logoUrl;
                    logo.onerror = function() {
                        this.src = 'https://placehold.co/80x80/0A0E1A/C9A84C/png?text=ن.ت';
                    };
                }
            }

            // OG Tags
            const pageTitle = document.getElementById('pageTitle');
            const metaDescription = document.getElementById('metaDescription');
            const ogTitle = document.getElementById('ogTitle');
            const ogDescription = document.getElementById('ogDescription');
            const ogImage = document.getElementById('ogImage');
            const ogUrl = document.getElementById('ogUrl');
            const ogSiteName = document.getElementById('ogSiteName');
            const twitterTitle = document.getElementById('twitterTitle');
            const twitterDescription = document.getElementById('twitterDescription');
            const twitterImage = document.getElementById('twitterImage');
            const favicon = document.getElementById('favicon');
            const appleIcon = document.getElementById('appleIcon');

            if (pageTitle) pageTitle.textContent = settings.unionName + ' - تسجيل الدخول';
            if (metaDescription) metaDescription.content = 'تسجيل الدخول إلى نظام توثيق الشهادات - ' + settings.unionName;
            if (ogTitle) ogTitle.content = settings.unionName;
            if (ogDescription) ogDescription.content = 'نظام توثيق الشهادات التدريبية';
            if (ogUrl) ogUrl.content = window.location.href;
            if (ogSiteName) ogSiteName.content = settings.unionName;
            if (twitterTitle) twitterTitle.content = settings.unionName;
            if (twitterDescription) twitterDescription.content = 'نظام توثيق الشهادات التدريبية';

            if (settings.logoUrl) {
                if (ogImage) ogImage.content = settings.logoUrl;
                if (twitterImage) twitterImage.content = settings.logoUrl;
                if (favicon) favicon.href = settings.logoUrl;
                if (appleIcon) appleIcon.href = settings.logoUrl;
            }
        }

        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
            if (colors.success) root.style.setProperty('--success', colors.success);
            if (colors.error) root.style.setProperty('--error', colors.error);
            if (colors.warning) root.style.setProperty('--warning', colors.warning);
            if (colors.info) root.style.setProperty('--info', colors.info);
            if (colors.border) root.style.setProperty('--border', colors.border);
            if (colors.cardBg) root.style.setProperty('--card-bg', colors.cardBg);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

        // ============================================================
        // 4. التحقق من حالة المصادقة
        // ============================================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                // ✅ التوجيه إلى dashboard.html
                window.location.href = 'dashboard.html';
            }
        });

        // ============================================================
        // 5. إظهار/إخفاء كلمة المرور
        // ============================================================
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const btn = document.getElementById('toggleBtn');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // ============================================================
        // 6. معالجة تسجيل الدخول
        // ============================================================
        function handleLogin(e) {
            e.preventDefault();

            if (loading) return;

            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!email) {
                showMsg('الرجاء إدخال البريد الإلكتروني', 'error');
                return false;
            }
            if (!password) {
                showMsg('الرجاء إدخال كلمة المرور', 'error');
                return false;
            }

            loading = true;
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            hideMsg();

            auth.signInWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    const uid = userCredential.user.uid;
                    return db.collection('users').doc(uid).get();
                })
                .then(function(doc) {
                    if (doc.exists) {
                        const data = doc.data();

                        if (data.isActive === false) {
                            auth.signOut();
                            showMsg('هذا المستخدم غير نشط. تواصل مع الإدارة.', 'error');
                            loading = false;
                            btn.classList.remove('loading');
                            btn.disabled = false;
                            return;
                        }

                        db.collection('users').doc(doc.id).update({
                            lastLogin: new Date(),
                            updatedAt: new Date()
                        }).catch(function() {});

                        db.collection('activities').add({
                            userId: doc.id,
                            userEmail: email,
                            userName: data.displayName || 'مستخدم',
                            userRole: data.role || 'user',
                            type: 'login',
                            description: 'تسجيل دخول: ' + email,
                            timestamp: new Date(),
                            ipAddress: 'auto',
                            userAgent: navigator.userAgent
                        }).catch(function() {});

                        sessionStorage.setItem('userData', JSON.stringify({
                            uid: doc.id,
                            email: email,
                            displayName: data.displayName || 'مستخدم',
                            role: data.role || 'user',
                            isActive: data.isActive !== false
                        }));

                        showMsg('تم تسجيل الدخول بنجاح! جاري التوجيه...', 'success');

                        setTimeout(function() {
                            // ✅ التوجيه إلى dashboard.html
                            window.location.href = 'dashboard.html';
                        }, 800);

                    } else {
                        auth.signOut();
                        showMsg('المستخدم غير مصرح له بالدخول.', 'error');
                        loading = false;
                        btn.classList.remove('loading');
                        btn.disabled = false;
                    }
                })
                .catch(function(err) {
                    let msg = 'حدث خطأ في تسجيل الدخول';
                    if (err.code === 'auth/user-not-found') {
                        msg = 'البريد الإلكتروني غير مسجل';
                    } else if (err.code === 'auth/wrong-password') {
                        msg = 'كلمة المرور غير صحيحة';
                    } else if (err.code === 'auth/too-many-requests') {
                        msg = 'تم حظر الحساب مؤقتاً. حاول لاحقاً';
                    } else if (err.code === 'auth/invalid-email') {
                        msg = 'البريد الإلكتروني غير صحيح';
                    } else if (err.code === 'auth/user-disabled') {
                        msg = 'هذا الحساب معطل. تواصل مع الإدارة.';
                    }
                    showMsg(msg, 'error');
                    loading = false;
                    btn.classList.remove('loading');
                    btn.disabled = false;
                });

            return false;
        }

        // ============================================================
        // 7. عرض الرسائل
        // ============================================================
        function showMsg(msg, type) {
            const el = document.getElementById('loginMsg');
            if (!el) return;
            el.textContent = msg;
            el.className = 'msg show ' + type;
        }

        function hideMsg() {
            const el = document.getElementById('loginMsg');
            if (!el) return;
            el.className = 'msg';
        }

        // ============================================================
        // 8. الضغط على Enter
        // ============================================================
        document.getElementById('passwordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        document.getElementById('emailInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('passwordInput').focus();
            }
        });

        // ============================================================
        // 9. تحميل الصفحة
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();

            // LocalStorage theme
            try {
                const localSettings = localStorage.getItem('userSettings');
                if (localSettings) {
                    const parsed = JSON.parse(localSettings);
                    if (parsed.theme && parsed.theme.colors) {
                        applyColors(parsed.theme.colors);
                    }
                }
            } catch (e) {}

            console.log('✅ شاشة تسجيل الدخول - كل حرف من الإعدادات');
            console.log('👤 النقيب العام: ' + settings.presidentName);
            console.log('🎨 الألوان من الإعدادات مع دعم المظهر المحلي');
            console.log('🔒 نظام أمني متطور');
            console.log('🚀 التوجيه إلى dashboard.html بعد تسجيل الدخول');
            console.log('🔗 روابط: شاشة البحث ولوحة التحكم');
        });
    </script>
