<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle"></title>
    <meta name="description" id="metaDescription" content="" />
    <meta name="keywords" id="metaKeywords" content="" />

    <!-- Open Graph -->
    <meta property="og:title" id="ogTitle" content="" />
    <meta property="og:description" id="ogDescription" content="" />
    <meta property="og:image" id="ogImage" content="" />
    <meta property="og:url" id="ogUrl" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" id="ogSiteName" content="" />
    <meta property="og:locale" content="ar_EG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="twitterTitle" content="" />
    <meta name="twitter:description" id="twitterDescription" content="" />
    <meta name="twitter:image" id="twitterImage" content="" />

    <!-- Icons -->
    <link rel="icon" id="favicon" href="" />
    <link rel="apple-touch-icon" id="appleIcon" href="" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <!-- Cloudinary Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript">
    </script>

    <style>
        /* ============================================================
           التصميم الخرافي لإعدادات النظام
           كل حرف من الإعدادات + ثيمات
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.06);
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.12);
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.12);
            --info: #3B82F6;
            --info-bg: rgba(59,130,246,0.12);
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.03);
            --card-bg: rgba(255,255,255,0.04);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 22s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 550px; height: 550px; border-color: rgba(124,58,237,0.04); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 750px; height: 750px; border-color: rgba(59,130,246,0.03); animation-duration: 60s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -150px;
            background: var(--primary-glow);
        }

        .glow-orb:nth-child(2) {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -200px;
            background: var(--accent-glow);
            animation-delay: 6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: headerFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: logoSpin 20s linear infinite;
            box-shadow: 0 0 35px var(--primary-glow);
            position: relative;
            background-size: cover;
            background-position: center;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-box:hover {
            animation-duration: 3s;
            transform: scale(1.08);
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
        }

        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-president {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 14px;
            background: var(--bg-hover);
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-president:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .header-president .president-icon { font-size: 16px; }
        .header-president .president-label { font-size: 11px; color: var(--text-muted); font-weight: 300; }
        .header-president .president-name {
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 25px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 40px var(--primary-glow); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--primary-color); transform: translateY(-3px); }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 4px 25px rgba(16,185,129,0.25);
        }
        .btn-success:hover { transform: translateY(-3px) scale(1.02); }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), #dc2626);
            color: #fff;
            box-shadow: 0 4px 25px rgba(239,68,68,0.25);
        }
        .btn-danger:hover { transform: translateY(-3px) scale(1.02); }

        .btn-sm { padding: 5px 14px; font-size: 12px; }

        .role-badge {
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 20px;
            background: var(--primary-glow);
            color: var(--primary-color);
            font-weight: 600;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .card:hover { border-color: var(--primary-color); }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .badge {
            font-size: 10px;
            background: var(--primary-glow);
            color: var(--primary-color);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-group select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.10);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background: var(--bg-hover);
        }

        .upload-area .preview {
            max-width: 100px;
            max-height: 100px;
            margin: 0 auto 8px;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .upload-area .preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .upload-area .text {
            font-size: 13px;
            color: var(--text-muted);
        }
        .upload-area .sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .upload-status {
            display: none;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 8px;
            margin-top: 6px;
        }

        .upload-status.show { display: inline-block; }
        .upload-status.success { color: var(--success); background: var(--success-bg); }
        .upload-status.error { color: var(--error); background: var(--error-bg); }

        .msg {
            display: none;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }

        .msg.show { display: block; animation: fadeIn 0.3s ease; }
        .msg.error { background: var(--error-bg); border: 1px solid var(--error); color: var(--error); }
        .msg.success { background: var(--success-bg); border: 1px solid var(--success); color: var(--success); }
        .msg.info { background: var(--info-bg); border: 1px solid var(--info); color: var(--info); }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .loader { display: none; text-align: center; padding: 30px 0; }
        .loader.show { display: block; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid var(--border);
            margin-top: 24px;
            color: var(--text-dim);
            font-size: 11px;
        }

        .tabs-container {
            display: flex;
            gap: 6px;
            background: var(--bg-hover);
            border-radius: var(--radius);
            padding: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border: 1px solid var(--border-light);
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn:hover {
            color: var(--text-secondary);
            background: var(--bg-hover);
        }

        .tab-btn.active {
            color: var(--text-color);
            background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(124,58,237,0.15));
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        .theme-preview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }

        .theme-option {
            background: var(--bg-hover);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-option:hover {
            border-color: var(--primary-color);
        }

        .theme-option.active {
            border-color: var(--primary-color);
            background: var(--primary-glow);
        }

        .theme-option .theme-colors {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 6px 0;
        }

        .theme-option .theme-colors span {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .theme-option .theme-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-color);
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px 16px; border-radius: 20px; }
            .header-right { justify-content: center; flex-wrap: wrap; }
            .header-left { justify-content: center; flex-wrap: wrap; }
            .container { padding: 10px; }
            .card { padding: 14px 16px; }
            .form-row { grid-template-columns: 1fr; }
            .form-row-3 { grid-template-columns: 1fr 1fr; }
            .glow-orb { display: none; }
            .ring { display: none; }
            .header-title { text-align: center; }
            .header-president { padding: 3px 10px; }
            .header-president .president-name { font-size: 12px; }
            .tabs-container { flex-direction: column; }
            .tab-btn { text-align: center; }
            .theme-preview { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .header-title h1 { font-size: 15px; }
            .btn { padding: 6px 14px; font-size: 11px; }
            .logo-box { width: 36px; height: 36px; font-size: 14px; }
            .form-row-3 { grid-template-columns: 1fr; }
            .theme-preview { grid-template-columns: 1fr 1fr; }
            .header-president .president-name { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="page-bg"></div>

    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="grid-lines"></div>

    <div class="orbital-ring">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="glow-orb"></div>
    <div class="glow-orb"></div>

    <div class="container">

        function loadSettings() {
            db.collection('settings').doc('general').get()
                .then(function(doc) {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.unionName) document.getElementById('unionName').value = data.unionName;
                        if (data.committeeName) document.getElementById('committeeNameInput').value = data.committeeName;
                        if (data.presidentName) document.getElementById('presidentNameInput').value = data.presidentName;
                        if (data.presidentLabel) document.getElementById('presidentLabelInput').value = data.presidentLabel;
                        if (data.splashDuration) document.getElementById('splashDuration').value = data.splashDuration;
                        if (data.sessionTimeout) document.getElementById('sessionTimeout').value = data.sessionTimeout;
                        if (data.footerText) document.getElementById('footerTextInput').value = data.footerText;
                        if (data.colors) settings.colors = { ...settings.colors, ...data.colors };
                        if (data.logoUrl) settings.logoUrl = data.logoUrl;
                        if (data.stampUrl) settings.stampUrl = data.stampUrl;
                    }
                    applySettings();
                    applyColors(settings.colors);
                })
                .catch(function() {
                    applySettings();
                    applyColors(settings.colors);
                });

        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
            if (colors.success) root.style.setProperty('--success', colors.success);
            if (colors.error) root.style.setProperty('--error', colors.error);
            if (colors.warning) root.style.setProperty('--warning', colors.warning);
            if (colors.info) root.style.setProperty('--info', colors.info);
            if (colors.border) root.style.setProperty('--border', colors.border);
            if (colors.cardBg) root.style.setProperty('--card-bg', colors.cardBg);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

        // 10. حفظ إعدادات الأمان
        // ============================================================
        function saveSecurity() {
            const data = {
                maxLoginAttempts: parseInt(document.getElementById('maxLoginAttempts').value) || 5,
                maintenanceMode: document.getElementById('maintenanceMode').value === 'true',
                allowRegistration: document.getElementById('allowRegistration').value === 'true',
                updatedAt: new Date()
            };

            db.collection('settings').doc('security').set(data, { merge: true })
                .then(function() {
                    showMsg('تم حفظ إعدادات الأمان بنجاح', 'success');
                })
                .catch(function(err) {
                    showMsg('حدث خطأ: ' + err.message, 'error');
                });
        }

        function resetSecurity() {
            if (!confirm('هل تريد استعادة إعدادات الأمان الافتراضية؟')) return;
            document.getElementById('maxLoginAttempts').value = 5;
            document.getElementById('maintenanceMode').value = 'false';
            document.getElementById('allowRegistration').value = 'true';
            showMsg('تم استعادة إعدادات الأمان الافتراضية', 'success');
        }

        // ============================================================
        // 11. الصور واللوجو
        // ============================================================
        function previewLogo(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                showMsg('حجم الصورة يتجاوز 2MB', 'error');
                e.target.value = '';
                return;
            }
            logoFile = file;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = document.querySelector('#logoPreview img');
                img.src = ev.target.result;
                img.style.display = 'block';
                document.getElementById('logoPlaceholder').textContent = file.name;
            };
            reader.readAsDataURL(file);
        }

        function previewStamp(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                showMsg('حجم الصورة يتجاوز 2MB', 'error');
                e.target.value = '';
                return;
            }
            stampFile = file;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = document.querySelector('#stampPreview img');
                img.src = ev.target.result;
                img.style.display = 'block';
                document.getElementById('stampPlaceholder').textContent = file.name;
            };
            reader.readAsDataURL(file);
        }

        const CLOUDINARY = {
            cloudName: 'dvxh9l4lv',
            uploadPreset: 'itwsAcaCertification',
            folder: 'syndicate_system_logos'
        };

        function uploadToCloudinary(file, publicId) {
            return new Promise(function(resolve, reject) {
                const widget = cloudinary.createUploadWidget({
                    cloudName: CLOUDINARY.cloudName,
                    uploadPreset: CLOUDINARY.uploadPreset,
                    folder: CLOUDINARY.folder,
                    publicId: publicId,
                    multiple: false,
                    sources: ['local', 'url'],
                    cropping: true,
                    croppingAspectRatio: 1,
                    styles: {
                        palette: {
                            window: '#0a0e1a',
                            windowBorder: '#C9A84C',
                            tabIcon: '#C9A84C',
                            menuIcons: '#C9A84C',
                            textDark: '#ffffff',
                            textLight: '#ffffff',
                            link: '#C9A84C',
                            action: '#C9A84C',
                            inactiveTabIcon: '#666666',
                            error: '#ef4444',
                            inProgress: '#C9A84C',
                            complete: '#22c55e',
                            sourceBg: '#0a0e1a'
                        }
                    }
                }, function(error, result) {
                    if (error) { reject(error); return; }
                    if (result.event === 'success') {
                        resolve({ secure_url: result.info.secure_url });
                    } else if (result.event === 'close') {
                        reject(new Error('تم إلغاء الرفع'));
                    }
                });
                widget.open();
            });
        }

        function uploadLogoToCloudinary() {
            if (!logoFile) {
                showMsg('الرجاء اختيار صورة اللوجو أولاً', 'info');
                return;
            }
            const btn = document.getElementById('uploadLogoBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الرفع...';
            uploadToCloudinary(logoFile, 'union_logo')
                .then(function(data) {
                    const url = data.secure_url;
                    return db.collection('settings').doc('general').set({
                        logoUrl: url,
                        updatedAt: new Date()
                    }, { merge: true }).then(function() { return url; });
                })
                .then(function() {
                    showMsg('تم رفع اللوجو بنجاح', 'success');
                    document.getElementById('logoStatus').textContent = 'تم الرفع';
                    document.getElementById('logoStatus').className = 'upload-status show success';
                    btn.disabled = false;
                    btn.textContent = 'رفع اللوجو';
                    logoFile = null;
                    loadImagesFromFirestore();
                })
                .catch(function(err) {
                    showMsg('حدث خطأ: ' + (err.message || err), 'error');
                    document.getElementById('logoStatus').textContent = 'فشل الرفع';
                    document.getElementById('logoStatus').className = 'upload-status show error';
                    btn.disabled = false;
                    btn.textContent = 'رفع اللوجو';
                });
        }

        function uploadStampToCloudinary() {
            if (!stampFile) {
                showMsg('الرجاء اختيار صورة الختم أولاً', 'info');
                return;
            }
            const btn = document.getElementById('uploadStampBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الرفع...';
            uploadToCloudinary(stampFile, 'union_stamp')
                .then(function(data) {
                    const url = data.secure_url;
                    return db.collection('settings').doc('general').set({
                        stampUrl: url,
                        updatedAt: new Date()
                    }, { merge: true }).then(function() { return url; });
                })
                .then(function() {
                    showMsg('تم رفع الختم بنجاح', 'success');
                    document.getElementById('stampStatus').textContent = 'تم الرفع';
                    document.getElementById('stampStatus').className = 'upload-status show success';
                    btn.disabled = false;
                    btn.textContent = 'رفع الختم';
                    stampFile = null;
                    loadImagesFromFirestore();
                })
                .catch(function(err) {
                    showMsg('حدث خطأ: ' + (err.message || err), 'error');
                    document.getElementById('stampStatus').textContent = 'فشل الرفع';
                    document.getElementById('stampStatus').className = 'upload-status show error';
                    btn.disabled = false;
                    btn.textContent = 'رفع الختم';
                });
        }

        function loadImagesFromFirestore() {
            db.collection('settings').doc('general').get()
                .then(function(doc) {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.logoUrl) {
                            const img = document.querySelector('#logoPreview img');
                            img.src = data.logoUrl;
                            img.style.display = 'block';
                            document.getElementById('logoPlaceholder').textContent = 'لوجو موجود';
                            const logoBox = document.getElementById('logoBox');
                            if (logoBox) {
                                logoBox.style.backgroundImage = 'url(' + data.logoUrl + ')';
                                logoBox.style.backgroundSize = 'cover';
                                logoBox.style.backgroundPosition = 'center';
                                logoBox.textContent = '';
                            }
                        }
                        if (data.stampUrl) {
                            const img = document.querySelector('#stampPreview img');
                            img.src = data.stampUrl;
                            img.style.display = 'block';
                            document.getElementById('stampPlaceholder').textContent = 'ختم موجود';
                        }
                    }
                })
                .catch(function() {});
        }

        function clearImages() {
            if (!confirm('هل أنت متأكد من حذف اللوجو والختم؟')) return;
            db.collection('settings').doc('general').set({
                logoUrl: '',
                stampUrl: '',
                updatedAt: new Date()
            }, { merge: true })
            .then(function() {
                document.querySelector('#logoPreview img').style.display = 'none';
                document.getElementById('logoPlaceholder').textContent = 'اضغط لرفع لوجو النقابة';
                document.querySelector('#stampPreview img').style.display = 'none';
                document.getElementById('stampPlaceholder').textContent = 'اضغط لرفع ختم النقابة';
                const logoBox = document.getElementById('logoBox');
                if (logoBox) {
                    logoBox.style.backgroundImage = 'linear-gradient(135deg, var(--primary-color), var(--accent-color))';
                    logoBox.textContent = 'ن.ت';
                }
                showMsg('تم حذف الصور بنجاح', 'success');
            })
            .catch(function(err) {
                showMsg('حدث خطأ: ' + err.message, 'error');
            });
        }

        // ============================================================
        // 12. عرض الرسائل
        // ============================================================
        function showMsg(msg, type = 'info') {
            const el = document.getElementById('pageMsg');
            el.textContent = msg;
            el.className = 'msg show ' + type;
            setTimeout(function() { el.className = 'msg'; }, 4000);
        }

        // ============================================================
        // 13. تحميل الصفحة
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ إعدادات النظام - كل حرف من الإعدادات');
            console.log('🎨 دعم الثيمات المحلية (LocalStorage)');
            console.log('🔒 صلاحية السوبر أدمن فقط');
            console.log('📋 التحكم في كل نصوص المنصة');
        });
    </script>
