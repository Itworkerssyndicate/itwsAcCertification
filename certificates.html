<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Icons -->
    <link rel="icon" id="favicon" href="" />
    <link rel="apple-touch-icon" id="appleIcon" href="" />

    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.06);
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.12);
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.12);
            --info: #3B82F6;
            --info-bg: rgba(59,130,246,0.12);
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.03);
            --card-bg: rgba(255,255,255,0.04);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 22s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 550px; height: 550px; border-color: rgba(124,58,237,0.04); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 750px; height: 750px; border-color: rgba(59,130,246,0.03); animation-duration: 60s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -150px;
            background: var(--primary-glow);
        }

        .glow-orb:nth-child(2) {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -200px;
            background: var(--accent-glow);
            animation-delay: 6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: headerFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 2;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: logoSpin 20s linear infinite;
            box-shadow: 0 0 35px var(--primary-glow);
            position: relative;
            background-size: cover;
            background-position: center;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-box:hover {
            animation-duration: 3s;
            transform: scale(1.08);
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
        }

        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-president {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 14px;
            background: var(--bg-hover);
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-president:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .header-president .president-icon { font-size: 16px; }
        .header-president .president-label { font-size: 11px; color: var(--text-muted); font-weight: 300; }
        .header-president .president-name {
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 25px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 40px var(--primary-glow); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--primary-color); transform: translateY(-3px); }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 4px 25px rgba(16,185,129,0.25);
        }
        .btn-success:hover { transform: translateY(-3px) scale(1.02); }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), #dc2626);
            color: #fff;
            box-shadow: 0 4px 25px rgba(239,68,68,0.25);
        }
        .btn-danger:hover { transform: translateY(-3px) scale(1.02); }

        .btn-ghost {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }

        .btn-sm { padding: 5px 14px; font-size: 12px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover { border-color: var(--primary-color); }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-title .badge {
            font-size: 10px;
            background: var(--primary-glow);
            color: var(--primary-color);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stats-row .stat-mini {
            text-align: center;
            padding: 10px 12px;
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .stats-row .stat-mini:hover {
            background: var(--bg-hover);
            border-color: var(--primary-color);
        }

        .stats-row .stat-mini .num {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1.2;
        }

        .stats-row .stat-mini .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .filters-grid .filter-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .filters-grid .filter-group label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .filters-grid .filter-group input,
        .filters-grid .filter-group select {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            width: 100%;
        }

        .filters-grid .filter-group input::placeholder {
            color: var(--text-muted);
        }

        .filters-grid .filter-group input:focus,
        .filters-grid .filter-group select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .filters-grid .filter-group select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .table thead {
            border-bottom: 1px solid var(--border);
        }

        .table thead th {
            text-align: right;
            padding: 10px 12px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background: var(--bg-hover);
        }

        .table .student-name {
            font-weight: 600;
            color: var(--text-color);
        }

        .table .student-national-id {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }

        .table .cert-code {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }

        .table .grade-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .grade-badge.grade-a { background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.1); }
        .grade-badge.grade-b { background: var(--info-bg); color: var(--info); border: 1px solid rgba(59,130,246,0.1); }
        .grade-badge.grade-c { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(245,158,11,0.1); }
        .grade-badge.grade-d { background: rgba(249,115,22,0.12); color: #f97316; border: 1px solid rgba(249,115,22,0.1); }
        .grade-badge.grade-f { background: var(--error-bg); color: var(--error); border: 1px solid rgba(239,68,68,0.1); }

        .table .status-badge {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.active {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.1);
        }

        .status-badge.inactive {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid rgba(239,68,68,0.1);
        }

        .table .actions {
            display: flex;
            gap: 4px;
            flex-wrap: nowrap;
        }

        .table .actions .btn {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 20px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            max-width: 750px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
        }

        .modal::-webkit-scrollbar { width: 4px; }
        .modal::-webkit-scrollbar-track { background: var(--bg-hover); border-radius: 4px; }
        .modal::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal-close {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--error-bg);
            color: var(--error);
            border-color: var(--error);
        }

        .modal-body {
            margin-bottom: 18px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
            if (colors.success) root.style.setProperty('--success', colors.success);
            if (colors.error) root.style.setProperty('--error', colors.error);
            if (colors.warning) root.style.setProperty('--warning', colors.warning);
            if (colors.info) root.style.setProperty('--info', colors.info);
            if (colors.border) root.style.setProperty('--border', colors.border);
            if (colors.cardBg) root.style.setProperty('--card-bg', colors.cardBg);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);

            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

        function loadAcademies() {
            db.collection('academies')
                .where('isDeleted', '==', false)
                .get()
                .then(function(snapshot) {
                    academies = [];
                    snapshot.forEach(function(doc) {
                        const data = doc.data();
                        data.id = doc.id;
                        academies.push(data);
                    });

                    academies.sort(function(a, b) {
                        return (a.name || '').localeCompare(b.name || '');
                    });

                    populateSelects();
                    loadCertificates();
                })
                .catch(function(err) {
                    console.error('Error loading academies:', err);
                    loadCertificates();
                });
        }

        function populateSelects() {
            const select = document.getElementById('academySelect');
            if (select) {
                select.innerHTML = '<option value="">' + settings.academySelectOption + '</option>';
                academies.forEach(function(academy) {
                    const opt = document.createElement('option');
                    opt.value = academy.id;
                    opt.textContent = academy.name + ' (' + (academy.licenseNumber || '') + ')';
                    select.appendChild(opt);
                });
            }

            const filterAcad = document.getElementById('filterAcademy');
            if (filterAcad) {
                filterAcad.innerHTML = '<option value="">' + settings.filterAllOption + '</option>';
                academies.forEach(function(academy) {
                    const opt = document.createElement('option');
                    opt.value = academy.id;
                    opt.textContent = academy.name;
                    filterAcad.appendChild(opt);
                });
            }

            const filterGov = document.getElementById('filterGovernorate');
            if (filterGov) {
                filterGov.innerHTML = '<option value="">' + settings.filterAllGovOption + '</option>';
                const govs = new Set();
                academies.forEach(function(a) {
                    if (a.branches) {
                        a.branches.forEach(function(b) {
                            if (b.governorate) govs.add(b.governorate);
                        });
                    }
                });
                govs.forEach(function(g) {
                    const opt = document.createElement('option');
                    opt.value = g;
                    opt.textContent = g;
                    filterGov.appendChild(opt);
                });
            }
        }

        function updateAcademyFields() {
            const academyId = document.getElementById('academySelect')?.value || '';
            const branchSelect = document.getElementById('branchSelect');
            const licenseDisplay = document.getElementById('academyLicenseDisplay');

            if (branchSelect) branchSelect.innerHTML = '<option value="">' + settings.branchSelectOption + '</option>';

            if (!academyId) {
                if (licenseDisplay) licenseDisplay.value = '';
                return;
            }

            const academy = academies.find(function(a) { return a.id === academyId; });
            if (!academy) {
                if (licenseDisplay) licenseDisplay.value = '';
                return;
            }

            if (licenseDisplay) licenseDisplay.value = academy.licenseNumber || '';

            if (branchSelect && academy.branches && academy.branches.length > 0) {
                academy.branches.forEach(function(branch) {
                    const opt = document.createElement('option');
                    opt.value = branch.branchId || 'main';
                    opt.textContent = branch.governorate + ' - ' + (branch.address || '').substring(0, 30);
                    branchSelect.appendChild(opt);
                });
            }
        }

        // ============================================================
        // 7. توليد كود الشهادة
        // ============================================================
        function generateCertificateCode() {
            const year = new Date().getFullYear();

            return db.collection('certificates')
                .where('certificateCode', '>=', year + '-')
                .where('certificateCode', '<', (year + 1) + '-')
                .get()
                .then(function(snapshot) {
                    let maxNum = 0;
                    snapshot.forEach(function(doc) {
                        const code = doc.data().certificateCode || '';
                        const parts = code.split('-');
                        if (parts.length === 2 && parts[0] === String(year)) {
                            const num = parseInt(parts[1]);
                            if (num > maxNum) maxNum = num;
                        }
                    });
                    const nextNum = maxNum + 1;
                    const paddedNum = String(nextNum).padStart(4, '0');
                    return year + '-' + paddedNum;
                })
                .catch(function() {
                    return year + '-0001';
                });
        }

        // ============================================================
        // 8. تحميل الشهادات
        // ============================================================
        function loadCertificates() {
            const loader = document.getElementById('pageLoader');
            const content = document.getElementById('pageContent');
            if (loader) loader.classList.add('show');
            if (content) content.style.display = 'none';

            db.collection('certificates')
                .get()
                .then(function(snapshot) {
                    certificates = [];
                    snapshot.forEach(function(doc) {
                        const data = doc.data();
                        data.id = doc.id;
                        certificates.push(data);
                    });

                    certificates.sort(function(a, b) {
                        const dateA = a.issuedAt ? (a.issuedAt.toDate ? a.issuedAt.toDate() : new Date(a.issuedAt)) : new Date(0);
                        const dateB = b.issuedAt ? (b.issuedAt.toDate ? b.issuedAt.toDate() : new Date(b.issuedAt)) : new Date(0);
                        return dateB - dateA;
                    });

                    if (loader) loader.classList.remove('show');
                    if (content) content.style.display = 'block';
                    updateStats();
                    renderCertificates();
                })
                .catch(function(err) {
                    if (loader) loader.classList.remove('show');
                    if (content) content.style.display = 'block';
                    showMsg('حدث خطأ في تحميل الشهادات: ' + err.message, 'error');
                });
        }

        // ============================================================
        // 9. تحديث الإحصائيات
        // ============================================================
        function updateStats() {
            const total = certificates.length;
            const active = certificates.filter(function(c) { return c.isActive !== false; }).length;
            const inactive = certificates.filter(function(c) { return c.isActive === false; }).length;

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();

            const thisYear = certificates.filter(function(c) {
                const date = c.issuedAt ? (c.issuedAt.toDate ? c.issuedAt.toDate() : new Date(c.issuedAt)) : null;
                return date && date.getFullYear() === year;
            }).length;

            const thisMonth = certificates.filter(function(c) {
                const date = c.issuedAt ? (c.issuedAt.toDate ? c.issuedAt.toDate() : new Date(c.issuedAt)) : null;
                return date && date.getFullYear() === year && date.getMonth() === month;
            }).length;

            const statTotal = document.getElementById('statTotal');
            const statActive = document.getElementById('statActive');
            const statInactive = document.getElementById('statInactive');
            const statThisYear = document.getElementById('statThisYear');
            const statThisMonth = document.getElementById('statThisMonth');

            if (statTotal) statTotal.textContent = total;
            if (statActive) statActive.textContent = active;
            if (statInactive) statInactive.textContent = inactive;
            if (statThisYear) statThisYear.textContent = thisYear;
            if (statThisMonth) statThisMonth.textContent = thisMonth;
        }

        // ============================================================
        // 10. عرض الشهادات
        // ============================================================
        function renderCertificates(filteredData) {
            const data = filteredData || certificates;
            const tbody = document.getElementById('certificatesBody');
            const emptyState = document.getElementById('emptyState');
            const countEl = document.getElementById('certCount');

            if (countEl) countEl.textContent = data.length;

            if (!tbody) return;

            if (data.length === 0) {
                tbody.innerHTML = '';
                if (emptyState) emptyState.style.display = 'block';
                return;
            }

            if (emptyState) emptyState.style.display = 'none';

            tbody.innerHTML = data.map(function(cert, index) {
                const gradeClass = getGradeClass(cert.grade);
                const statusHtml = cert.isActive !== false ?
                    '<span class="status-badge active">نشطة</span>' :
                    '<span class="status-badge inactive">محذوفة</span>';

                const branchName = cert.branchName || cert.branchId || '-';
                const nationalId = cert.studentNationalId || '-';

                return `
                    <tr>
                        <td data-label="${settings.thNum}"><span style="color:var(--text-muted);font-weight:600;">${index + 1}</span></td>
                        <td data-label="${settings.thCode}">
                            <span class="cert-code">${cert.certificateCode || '-'}</span>
                        </td>
                        <td data-label="${settings.thStudent}">
                            <div class="student-name">${cert.studentName || '-'}</div>
                        </td>
                        <td data-label="${settings.thNational}">
                            <span class="student-national-id">${nationalId}</span>
                        </td>
                        <td data-label="${settings.thCourse}">${cert.courseName || '-'}</td>
                        <td data-label="${settings.thGrade}">
                            <span class="grade-badge grade-${gradeClass}">${cert.grade || '-'}</span>
                        </td>
                        <td data-label="${settings.thAcademy}">${cert.academyName || '-'}</td>
                        <td data-label="${settings.thBranch}" style="font-size:12px;color:var(--text-muted);">${branchName}</td>
                        <td data-label="${settings.thStatus}">${statusHtml}</td>
                        <td data-label="${settings.thActions}">
                            <div class="actions">
                                <button class="btn btn-primary btn-sm" onclick="viewCertificate('${cert.certificateCode}')">${settings.viewTitle}</button>
                                <button class="btn btn-success btn-sm" onclick="editCertificate('${cert.certificateCode}')">${settings.thActions}</button>
                                ${userRole === 'super_admin' || userRole === 'admin' ? `<button class="btn btn-danger btn-sm" onclick="openDeleteModal('${cert.certificateCode}')">${settings.deleteTitle}</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getGradeClass(grade) {
            if (!grade) return 'c';
            const g = grade.toUpperCase();
            if (g.startsWith('A')) return 'a';
            if (g.startsWith('B')) return 'b';
            if (g.startsWith('C')) return 'c';
            if (g.startsWith('D')) return 'd';
            return 'f';
        }

        // ============================================================
        // 11. الفلاتر
        // ============================================================
        function applyFilters() {
            const studentFilter = document.getElementById('filterStudent')?.value.trim().toLowerCase() || '';
            const nationalIdFilter = document.getElementById('filterNationalId')?.value.trim() || '';
            const codeFilter = document.getElementById('filterCode')?.value.trim().toLowerCase() || '';
            const academyFilter = document.getElementById('filterAcademy')?.value || '';
            const govFilter = document.getElementById('filterGovernorate')?.value || '';
            const dateFrom = document.getElementById('filterDateFrom')?.value || '';
            const dateTo = document.getElementById('filterDateTo')?.value || '';

            const filtered = certificates.filter(function(cert) {
                let match = true;

                if (studentFilter) {
                    match = match && (cert.studentName || '').toLowerCase().includes(studentFilter);
                }

                if (nationalIdFilter) {
                    match = match && (cert.studentNationalId || '').includes(nationalIdFilter);
                }

                if (codeFilter) {
                    match = match && (cert.certificateCode || '').toLowerCase().includes(codeFilter);
                }

                if (academyFilter) {
                    match = match && cert.academyId === academyFilter;
                }

                if (govFilter) {
                    let hasGov = false;
                    const academy = academies.find(function(a) { return a.id === cert.academyId; });
                    if (academy && academy.branches) {
                        for (var i = 0; i < academy.branches.length; i++) {
                            if (academy.branches[i].governorate === govFilter) {
                                hasGov = true;
                                break;
                            }
                        }
                    }
                    match = match && hasGov;
                }

                if (dateFrom) {
                    const from = new Date(dateFrom);
                    const issued = cert.issuedAt ? (cert.issuedAt.toDate ? cert.issuedAt.toDate() : new Date(cert.issuedAt)) : null;
                    match = match && issued && issued >= from;
                }

                if (dateTo) {
                    const to = new Date(dateTo);
                    to.setHours(23, 59, 59, 999);
                    const issued = cert.issuedAt ? (cert.issuedAt.toDate ? cert.issuedAt.toDate() : new Date(cert.issuedAt)) : null;
                    match = match && issued && issued <= to;
                }

                return match;
            });

            renderCertificates(filtered);
        }

        function resetFilters() {
            const studentInput = document.getElementById('filterStudent');
            const nationalInput = document.getElementById('filterNationalId');
            const codeInput = document.getElementById('filterCode');
            const academySelect = document.getElementById('filterAcademy');
            const govSelect = document.getElementById('filterGovernorate');
            const dateFrom = document.getElementById('filterDateFrom');
            const dateTo = document.getElementById('filterDateTo');

            if (studentInput) studentInput.value = '';
            if (nationalInput) nationalInput.value = '';
            if (codeInput) codeInput.value = '';
            if (academySelect) academySelect.value = '';
            if (govSelect) govSelect.value = '';
            if (dateFrom) dateFrom.value = '';
            if (dateTo) dateTo.value = '';
            renderCertificates();
        }

                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thCourse || 'الدورة'}</th>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thGrade || 'التقدير'}</th>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thAcademy || 'الأكاديمية'}</th>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thBranch || 'الفرع'}</th>
                                <th style="background:var(--primary-color);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;">${settings.thStatus || 'الحالة'}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>

                    <div style="text-align:center;margin-top:14px;padding-top:10px;border-top:1px solid #eee;font-size:10px;color:#999;">
                        <div>تم إنشاء هذا التقرير بواسطة نظام نقابة تكنولوجيا المعلومات</div>
                        <div style="margin-top:6px;font-size:12px;color:var(--primary-color);font-weight:700;">${settings.presidentLabel}: ${settings.presidentName}</div>
                        <div style="font-size:9px;color:#aaa;margin-top:4px;">${settings.footerText} | الإصدار 1.0</div>
                    </div>
                </div>
            `;

            const container = document.getElementById('print-container');
            if (!container) return;

            container.innerHTML = html;

            const element = container.firstElementChild;

            const opt = {
                margin: 10,
                filename: 'تقرير_الشهادات_' + now.toISOString().split('T')[0] + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save()
                .then(function() {
                    container.innerHTML = '';
                    showMsg('تم تصدير التقرير بنجاح', 'success');
                })
                .catch(function(err) {
                    showMsg('حدث خطأ في تصدير التقرير: ' + err.message, 'error');
                    container.innerHTML = '';
                });
        }

        // ============================================================
        // 19. تعديل شهادة
        // ============================================================
        function editCertificate(code) {
            const cert = certificates.find(function(c) { return c.certificateCode === code; });
            if (!cert) {
                showMsg('الشهادة غير موجودة', 'error');
                return;
            }

            const titleEl = document.getElementById('modalTitle');
            const editEl = document.getElementById('editCode');
            const studentName = document.getElementById('studentName');
            const studentNationalId = document.getElementById('studentNationalId');
            const courseName = document.getElementById('courseName');
            const courseHours = document.getElementById('courseHours');
            const grade = document.getElementById('grade');
            const completionDate = document.getElementById('completionDate');
            const codeDisplay = document.getElementById('certificateCodeDisplay');
            const codeHidden = document.getElementById('certificateCodeHidden');
            const academySelect = document.getElementById('academySelect');
            const branchSelect = document.getElementById('branchSelect');
            const licenseDisplay = document.getElementById('academyLicenseDisplay');

            if (titleEl) titleEl.textContent = 'تعديل شهادة';
            if (editEl) editEl.value = code;
            if (studentName) studentName.value = cert.studentName || '';
            if (studentNationalId) studentNationalId.value = cert.studentNationalId || '';
            if (courseName) courseName.value = cert.courseName || '';
            if (courseHours) courseHours.value = cert.courseHours || '';
            if (grade) grade.value = cert.grade || '';

            if (cert.completionDate) {
                const d = cert.completionDate.toDate ? cert.completionDate.toDate() : new Date(cert.completionDate);
                if (completionDate) completionDate.value = d.toISOString().split('T')[0];
            }

            if (codeDisplay) {
                codeDisplay.value = cert.certificateCode || '';
                codeDisplay.readOnly = false;
                codeDisplay.style.background = 'var(--bg-hover)';
                codeDisplay.style.color = 'var(--text-color)';
            }
            if (codeHidden) codeHidden.value = cert.certificateCode || '';

            const academyId = cert.academyId || '';
            if (academySelect) academySelect.value = academyId;
            updateAcademyFields();

            if (cert.branchId && branchSelect) {
                branchSelect.value = cert.branchId;
            }

            const modal = document.getElementById('certModal');
            if (modal) modal.classList.add('show');
        }

        // ============================================================
        // 20. حفظ الشهادة
        // ============================================================
        function saveCertificate(e) {
            e.preventDefault();

            const editCode = document.getElementById('editCode')?.value || '';
            const studentName = document.getElementById('studentName')?.value.trim() || '';
            const studentNationalId = document.getElementById('studentNationalId')?.value.trim() || '';
            const courseName = document.getElementById('courseName')?.value.trim() || '';
            const courseHours = document.getElementById('courseHours')?.value || 'غير محدد';
            const grade = document.getElementById('grade')?.value || '';
            const completionDate = document.getElementById('completionDate')?.value || '';
            const academyId = document.getElementById('academySelect')?.value || '';
            const branchId = document.getElementById('branchSelect')?.value || '';
            const certificateCode = document.getElementById('certificateCodeDisplay')?.value.trim() || '';

            if (!studentName || !courseName || !grade || !completionDate || !academyId || !branchId) {
                showMsg('الرجاء ملء جميع الحقول المطلوبة', 'info');
                return false;
            }

            if (!certificateCode) {
                showMsg('كود الشهادة مطلوب', 'info');
                return false;
            }

            const academy = academies.find(function(a) { return a.id === academyId; });
            const academyName = academy ? academy.name : '';
            const licenseNumber = academy ? academy.licenseNumber : '';

            let branchName = '';
            let branchGovernorate = '';
            if (academy && academy.branches) {
                const branch = academy.branches.find(function(b) { return (b.branchId || 'main') === branchId; });
                if (branch) {
                    branchName = branch.governorate;
                    branchGovernorate = branch.governorate;
                }
            }

            const certData = {
                studentName: studentName,
                studentNationalId: studentNationalId || '',
                courseName: courseName,
                courseHours: courseHours,
                grade: grade,
                completionDate: new Date(completionDate),
                academyId: academyId,
                branchId: branchId,
                branchName: branchName,
                branchGovernorate: branchGovernorate,
                academyName: academyName,
                academyLicenseNumber: licenseNumber,
                updatedAt: new Date(),
                updatedBy: currentUser ? currentUser.uid : 'system',
                isActive: true
            };

            let savePromise;
            let actionType;

            if (editCode) {
                if (certificateCode !== editCode) {
                    const existing = certificates.find(function(c) { return c.certificateCode === certificateCode && c.certificateCode !== editCode; });
                    if (existing) {
                        showMsg('كود الشهادة موجود بالفعل', 'error');
                        return false;
                    }

                    db.collection('certificates').doc(editCode).delete().catch(function() {});

                    certData.certificateCode = certificateCode;
                    certData.issuedAt = new Date();
                    certData.issuedBy = currentUser ? currentUser.uid : 'system';
                    savePromise = db.collection('certificates').doc(certificateCode).set(certData);
                    actionType = 'update';
                } else {
                    certData.certificateCode = certificateCode;
                    savePromise = db.collection('certificates').doc(editCode).update(certData);
                    actionType = 'update';
                }

                db.collection('activities').add({
                    userId: currentUser ? currentUser.uid : 'system',
                    userEmail: currentUser ? currentUser.email : 'system',
                    userName: 'أدمن',
                    userRole: userRole || 'admin',
                    type: 'update_certificate',
                    description: 'تعديل شهادة: ' + certificateCode,
                    timestamp: new Date(),
                    ipAddress: 'auto',
                    userAgent: navigator.userAgent
                }).catch(function() {});

            } else {
                const existing = certificates.find(function(c) { return c.certificateCode === certificateCode; });
                if (existing) {
                    showMsg('كود الشهادة موجود بالفعل', 'error');
                    return false;
                }

                certData.certificateCode = certificateCode;
                certData.issuedAt = new Date();
                certData.issuedBy = currentUser ? currentUser.uid : 'system';
                savePromise = db.collection('certificates').doc(certificateCode).set(certData);
                actionType = 'create';

                db.collection('activities').add({
                    userId: currentUser ? currentUser.uid : 'system',
                    userEmail: currentUser ? currentUser.email : 'system',
                    userName: 'أدمن',
                    userRole: userRole || 'admin',
                    type: 'create_certificate',
                    description: 'إضافة شهادة جديدة: ' + certificateCode,
                    timestamp: new Date(),
                    ipAddress: 'auto',
                    userAgent: navigator.userAgent
                }).catch(function() {});
            }

            savePromise.then(function() {
                closeModal();
                showMsg('تم ' + (actionType === 'update' ? 'تحديث' : 'إضافة') + ' الشهادة بنجاح', 'success');
                loadCertificates();
            }).catch(function(err) {
                showMsg('حدث خطأ: ' + err.message, 'error');
            });

            return false;
        }

        // ============================================================
        // 21. مودال الحذف
        // ============================================================
        function openDeleteModal(code) {
            const cert = certificates.find(function(c) { return c.certificateCode === code; });
            if (!cert) {
                showMsg('الشهادة غير موجودة', 'error');
                return;
            }

            deleteTargetCode = code;
            const nameEl = document.getElementById('deleteStudentName');
            const codeEl = document.getElementById('deleteCertCode');
            const nationalEl = document.getElementById('deleteNationalId');

            if (nameEl) nameEl.textContent = cert.studentName || '-';
            if (codeEl) codeEl.textContent = cert.certificateCode || '-';
            if (nationalEl) nationalEl.textContent = cert.studentNationalId || '-';

            const modal = document.getElementById('deleteModal');
            if (modal) modal.classList.add('show');
        }

        function closeDeleteModal() {
            const modal = document.getElementById('deleteModal');
            if (modal) modal.classList.remove('show');
            deleteTargetCode = null;
        }

        function confirmDelete() {
            if (!deleteTargetCode) {
                showMsg('لم يتم تحديد الشهادة', 'error');
                return;
            }

            const cert = certificates.find(function(c) { return c.certificateCode === deleteTargetCode; });
            if (!cert) {
                showMsg('الشهادة غير موجودة', 'error');
                return;
            }

            db.collection('certificates').doc(deleteTargetCode).update({
                isActive: false,
                deletedAt: new Date(),
                deletedBy: currentUser ? currentUser.uid : 'system'
            }).then(function() {
                closeDeleteModal();
                showMsg('تم حذف الشهادة بنجاح', 'success');
                db.collection('activities').add({
                    userId: currentUser ? currentUser.uid : 'system',
                    userEmail: currentUser ? currentUser.email : 'system',
                    userName: 'أدمن',
                    userRole: userRole || 'admin',
                    type: 'delete_certificate',
                    description: 'حذف شهادة: ' + deleteTargetCode,
                    details: {
                        studentName: cert.studentName,
                        certificateCode: deleteTargetCode,
                        nationalId: cert.studentNationalId
                    },
                    timestamp: new Date(),
                    ipAddress: 'auto',
                    userAgent: navigator.userAgent
                }).catch(function() {});
                loadCertificates();
            }).catch(function(err) {
                showMsg('حدث خطأ: ' + err.message, 'error');
            });
        }

        // ============================================================
        // 22. إغلاق المودالات
        // ============================================================
        function closeModal() {
            const modal = document.getElementById('certModal');
            if (modal) modal.classList.remove('show');
        }

        document.getElementById('certModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('deleteModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeDeleteModal();
        });

        document.getElementById('viewModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeViewModal();
        });

        // ============================================================
        // 23. عرض الرسائل
        // ============================================================
        function showMsg(msg, type) {
            const el = document.getElementById('pageMsg');
            if (!el) return;

            el.textContent = msg;
            el.className = 'msg show ' + type;
            setTimeout(function() { el.className = 'msg'; }, 4000);
        }

        // ============================================================
        // 24. تحميل الصفحة
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            console.log('✅ إدارة الشهادات - كل حرف من الإعدادات');
            console.log('👤 النقيب العام: ' + settings.presidentName);
            console.log('🎨 الألوان من الإعدادات');
            console.log('📋 دعم الرقم القومي للمتدربين');
        });
    </script>

</body>
