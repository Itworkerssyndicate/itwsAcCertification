    <style>
        /* ===== تصميم شاشة الترحيب (Splash Screen) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.5s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --text-color: #FFFFFF;
            --text-muted: rgba(255,255,255,0.4);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
        }

        /* ===== الخلفية ===== */
        .splash-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%);
            animation: bgPulse 6s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        /* ===== الجسيمات ===== */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 8px; height: 8px; top: 10%; left: 10%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 12px; height: 12px; top: 20%; left: 40%; animation-delay: 2s; background: var(--accent-color); opacity: 0.2; }
        .particle:nth-child(3) { width: 6px; height: 6px; top: 30%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 10px; height: 10px; top: 50%; left: 15%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 7px; height: 7px; top: 60%; left: 80%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 14px; height: 14px; top: 75%; left: 30%; animation-delay: 5s; background: var(--accent-color); opacity: 0.15; }
        .particle:nth-child(7) { width: 5px; height: 5px; top: 85%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 9px; height: 9px; top: 40%; left: 90%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.2; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            25% { transform: translate(30px, -40px) scale(1.2); opacity: 0.6; }
            50% { transform: translate(-20px, -70px) scale(0.8); opacity: 0.3; }
            75% { transform: translate(40px, -30px) scale(1.3); opacity: 0.7; }
        }

        /* ===== الحلقات ===== */
        .rings {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.05);
            animation: spin 30s linear infinite;
        }

        .ring:nth-child(1) { width: 300px; height: 300px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 450px; height: 450px; border-color: rgba(124,58,237,0.04); animation-duration: 40s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 600px; height: 600px; border-color: rgba(59,130,246,0.03); animation-duration: 50s; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== المحتوى ===== */
        .splash-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .splash-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 50px 60px;
            text-align: center;
            max-width: 520px;
            width: 100%;
            box-shadow: var(--shadow);
            animation: fadeUp 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: all 0.5s ease;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 60px var(--primary-glow);
            background-size: cover;
            background-position: center;
            transition: all 0.5s ease;
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 40px var(--primary-glow); }
            50% { box-shadow: 0 0 80px var(--primary-glow), 0 0 120px var(--accent-glow); }
        }

        .splash-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--text-color) 0%, var(--primary-color) 40%, var(--accent-light) 70%, var(--text-color) 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titleFlow 4s ease-in-out infinite;
        }

        @keyframes titleFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .splash-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .splash-committee {
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0.6;
            margin-bottom: 20px;
        }

        .splash-divider {
            width: 60px;
            height: 2px;
            margin: 12px auto;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            border-radius: 2px;
        }

        .splash-president {
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0.5;
            margin-top: 8px;
        }

        .splash-president span {
            color: var(--primary-color);
            opacity: 0.8;
            font-weight: 600;
        }

        /* ===== شريط التحميل ===== */
        .progress-container {
            margin-top: 24px;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 4px;
            animation: loading 2.5s ease-in-out forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            30% { width: 30%; }
            60% { width: 65%; }
            85% { width: 85%; }
            100% { width: 100%; }
        }

        .progress-text {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.4;
            margin-top: 6px;
            letter-spacing: 2px;
        }

        /* ===== الفوتر ===== */
        .splash-footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.3;
            letter-spacing: 1px;
        }

        /* ===== رسالة ===== */
        .msg {
            display: none;
            border-radius: 12px;
            padding: 10px 16px;
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
        }

        .msg.show { display: block; animation: fadeIn 0.3s ease; }
        .msg.error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.2); color: #EF4444; }
        .msg.success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.2); color: #10B981; }
        .msg.info { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.2); color: #3B82F6; }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== تخطيط للشاشات الصغيرة ===== */
        @media (max-width: 768px) {
            .splash-card { padding: 30px 24px; max-width: 400px; }
            .splash-logo { width: 90px; height: 90px; font-size: 36px; }
            .splash-title { font-size: 22px; }
            .splash-subtitle { font-size: 13px; }
        }

        @media (max-width: 480px) {
            .splash-card { padding: 24px 16px; max-width: 340px; }
            .splash-logo { width: 70px; height: 70px; font-size: 28px; }
            .splash-title { font-size: 18px; }
            .splash-subtitle { font-size: 12px; }
            .splash-committee { font-size: 11px; }
            .splash-president { font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- ===== الخلفية ===== -->
    <div class="splash-bg"></div>

    <!-- ===== الجسيمات ===== -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

    <div class="rings">

    <!-- ===== المحتوى ===== -->
    <div class="splash-container">

            <!-- اللوجو -->
            <div class="splash-logo" id="splashLogo">ن.ت</div>

            <h1 class="splash-title" id="splashTitle">نقابة تكنولوجيا المعلومات</h1>

            <!-- النص التعريفي -->
            <p class="splash-subtitle" id="splashSubtitle">النظام الرسمي للتحقق من صحة الشهادات التدريبية</p>

    <!-- ===== الفوتر ===== -->
    <div class="splash-footer" id="splashFooter">
        <span id="footerText">© 2026 نقابة تكنولوجيا المعلومات - جميع الحقوق محفوظة</span>
    </div>

    <script>
        // ============================================================
        // 1. تهيئة Firebase
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBfrK1IBCk2mim6cVbbtSd1e4FOQcpYQeo",
            authDomain: "itwsaccertification.firebaseapp.com",
            projectId: "itwsaccertification",
            storageBucket: "itwsaccertification.firebasestorage.app",
            messagingSenderId: "521196512526",
            appId: "1:521196512526:web:b78b06dd87cf4f5ca1e35f",
            measurementId: "G-JBMGW74DV4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================================
        // 2. متغيرات
        // ============================================================
        let settings = {
            unionName: 'نقابة تكنولوجيا المعلومات',
            committeeName: 'لجنة التحول الرقمي والتدريب',
            logoUrl: '',
            footerText: '© 2026 نقابة تكنولوجيا المعلومات - جميع الحقوق محفوظة',
            presidentName: 'المهندس / محمود جميل',
            presidentLabel: 'النقيب العام:',
            heroSubtitle: 'النظام الرسمي للتحقق من صحة الشهادات التدريبية',
            colors: {
                primary: '#C9A84C',
                accent: '#7C3AED',
                background: '#0A0E1A',
                text: '#FFFFFF',
                textMuted: 'rgba(255,255,255,0.4)',
            }
        };

        let splashDuration = 3;

        // ============================================================
        // 3. جلب الإعدادات (onSnapshot للتحديث الفوري)
        // ============================================================
        function loadSettings() {
            db.collection('settings').doc('general').onSnapshot(function(doc) {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.unionName) settings.unionName = data.unionName;
                    if (data.committeeName) settings.committeeName = data.committeeName;
                    if (data.logoUrl) settings.logoUrl = data.logoUrl;
                    if (data.footerText) settings.footerText = data.footerText;
                    if (data.presidentName) settings.presidentName = data.presidentName;
                    if (data.presidentLabel) settings.presidentLabel = data.presidentLabel;
                    if (data.heroSubtitle) settings.heroSubtitle = data.heroSubtitle;
                    if (data.splashDuration) splashDuration = data.splashDuration || 3;
                    if (data.colors) settings.colors = { ...settings.colors, ...data.colors };
                }
                applySettings();
                applyColors(settings.colors);
                console.log('  تحديث فوري: الإعدادات العامة (Splash)');
            }, function(error) {
                console.warn('⚠️ خطأ في الاستماع للإعدادات:', error);
                applySettings();
                applyColors(settings.colors);
            });

            db.collection('settings').doc('design').onSnapshot(function(doc) {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.colors) {
                        settings.colors = { ...settings.colors, ...data.colors };
                    }
                }
                applyColors(settings.colors);
                console.log('  تحديث فوري: التصميم (Splash)');
            }, function(error) {
                console.warn('⚠️ خطأ في الاستماع للتصميم:', error);
            });
        }

        // ============================================================
        // 4. تطبيق الإعدادات
        // ============================================================
        function applySettings() {
            const titleEl = document.getElementById('splashTitle');
            const subtitleEl = document.getElementById('splashSubtitle');
            const committeeEl = document.getElementById('splashCommittee');
            const presidentLabelEl = document.getElementById('presidentLabel');
            const presidentNameEl = document.getElementById('presidentName');
            const footerEl = document.getElementById('footerText');
            const logoEl = document.getElementById('splashLogo');

            if (titleEl) titleEl.textContent = settings.unionName;
            if (subtitleEl) subtitleEl.textContent = settings.heroSubtitle || 'النظام الرسمي للتحقق من صحة الشهادات التدريبية';
            if (committeeEl) committeeEl.textContent = settings.committeeName;
            if (presidentLabelEl) presidentLabelEl.textContent = settings.presidentLabel || 'النقيب العام:';
            if (presidentNameEl) presidentNameEl.textContent = settings.presidentName;
            if (footerEl) footerEl.textContent = settings.footerText;

            if (settings.logoUrl) {
                if (logoEl) {
                    logoEl.style.backgroundImage = 'url(' + settings.logoUrl + ')';
                    logoEl.style.backgroundSize = 'cover';
                    logoEl.style.backgroundPosition = 'center';
                    logoEl.textContent = '';
                }
            } else {
                if (logoEl) {
                    logoEl.style.backgroundImage = '';
                    logoEl.textContent = 'ن.ت';
                }
            }

            // ===== تحديث عنوان الصفحة =====
            const pageTitle = document.getElementById('pageTitle');
            if (pageTitle) {
                pageTitle.textContent = settings.unionName + ' - النظام الرسمي للتحقق من الشهادات';
            }

            // ===== OG Tags =====
            const ogTitle = document.getElementById('ogTitle');
            const ogDescription = document.getElementById('ogDescription');
            const ogImage = document.getElementById('ogImage');
            const ogUrl = document.getElementById('ogUrl');
            const ogSiteName = document.getElementById('ogSiteName');
            const twitterTitle = document.getElementById('twitterTitle');
            const twitterDescription = document.getElementById('twitterDescription');
            const twitterImage = document.getElementById('twitterImage');
            const favicon = document.getElementById('favicon');
            const appleIcon = document.getElementById('appleIcon');

            if (ogTitle) ogTitle.content = settings.unionName + ' - النظام الرسمي للتحقق من الشهادات';
            if (ogDescription) ogDescription.content = settings.heroSubtitle || 'النظام الرسمي للتحقق من صحة الشهادات التدريبية';
            if (ogUrl) ogUrl.content = window.location.href;
            if (ogSiteName) ogSiteName.content = settings.unionName;
            if (twitterTitle) twitterTitle.content = settings.unionName + ' - النظام الرسمي للتحقق من الشهادات';
            if (twitterDescription) twitterDescription.content = settings.heroSubtitle || 'النظام الرسمي للتحقق من صحة الشهادات التدريبية';

            if (settings.logoUrl) {
                if (ogImage) ogImage.content = settings.logoUrl;
                if (twitterImage) twitterImage.content = settings.logoUrl;
                if (favicon) favicon.href = settings.logoUrl;
                if (appleIcon) appleIcon.href = settings.logoUrl;
            }
        }

        // ============================================================
        // 5. تطبيق الألوان
        // ============================================================
        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

        // ============================================================
        // 6. التوجيه للصفحة الرئيسية
        // ============================================================
        function redirectToHome() {
            const progressText = document.getElementById('progressText');
            if (progressText) progressText.textContent = 'جاري التوجية';

            setTimeout(function() {
                window.location.href = 'home.html';
            }, 500);
        }

        // ============================================================
        // 7. عرض رسالة
        // ============================================================
        function showMsg(msg, type) {
            const el = document.getElementById('splashMsg');
            if (!el) return;
            el.textContent = msg;
            el.className = 'msg show ' + type;
        }

        // ============================================================
        // 8. بدء التشغيل
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('شاشة الترحيب (Splash Screen)');

            loadSettings();

            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            const duration = splashDuration || 3;

            const steps = [
                { percent: 20, text: 'جاري تحميل الإعدادات...' },
                { percent: 40, text: 'جاري تهيئة المنصة...' },
                { percent: 60, text: 'جاري تحميل البيانات...' },
                { percent: 80, text: 'جاري التجهيز للدخول...' },
                { percent: 100, text: 'تم التحميل بنجاح' },
            ];

            let currentStep = 0;

            const interval = setInterval(function() {
                if (currentStep < steps.length) {
                    const step = steps[currentStep];
                    if (progressBar) progressBar.style.width = step.percent + '%';
                    if (progressText) progressText.textContent = step.text;
                    currentStep++;
                } else {
                    clearInterval(interval);
                    setTimeout(redirectToHome, 300);
                }
            }, (duration * 1000) / steps.length);

            setTimeout(function() {
                if (currentStep < steps.length) {
                    if (progressBar) progressBar.style.width = '100%';
                    if (progressText) progressText.textContent = ' جاري التوجيه';
                    clearInterval(interval);
                    setTimeout(redirectToHome, 300);
                }
            }, (duration * 1000) + 1000);
        });
    </script>

</body>
</html>
