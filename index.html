<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نقابة تكنولوجيا المعلومات - نظام التوثيق</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <style>
        /* ============================================================
           التصميم المتطور - خلفية ذكاء اصطناعي فخمة
           ============================================================ */
        
        /* ===== إعادة تعيين وإعدادات عامة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: #050a18;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            direction: rtl;
        }

        /* ===== خلفية ذكاء اصطناعي سينمائية ===== */
        .splash-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(0, 100, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(138, 43, 226, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 200, 255, 0.06) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.08) rotate(2deg); opacity: 0.9; }
        }

        .splash-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .splash-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(5, 10, 24, 0.3) 100%);
            pointer-events: none;
        }

        /* ===== جزيئات ذكية متحركة ===== */
        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 20s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: rgba(0, 150, 255, 0.4); }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: rgba(138, 43, 226, 0.4); }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: rgba(0, 200, 255, 0.5); }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: rgba(255, 100, 200, 0.3); }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: rgba(0, 255, 200, 0.4); }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: rgba(100, 50, 255, 0.3); }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: rgba(0, 150, 255, 0.5); }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: rgba(200, 100, 255, 0.35); }
        .particle:nth-child(9) { width: 3px; height: 3px; top: 10%; left: 90%; animation-delay: 1.5s; background: rgba(0, 255, 150, 0.5); }
        .particle:nth-child(10) { width: 8px; height: 8px; top: 45%; left: 55%; animation-delay: 3.5s; background: rgba(50, 100, 255, 0.3); }
        .particle:nth-child(11) { width: 5px; height: 5px; top: 80%; left: 80%; animation-delay: 0.8s; background: rgba(255, 50, 150, 0.3); }
        .particle:nth-child(12) { width: 7px; height: 7px; top: 35%; left: 45%; animation-delay: 4.8s; background: rgba(0, 200, 255, 0.4); }
        .particle:nth-child(13) { width: 4px; height: 4px; top: 55%; left: 15%; animation-delay: 2.2s; background: rgba(150, 50, 255, 0.4); }
        .particle:nth-child(14) { width: 6px; height: 6px; top: 70%; left: 75%; animation-delay: 3.8s; background: rgba(0, 100, 200, 0.4); }
        .particle:nth-child(15) { width: 5px; height: 5px; top: 20%; left: 50%; animation-delay: 0.3s; background: rgba(200, 200, 100, 0.3); }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        /* ===== شبكة تقنية ثلاثية الأبعاد ===== */
        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 150, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        /* ===== حلقات دوارة سينمائية ===== */
        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 100, 255, 0.06);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 300px; height: 300px; border-color: rgba(0, 100, 255, 0.08); }
        .ring:nth-child(2) { width: 500px; height: 500px; border-color: rgba(138, 43, 226, 0.06); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 700px; height: 700px; border-color: rgba(0, 200, 255, 0.04); animation-duration: 60s; }
        .ring:nth-child(4) { width: 900px; height: 900px; border-color: rgba(100, 50, 255, 0.03); animation-duration: 70s; animation-direction: reverse; }
        .ring:nth-child(5) { width: 1100px; height: 1100px; border-color: rgba(0, 150, 200, 0.02); animation-duration: 80s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== كرات ضوئية ناعمة ===== */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -150px;
            right: -150px;
            background: rgba(0, 100, 255, 0.08);
        }

        .glow-orb:nth-child(2) {
            width: 600px;
            height: 600px;
            bottom: -200px;
            left: -200px;
            background: rgba(138, 43, 226, 0.06);
            animation-delay: 6s;
        }

        .glow-orb:nth-child(3) {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 200, 255, 0.04);
            animation-delay: 3s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        /* ===== المحتوى المركزي ===== */
        .splash-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 750px;
            padding: 40px 50px;
            animation: contentFadeIn 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes contentFadeIn {
            0% { opacity: 0; transform: scale(0.85) translateY(50px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ===== شعار النقابة الدوار ===== */
        .union-logo-wrapper {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            position: relative;
        }

        .union-logo-wrapper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 100, 255, 0.3), rgba(138, 43, 226, 0.3), rgba(0, 200, 255, 0.3), transparent);
            animation: rotateConic 8s linear infinite;
            mask: radial-gradient(circle, transparent 65%, black 66%);
            -webkit-mask: radial-gradient(circle, transparent 65%, black 66%);
        }

        @keyframes rotateConic {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .union-logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 100, 255, 0.05), transparent 70%);
            animation: logoGlowPulse 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes logoGlowPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* اللوجو يدور ببطء وجمال */
        .union-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(0, 100, 255, 0.3);
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.15);
            object-fit: cover;
            position: relative;
            z-index: 2;
            animation: logoSpin 20s linear infinite;
            transition: all 0.5s;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .union-logo:hover {
            animation-duration: 4s;
            box-shadow: 0 0 80px rgba(0, 100, 255, 0.3);
            border-color: rgba(0, 100, 255, 0.6);
        }

        /* ===== النصوص الرئيسية ===== */
        .splash-title {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #ffffff 0%, #60a5fa 40%, #a78bfa 70%, #ffffff 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titleShimmer 6s ease-in-out infinite;
            letter-spacing: 2px;
        }

        @keyframes titleShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .splash-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 5px;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .splash-committee {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 5px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .splash-committee span {
            color: rgba(96, 165, 250, 0.5);
        }

        /* ===== اسم النقيب العام ===== */
        .splash-president {
            font-size: 18px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
            padding: 0 20px;
        }

        .splash-president::before,
        .splash-president::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.3), transparent);
        }

        .splash-president::before {
            right: 100%;
        }

        .splash-president::after {
            left: 100%;
        }

        .splash-president .president-name {
            color: #ffffff;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ===== شريط التحميل المتطور ===== */
        .loading-container {
            width: 350px;
            margin: 0 auto 20px;
            position: relative;
        }

        .loading-bar-wrapper {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            animation: loaderSweep 2s linear infinite;
        }

        @keyframes loaderSweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0066ff, #8b5cf6, #00ccff, #8b5cf6, #0066ff);
            background-size: 200% 100%;
            border-radius: 4px;
            animation: loadingShimmer 2s linear infinite;
            transition: width 0.3s ease;
            position: relative;
        }

        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .loading-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .loading-text .percentage {
            color: rgba(96, 165, 250, 0.6);
            font-weight: 600;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            min-width: 45px;
        }

        .loading-text .dots {
            display: inline-flex;
            gap: 5px;
        }

        .loading-text .dots span {
            width: 4px;
            height: 4px;
            background: rgba(96, 165, 250, 0.3);
            border-radius: 50%;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .loading-text .dots span:nth-child(1) { animation-delay: 0s; }
        .loading-text .dots span:nth-child(2) { animation-delay: 0.3s; }
        .loading-text .dots span:nth-child(3) { animation-delay: 0.6s; }

        @keyframes dotPulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 0.3; }
        }

        /* ===== معلومات الإصدار ===== */
        .splash-footer {
            position: fixed;
            bottom: 30px;
            right: 50%;
            transform: translateX(50%);
            z-index: 10;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.08);
            letter-spacing: 2px;
            font-weight: 300;
        }

        .splash-footer .version {
            color: rgba(255, 255, 255, 0.05);
            font-family: 'Courier New', monospace;
        }

        .splash-footer .separator {
            margin: 0 8px;
            color: rgba(255, 255, 255, 0.04);
        }

        /* ===== زر تخطي ===== */
        .splash-skip {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.3);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .splash-skip:hover {
            background: rgba(0, 100, 255, 0.15);
            border-color: rgba(0, 100, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.1);
        }

        /* ===== استجابة للأجهزة ===== */
        @media (max-width: 768px) {
            .splash-title { font-size: 32px; }
            .union-logo-wrapper { width: 130px; height: 130px; }
            .loading-container { width: 280px; }
            .splash-subtitle { font-size: 15px; }
            .splash-president { font-size: 16px; }
            .splash-content { padding: 30px 25px; }
            .ring:nth-child(1) { width: 250px; height: 250px; }
            .ring:nth-child(2) { width: 400px; height: 400px; }
            .ring:nth-child(3) { width: 550px; height: 550px; }
            .ring:nth-child(4) { width: 700px; height: 700px; }
            .ring:nth-child(5) { width: 850px; height: 850px; }
            .splash-skip { bottom: 20px; left: 20px; padding: 6px 16px; font-size: 11px; }
            .splash-footer { bottom: 20px; font-size: 10px; }
        }

        @media (max-width: 480px) {
            .splash-title { font-size: 26px; }
            .union-logo-wrapper { width: 110px; height: 110px; }
            .loading-container { width: 220px; }
            .splash-subtitle { font-size: 13px; }
            .splash-committee { font-size: 12px; }
            .splash-president { font-size: 14px; }
            .splash-president::before,
            .splash-president::after { width: 15px; }
            .splash-content { padding: 20px 16px; }
            .ring:nth-child(1) { width: 180px; height: 180px; }
            .ring:nth-child(2) { width: 280px; height: 280px; }
            .ring:nth-child(3) { width: 380px; height: 380px; }
            .ring:nth-child(4) { width: 480px; height: 480px; }
            .ring:nth-child(5) { width: 580px; height: 580px; }
            .splash-skip { bottom: 15px; left: 15px; padding: 5px 14px; font-size: 10px; }
            .splash-footer { bottom: 15px; font-size: 9px; }
        }

        @media (max-width: 360px) {
            .splash-title { font-size: 22px; }
            .union-logo-wrapper { width: 90px; height: 90px; }
            .loading-container { width: 180px; }
            .splash-president { font-size: 12px; }
            .splash-content { padding: 16px 12px; }
        }

        /* ===== منع الطباعة ===== */
        @media print {
            * { display: none !important; }
            body::before {
                content: 'لا يمكن طباعة هذه الصفحة';
                display: flex;
                align-items: center;
                justify-content: center;
                position: fixed;
                inset: 0;
                background: #050a18;
                color: #ef4444;
                font-size: 28px;
                z-index: 999999;
                font-family: 'Segoe UI', 'Tahoma', sans-serif;
            }
        }
    </style>
</head>
<body>

    <!-- ===== خلفية ذكاء اصطناعي ===== -->
    <div class="splash-bg"></div>

    <!-- ===== كرات ضوئية ===== -->
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>

    <!-- ===== جزيئات متحركة ===== -->
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- ===== شبكة تقنية ===== -->
    <div class="grid-lines"></div>

    <!-- ===== حلقات دوارة ===== -->
    <div class="orbital-ring">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <!-- ===== المحتوى المركزي ===== -->
    <div class="splash-content">

        <!-- الشعار الدوار - يتم جلب الصورة من الإعدادات -->
        <div class="union-logo-wrapper">
            <img src="https://placehold.co/160x160/0a0f1f/00ffff/png?text=ن.ت" alt="شعار النقابة" class="union-logo" id="splashLogo">
        </div>

        <!-- العناوين - يتم جلبها من الإعدادات -->
        <h1 class="splash-title" id="unionName">نقابة تكنولوجيا المعلومات</h1>
        <p class="splash-subtitle">نظام توثيق الشهادات التدريبية</p>
        <p class="splash-committee">لجنة <span id="committeeName">التحول الرقمي والتدريب</span></p>

        <!-- اسم النقيب العام - يتم جلبها من الإعدادات -->
        <div class="splash-president">
            النقيب العام
            <span class="president-name" id="presidentName">المهندس / محمود جميل</span>
        </div>

        <!-- شريط التحميل -->
        <div class="loading-container">
            <div class="loading-bar-wrapper">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <div class="loading-text">
                <span>جاري تجهيز المنصة</span>
                <span class="dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
                <span class="percentage" id="loadingPercent">0%</span>
            </div>
        </div>

    </div>

    <!-- ===== زر تخطي ===== -->
    <button class="splash-skip" onclick="skipSplash()">
        <span>تخطي</span>
        <span style="font-size:14px;">→</span>
    </button>

    <!-- ===== التذييل ===== -->
    <div class="splash-footer">
        <span class="version" id="systemVersion">v1.0.0</span>
        <span class="separator">•</span>
        <span>نقابة تكنولوجيا المعلومات والبرمجيات</span>
    </div>

    <!-- ============================================================
    جافا سكريبت المتطور
    ============================================================ -->
    <script>
        // ============================================================
        // 1. تهيئة Firebase
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBfrK1IBCk2mim6cVbbtSd1e4FOQcpYQeo",
            authDomain: "itwsaccertification.firebaseapp.com",
            projectId: "itwsaccertification",
            storageBucket: "itwsaccertification.firebasestorage.app",
            messagingSenderId: "521196512526",
            appId: "1:521196512526:web:b78b06dd87cf4f5ca1e35f",
            measurementId: "G-JBMGW74DV4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================================
        // 2. عناصر الصفحة
        // ============================================================
        const loadingBar = document.getElementById('loadingBar');
        const loadingPercent = document.getElementById('loadingPercent');
        const unionNameEl = document.getElementById('unionName');
        const committeeNameEl = document.getElementById('committeeName');
        const presidentNameEl = document.getElementById('presidentName');
        const splashLogo = document.getElementById('splashLogo');
        const versionEl = document.getElementById('systemVersion');

        // ============================================================
        // 3. الإعدادات الافتراضية
        // ============================================================
        const DEFAULT_SETTINGS = {
            unionName: 'نقابة تكنولوجيا المعلومات',
            committeeName: 'التحول الرقمي والتدريب',
            presidentName: 'المهندس / محمود جميل',
            splashDuration: 4000,
            logoUrl: 'https://placehold.co/160x160/0a0f1f/00ffff/png?text=ن.ت',
            systemVersion: 'v1.0.0'
        };

        let settings = { ...DEFAULT_SETTINGS };

        // ============================================================
        // 4. جلب الإعدادات من Firestore
        // ============================================================
        async function loadSettingsFromFirestore() {
            try {
                const docRef = db.collection('settings').doc('general');
                const doc = await docRef.get();

                if (doc.exists) {
                    const data = doc.data();

                    if (data.unionName) {
                        settings.unionName = data.unionName;
                        unionNameEl.textContent = data.unionName;
                    }

                    if (data.committeeName) {
                        settings.committeeName = data.committeeName;
                        committeeNameEl.textContent = data.committeeName;
                    }

                    if (data.presidentName) {
                        settings.presidentName = data.presidentName;
                        presidentNameEl.textContent = data.presidentName;
                    }

                    if (data.splashDuration) {
                        settings.splashDuration = data.splashDuration * 1000;
                    }

                    if (data.logoUrl) {
                        settings.logoUrl = data.logoUrl;
                        splashLogo.src = data.logoUrl;
                    }

                    if (data.systemVersion) {
                        settings.systemVersion = data.systemVersion;
                        versionEl.textContent = data.systemVersion;
                    }

                    console.log('✅ تم جلب الإعدادات من Firestore:', settings);
                } else {
                    console.log('ℹ️ لا توجد إعدادات مسجلة، استخدام القيم الافتراضية');
                }
            } catch (err) {
                console.error('❌ خطأ في جلب الإعدادات:', err.message);
            }
        }

        // ============================================================
        // 5. تشغيل شريط التحميل
        // ============================================================
        function startLoading() {
            let progress = 0;
            const interval = 25;
            const totalSteps = settings.splashDuration / interval;
            const increment = 100 / totalSteps;

            const loadingInterval = setInterval(() => {
                progress += increment;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(loadingInterval);
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 400);
                }

                loadingBar.style.width = progress + '%';
                const percent = Math.round(progress);
                loadingPercent.textContent = percent + '%';

                if (percent > 80) {
                    loadingBar.style.background = 'linear-gradient(90deg, #8b5cf6, #00ccff, #8b5cf6)';
                } else if (percent > 50) {
                    loadingBar.style.background = 'linear-gradient(90deg, #0066ff, #8b5cf6, #0066ff)';
                } else {
                    loadingBar.style.background = 'linear-gradient(90deg, #0066ff, #00ccff, #0066ff)';
                }

            }, interval);
        }

        // ============================================================
        // 6. تخطي شاشة الترحيب
        // ============================================================
        function skipSplash() {
            window.location.href = 'home.html';
        }

        // ============================================================
        // 7. التحقق من حالة المستخدم
        // ============================================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                db.collection('users').doc(user.uid).get()
                    .then(function(doc) {
                        if (doc.exists) {
                            const data = doc.data();
                            sessionStorage.setItem('userData', JSON.stringify({
                                uid: user.uid,
                                email: user.email,
                                displayName: data.displayName || 'مستخدم',
                                role: data.role || 'user',
                                isActive: data.isActive !== false
                            }));
                        }
                    })
                    .catch(function(err) {
                        console.error('❌ خطأ في جلب بيانات المستخدم:', err);
                    });
            } else {
                sessionStorage.removeItem('userData');
            }
        });

        // ============================================================
        // 8. تشغيل الصفحة
        // ============================================================
        async function init() {
            await loadSettingsFromFirestore();
            startLoading();

            splashLogo.onerror = function() {
                this.src = DEFAULT_SETTINGS.logoUrl;
            };
        }

        init();

        console.log('✅ الصفحة الترحيبية - نقابة تكنولوجيا المعلومات');
        console.log('📌 الإصدار:', settings.systemVersion);
        console.log('⏳ مدة العرض:', settings.splashDuration / 1000, 'ثانية');
        console.log('👤 النقيب العام:', settings.presidentName);
        console.log('🔒 نظام أمني متطور');
        console.log('🧠 محسّن بالذكاء الاصطناعي');
    </script>

</body>
</html>
