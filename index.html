<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نقابة تكنولوجيا المعلومات</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <style>
        /* ============================================================
           التصميم الكامل للشاشة الترحيبية (Splash Screen)
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: #0a0e1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            direction: rtl;
        }

        /* ===== خلفية ذكاء اصطناعي متقدمة ===== */
        .splash-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(0, 85, 230, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(100, 50, 255, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 200, 150, 0.05) 0%, transparent 60%);
            animation: bgPulse 10s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                transform: scale(1) rotate(0deg);
            }
            100% {
                transform: scale(1.05) rotate(2deg);
            }
        }

        .splash-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .splash-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(10, 14, 26, 0.4) 100%);
            pointer-events: none;
        }

        /* ===== جزيئات متحركة ذكية ===== */
        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(100, 200, 255, 0.08);
            animation: particleFloat 25s infinite ease-in-out;
        }

        .particle:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 5%;
            left: 3%;
            animation-delay: 0s;
            background: radial-gradient(circle, rgba(0, 85, 230, 0.10), transparent);
        }
        .particle:nth-child(2) {
            width: 180px;
            height: 180px;
            bottom: 8%;
            right: 2%;
            animation-delay: 4s;
            background: radial-gradient(circle, rgba(100, 50, 255, 0.08), transparent);
        }
        .particle:nth-child(3) {
            width: 90px;
            height: 90px;
            top: 45%;
            left: 55%;
            animation-delay: 2s;
            background: radial-gradient(circle, rgba(0, 200, 150, 0.06), transparent);
        }
        .particle:nth-child(4) {
            width: 220px;
            height: 220px;
            bottom: 25%;
            left: 15%;
            animation-delay: 6s;
            background: radial-gradient(circle, rgba(0, 85, 230, 0.05), transparent);
        }
        .particle:nth-child(5) {
            width: 70px;
            height: 70px;
            top: 18%;
            right: 22%;
            animation-delay: 3s;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.12), transparent);
        }
        .particle:nth-child(6) {
            width: 140px;
            height: 140px;
            top: 65%;
            right: 45%;
            animation-delay: 5s;
            background: radial-gradient(circle, rgba(100, 50, 255, 0.06), transparent);
        }
        .particle:nth-child(7) {
            width: 100px;
            height: 100px;
            bottom: 3%;
            left: 35%;
            animation-delay: 1s;
            background: radial-gradient(circle, rgba(0, 200, 150, 0.08), transparent);
        }
        .particle:nth-child(8) {
            width: 200px;
            height: 200px;
            top: 8%;
            right: 55%;
            animation-delay: 7s;
            background: radial-gradient(circle, rgba(0, 85, 230, 0.04), transparent);
        }
        .particle:nth-child(9) {
            width: 60px;
            height: 60px;
            top: 80%;
            left: 8%;
            animation-delay: 2.5s;
            background: radial-gradient(circle, rgba(100, 50, 255, 0.10), transparent);
        }
        .particle:nth-child(10) {
            width: 160px;
            height: 160px;
            top: 35%;
            right: 10%;
            animation-delay: 4.5s;
            background: radial-gradient(circle, rgba(0, 200, 150, 0.05), transparent);
        }
        .particle:nth-child(11) {
            width: 80px;
            height: 80px;
            top: 12%;
            left: 45%;
            animation-delay: 1.5s;
            background: radial-gradient(circle, rgba(0, 85, 230, 0.09), transparent);
        }
        .particle:nth-child(12) {
            width: 130px;
            height: 130px;
            bottom: 15%;
            right: 30%;
            animation-delay: 3.5s;
            background: radial-gradient(circle, rgba(100, 50, 255, 0.07), transparent);
        }

        @keyframes particleFloat {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.2;
            }
            25% {
                transform: translate(40px, -60px) scale(1.2);
                opacity: 0.7;
            }
            50% {
                transform: translate(-30px, -100px) scale(0.8);
                opacity: 0.3;
            }
            75% {
                transform: translate(50px, -40px) scale(1.3);
                opacity: 0.8;
            }
            100% {
                transform: translate(-10px, 0) scale(1);
                opacity: 0.2;
            }
        }

        /* ===== شبكة تقنية ===== */
        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 150, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* ===== حلقة ضوئية دوارة ===== */
        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 85, 230, 0.06);
            animation: ringSpin 35s linear infinite;
        }

        .ring:nth-child(1) {
            width: 350px;
            height: 350px;
            border-color: rgba(0, 85, 230, 0.05);
        }
        .ring:nth-child(2) {
            width: 550px;
            height: 550px;
            border-color: rgba(100, 50, 255, 0.04);
            animation-duration: 45s;
            animation-direction: reverse;
        }
        .ring:nth-child(3) {
            width: 750px;
            height: 750px;
            border-color: rgba(0, 200, 150, 0.03);
            animation-duration: 55s;
        }
        .ring:nth-child(4) {
            width: 950px;
            height: 950px;
            border-color: rgba(0, 85, 230, 0.02);
            animation-duration: 65s;
            animation-direction: reverse;
        }

        @keyframes ringSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== المحتوى المركزي ===== */
        .splash-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 700px;
            padding: 30px;
            animation: contentFadeIn 1.8s ease-out;
        }

        @keyframes contentFadeIn {
            0% {
                opacity: 0;
                transform: scale(0.85) translateY(40px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ===== شعار النقابة ===== */
        .union-logo {
            width: 130px;
            height: 130px;
            margin: 0 auto 28px;
            border-radius: 32px;
            background: linear-gradient(135deg, #0055e6, #5c00e6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 60px rgba(0, 85, 230, 0.25);
            animation: logoGlow 4s ease-in-out infinite alternate;
            position: relative;
        }

        .union-logo::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 36px;
            background: linear-gradient(135deg, #0055e6, #5c00e6, #0055e6);
            background-size: 300% 300%;
            z-index: -1;
            animation: logoBorderGlow 5s ease-in-out infinite alternate;
            filter: blur(10px);
            opacity: 0.4;
        }

        @keyframes logoGlow {
            0% {
                box-shadow: 0 0 40px rgba(0, 85, 230, 0.2);
            }
            100% {
                box-shadow: 0 0 80px rgba(0, 85, 230, 0.5);
            }
        }

        @keyframes logoBorderGlow {
            0% {
                background-position: 0% 50%;
                opacity: 0.3;
            }
            100% {
                background-position: 100% 50%;
                opacity: 0.7;
            }
        }

        .union-logo .sub-icon {
            font-size: 14px;
            font-weight: 400;
            position: absolute;
            bottom: 14px;
            right: 50%;
            transform: translateX(50%);
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* ===== النصوص الرئيسية ===== */
        .splash-title {
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #ffffff 0%, #80b3ff 40%, #ffffff 80%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleShimmer 5s ease-in-out infinite;
            letter-spacing: 1px;
        }

        @keyframes titleShimmer {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .splash-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .splash-committee {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .splash-committee span {
            color: rgba(0, 150, 255, 0.5);
        }

        /* ===== شريط التحميل ===== */
        .loading-container {
            width: 320px;
            margin: 0 auto 20px;
        }

        .loading-bar-wrapper {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0055e6, #5c00e6, #0055e6);
            background-size: 200% 100%;
            border-radius: 4px;
            animation: loadingShimmer 2s linear infinite;
            transition: width 0.3s ease;
        }

        @keyframes loadingShimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .loading-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 8px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .loading-text .percentage {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        /* ===== النقاط المتحركة ===== */
        .dots {
            display: inline-flex;
            gap: 4px;
            margin-right: 6px;
        }

        .dots span {
            width: 6px;
            height: 6px;
            background: rgba(0, 85, 230, 0.3);
            border-radius: 50%;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .dots span:nth-child(1) {
            animation-delay: 0s;
        }
        .dots span:nth-child(2) {
            animation-delay: 0.3s;
        }
        .dots span:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes dotPulse {
            0% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.5);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0.3;
            }
        }

        /* ===== معلومات الإصدار ===== */
        .splash-footer {
            position: fixed;
            bottom: 30px;
            right: 50%;
            transform: translateX(50%);
            z-index: 10;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 1px;
            font-weight: 300;
        }

        .splash-footer .version {
            color: rgba(255, 255, 255, 0.08);
        }

        /* ===== تأثيرات إضافية ===== */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 15s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            background: rgba(0, 85, 230, 0.06);
        }

        .glow-orb:nth-child(2) {
            width: 500px;
            height: 500px;
            bottom: -150px;
            left: -150px;
            background: rgba(100, 50, 255, 0.05);
            animation-delay: 5s;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(50px, 30px) scale(1.1);
            }
        }

        /* ===== استجابة للأجهزة ===== */
        @media (max-width: 768px) {
            .splash-title {
                font-size: 32px;
            }
            .union-logo {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }
            .loading-container {
                width: 260px;
            }
            .splash-subtitle {
                font-size: 15px;
            }
            .ring:nth-child(1) {
                width: 250px;
                height: 250px;
            }
            .ring:nth-child(2) {
                width: 400px;
                height: 400px;
            }
            .ring:nth-child(3) {
                width: 550px;
                height: 550px;
            }
            .ring:nth-child(4) {
                width: 700px;
                height: 700px;
            }
        }

        @media (max-width: 480px) {
            .splash-title {
                font-size: 26px;
            }
            .union-logo {
                width: 80px;
                height: 80px;
                font-size: 32px;
                border-radius: 24px;
            }
            .loading-container {
                width: 200px;
            }
            .splash-subtitle {
                font-size: 13px;
            }
            .splash-committee {
                font-size: 12px;
            }
            .splash-content {
                padding: 16px;
            }
            .ring:nth-child(1) {
                width: 180px;
                height: 180px;
            }
            .ring:nth-child(2) {
                width: 280px;
                height: 280px;
            }
            .ring:nth-child(3) {
                width: 380px;
                height: 380px;
            }
            .ring:nth-child(4) {
                width: 480px;
                height: 480px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== خلفية ذكاء اصطناعي ===== -->
    <div class="splash-bg"></div>

    <!-- ===== كرات ضوئية ===== -->
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>

    <!-- ===== جزيئات متحركة ===== -->
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- ===== شبكة تقنية ===== -->
    <div class="grid-lines"></div>

    <!-- ===== حلقات دوارة ===== -->
    <div class="orbital-ring">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <!-- ===== المحتوى المركزي ===== -->
    <div class="splash-content">

        <!-- الشعار -->
        <div class="union-logo">
            ن.ت
            <span class="sub-icon">⚡</span>
        </div>

        <!-- العناوين -->
        <h1 class="splash-title">نقابة تكنولوجيا المعلومات</h1>
        <p class="splash-subtitle">منصة توثيق الشهادات التدريبية</p>
        <p class="splash-committee">لجنة <span>التحول الرقمي والتدريب</span></p>

        <!-- شريط التحميل -->
        <div class="loading-container">
            <div class="loading-bar-wrapper">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <div class="loading-text">
                جاري تجهيز المنصة
                <span class="dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
                <span class="percentage" id="loadingPercent">0%</span>
            </div>
        </div>

    </div>

    <!-- ===== التذييل ===== -->
    <div class="splash-footer">
        <span class="version">v1.0.0</span>
        <span style="margin:0 8px;">•</span>
        نقابة تكنولوجيا المعلومات والبرمجيات
    </div>

    <!-- ============================================================
    جافا سكريبت
    ============================================================ -->
    <script>
        // ============================================================
        // 1. تهيئة Firebase
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBfrK1IBCk2mim6cVbbtSd1e4FOQcpYQeo",
            authDomain: "itwsaccertification.firebaseapp.com",
            projectId: "itwsaccertification",
            storageBucket: "itwsaccertification.firebasestorage.app",
            messagingSenderId: "521196512526",
            appId: "1:521196512526:web:b78b06dd87cf4f5ca1e35f",
            measurementId: "G-JBMGW74DV4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================================
        // 2. عناصر الصفحة
        // ============================================================
        const loadingBar = document.getElementById('loadingBar');
        const loadingPercent = document.getElementById('loadingPercent');

        // ============================================================
        // 3. مدة العرض (تأتي من الإعدادات لاحقاً)
        // ============================================================
        // القيمة الافتراضية 3 ثواني، سيتم جلبها من Firestore لاحقاً
        const SPLASH_DURATION = 3500; // 3.5 ثانية

        // ============================================================
        // 4. تشغيل شريط التحميل
        // ============================================================
        let progress = 0;
        const interval = 30; // كل 30ms
        const steps = SPLASH_DURATION / interval;
        const increment = 100 / steps;

        const loadingInterval = setInterval(() => {
            progress += increment;
            if (progress >= 100) {
                progress = 100;
                clearInterval(loadingInterval);
                // الانتقال إلى الصفحة الرئيسية
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 500);
            }
            loadingBar.style.width = progress + '%';
            loadingPercent.textContent = Math.round(progress) + '%';
        }, interval);

        // ============================================================
        // 5. التحقق من حالة المستخدم (للانتقال السريع)
        // ============================================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                // مستخدم مسجل الدخول، نخزن معلوماته للاستخدام لاحقاً
                db.collection('users').doc(user.uid).get().then(function(doc) {
                    if (doc.exists) {
                        const data = doc.data();
                        sessionStorage.setItem('userData', JSON.stringify({
                            uid: user.uid,
                            email: user.email,
                            displayName: data.displayName || 'مستخدم',
                            role: data.role || 'user',
                            isActive: data.isActive !== false
                        }));
                    }
                }).catch(function(err) {
                    console.error('Error fetching user data:', err);
                });
            } else {
                sessionStorage.removeItem('userData');
            }
        });

        // ============================================================
        // 6. جلب إعدادات النظام (مدة العرض)
        // ============================================================
        // سيتم جلب مدة العرض من Firestore
        // ملاحظة: هذه الدالة ستستدعى من home.html لاحقاً

        console.log('✅ الصفحة الترحيبية - نقابة تكنولوجيا المعلومات');
        console.log('⏳ جاري التحميل...');
    </script>

</body>
</html>
