    <style>
        /* ============================================================
           التصميم الخرافي للشاشة الترحيبية - بدون أي نصوص ثابتة
           كل حرف ولون وصورة من الإعدادات
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            direction: rtl;
            background: var(--bg-color);
            transition: background 0.8s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --border: rgba(255,255,255,0.06);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
        }

        .splash-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 15s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.06) rotate(1.5deg); opacity: 0.9; }
        }

        .splash-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 25s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 5px; height: 5px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 7px; height: 7px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.35; }
        .particle:nth-child(4) { width: 6px; height: 6px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 4px; height: 4px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 8px; height: 8px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 3px; height: 3px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 5px; height: 5px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            25% { transform: translate(35px, -25px) scale(1.2); opacity: 0.5; }
            50% { transform: translate(-15px, -50px) scale(0.8); opacity: 0.3; }
            75% { transform: translate(45px, -15px) scale(1.3); opacity: 0.6; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.015) 1px, transparent 1px);
            background-size: 70px 70px;
            pointer-events: none;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(25px) translateX(25px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 60s linear infinite;
        }

        .ring:nth-child(1) { width: 320px; height: 320px; border-color: rgba(201,168,76,0.06); animation-duration: 70s; }
        .ring:nth-child(2) { width: 520px; height: 520px; border-color: rgba(124,58,237,0.04); animation-duration: 80s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 720px; height: 720px; border-color: rgba(59,130,246,0.03); animation-duration: 90s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 22s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -180px;
            right: -180px;
            background: rgba(201,168,76,0.05);
        }

        .glow-orb:nth-child(2) {
            width: 600px;
            height: 600px;
            bottom: -220px;
            left: -220px;
            background: rgba(124,58,237,0.04);
            animation-delay: 8s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(50px, 30px) scale(1.1); opacity: 0.6; }
        }

        .splash-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 750px;
            padding: 40px 50px;
            animation: contentEntrance 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes contentEntrance {
            0% { opacity: 0; transform: scale(0.8) translateY(60px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-wrapper {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            position: relative;
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -12px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(201,168,76,0.25), rgba(124,58,237,0.2), rgba(59,130,246,0.2), transparent);
            animation: conicSpin 12s linear infinite;
            mask: radial-gradient(circle, transparent 60%, black 62%);
            -webkit-mask: radial-gradient(circle, transparent 60%, black 62%);
            filter: blur(2px);
        }

        @keyframes conicSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-wrapper::after {
            content: '';
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.08);
            animation: pulseRing 4s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(0.9); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .union-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(201,168,76,0.2);
            box-shadow: 0 0 60px rgba(201,168,76,0.1);
            object-fit: cover;
            position: relative;
            z-index: 2;
            animation: logoSpin 40s linear infinite;
            transition: all 0.5s ease;
            background: var(--bg-color);
        }

        @keyframes logoSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .union-logo:hover {
            animation-duration: 10s;
            box-shadow: 0 0 80px rgba(201,168,76,0.2);
            border-color: rgba(201,168,76,0.4);
        }

        .splash-title {
            font-size: 38px;
            font-weight: 900;
            margin-bottom: 6px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--text-color) 0%, var(--primary-color) 40%, var(--primary-light) 70%, var(--text-color) 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titleFlow 7s ease-in-out infinite;
            font-family: 'Cairo', sans-serif;
        }

        @keyframes titleFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .splash-subtitle {
            font-size: 17px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 300;
            letter-spacing: 3px;
            font-family: 'Cairo', sans-serif;
        }

        .splash-committee {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 6px;
            font-weight: 300;
            letter-spacing: 1px;
            font-family: 'Cairo', sans-serif;
        }

        .splash-committee span {
            color: rgba(201,168,76,0.5);
            font-weight: 500;
        }

        .splash-president {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 30px;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
            padding: 0 25px;
            font-family: 'Cairo', sans-serif;
        }

        .splash-president::before,
        .splash-president::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
        }

        .splash-president::before { right: 100%; }
        .splash-president::after { left: 100%; }

        .splash-president .president-name {
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .loading-container {
            width: 360px;
            margin: 0 auto 20px;
            position: relative;
        }

        .loading-bar-wrapper {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.04);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: loaderSweep 2.5s linear infinite;
        }

        @keyframes loaderSweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-light), var(--primary-color));
            background-size: 200% 100%;
            border-radius: 4px;
            animation: loadingShimmer 2.5s linear infinite;
            transition: width 0.3s ease;
            position: relative;
        }

        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .loading-text {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 14px;
            letter-spacing: 2px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Cairo', sans-serif;
        }

        .loading-text .percentage {
            color: rgba(201,168,76,0.5);
            font-weight: 600;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            min-width: 42px;
        }

        .splash-skip {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.25);
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }

        .splash-skip:hover {
            background: rgba(201,168,76,0.12);
            border-color: rgba(201,168,76,0.2);
            color: rgba(255,255,255,0.6);
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(201,168,76,0.05);
        }

        .splash-footer {
            position: fixed;
            bottom: 30px;
            right: 50%;
            transform: translateX(50%);
            z-index: 10;
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 2px;
            font-weight: 300;
            font-family: 'Cairo', sans-serif;
        }

        .splash-footer .version {
            color: var(--text-dim);
            font-family: 'Courier New', monospace;
        }

        .splash-footer .separator {
            margin: 0 8px;
            color: var(--text-dim);
        }

        @media (max-width: 768px) {
            .splash-title { font-size: 30px; }
            .logo-wrapper { width: 130px; height: 130px; }
            .loading-container { width: 280px; }
            .splash-subtitle { font-size: 15px; }
            .splash-president { font-size: 15px; }
            .splash-content { padding: 30px 25px; }
            .splash-skip { bottom: 20px; left: 20px; padding: 6px 16px; font-size: 11px; }
            .splash-footer { bottom: 20px; font-size: 10px; }
            .logo-wrapper::before { top: -8px; left: -8px; right: -8px; bottom: -8px; }
            .logo-wrapper::after { inset: -14px; }
        }

        @media (max-width: 480px) {
            .splash-title { font-size: 24px; }
            .logo-wrapper { width: 110px; height: 110px; }
            .loading-container { width: 220px; }
            .splash-subtitle { font-size: 13px; }
            .splash-committee { font-size: 12px; }
            .splash-president { font-size: 13px; }
            .splash-content { padding: 20px 16px; }
            .splash-skip { bottom: 15px; left: 15px; padding: 5px 14px; font-size: 10px; }
            .splash-footer { bottom: 15px; font-size: 9px; }
            .splash-president::before,
            .splash-president::after { width: 15px; }
            .logo-wrapper::before { top: -6px; left: -6px; right: -6px; bottom: -6px; }
            .logo-wrapper::after { inset: -10px; }
            .ring { display: none; }
            .glow-orb { display: none; }
        }
    </style>
</head>
<body>

    <script>
        // ============================================================
        // 1. تهيئة Firebase
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBfrK1IBCk2mim6cVbbtSd1e4FOQcpYQeo",
            authDomain: "itwsaccertification.firebaseapp.com",
            projectId: "itwsaccertification",
            storageBucket: "itwsaccertification.firebasestorage.app",
            messagingSenderId: "521196512526",
            appId: "1:521196512526:web:b78b06dd87cf4f5ca1e35f",
            measurementId: "G-JBMGW74DV4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================================
        // 2. عناصر الصفحة - كلها IDs فقط
        // ============================================================
        const loadingBar = document.getElementById('loadingBar');
        const loadingPercent = document.getElementById('loadingPercent');
        const loadingStatus = document.getElementById('loadingStatus');
        const unionNameEl = document.getElementById('unionName');
        const committeeNameEl = document.getElementById('committeeName');
        const presidentNameEl = document.getElementById('presidentName');
        const presidentLabelEl = document.getElementById('presidentLabel');
        const splashLogo = document.getElementById('splashLogo');
        const versionEl = document.getElementById('systemVersion');
        const splashSubtitle = document.getElementById('splashSubtitle');
        const footerTextEl = document.getElementById('footerText');
        const skipBtnText = document.getElementById('skipBtnText');

        // OG Tags
        const pageTitle = document.getElementById('pageTitle');
        const metaDescription = document.getElementById('metaDescription');
        const metaKeywords = document.getElementById('metaKeywords');
        const ogTitle = document.getElementById('ogTitle');
        const ogDescription = document.getElementById('ogDescription');
        const ogImage = document.getElementById('ogImage');
        const ogUrl = document.getElementById('ogUrl');
        const ogSiteName = document.getElementById('ogSiteName');
        const twitterTitle = document.getElementById('twitterTitle');
        const twitterDescription = document.getElementById('twitterDescription');
        const twitterImage = document.getElementById('twitterImage');
        const favicon = document.getElementById('favicon');
        const appleIcon = document.getElementById('appleIcon');

        // ============================================================
        // 3. الإعدادات الافتراضية - كلها من Firestore
        // ============================================================
        const DEFAULT_SETTINGS = {
            unionName: '',
            committeeName: '',
            presidentName: '',
            presidentLabel: '',
            splashDuration: 4000,
            logoUrl: '',
            systemVersion: '',
            subtitle: '',
            footerText: '',
            skipText: '',
            pageTitle: '',
            metaDescription: '',
            metaKeywords: '',
            ogTitle: '',
            ogDescription: '',
            ogUrl: '',
            ogSiteName: '',
            twitterTitle: '',
            twitterDescription: '',
            loadingMessages: [],
            colors: {
                primary: '#C9A84C',
                accent: '#7C3AED',
                background: '#0A0E1A',
                text: '#FFFFFF',
                textSecondary: 'rgba(255,255,255,0.7)',
                textMuted: 'rgba(255,255,255,0.4)',
                textDim: 'rgba(255,255,255,0.15)',
                border: 'rgba(255,255,255,0.06)'
            }
        };

        let settings = { ...DEFAULT_SETTINGS };

        // ============================================================
        // 4. تطبيق الألوان على CSS
        // ============================================================
        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
            if (colors.border) root.style.setProperty('--border', colors.border);
            
            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            
            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);
            
            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

        // ============================================================
        // 5. تطبيق جميع الإعدادات على الصفحة
        // ============================================================
        function applySettings(data) {
            // النصوص الأساسية
            if (data.unionName) unionNameEl.textContent = data.unionName;
            if (data.committeeName) committeeNameEl.textContent = data.committeeName;
            if (data.presidentName) presidentNameEl.textContent = data.presidentName;
            if (data.presidentLabel) presidentLabelEl.textContent = data.presidentLabel;
            if (data.subtitle) splashSubtitle.textContent = data.subtitle;
            if (data.footerText) footerTextEl.textContent = data.footerText;
            if (data.skipText) skipBtnText.textContent = data.skipText;
            if (data.systemVersion) versionEl.textContent = data.systemVersion;

            // اللوجو
            if (data.logoUrl) {
                splashLogo.src = data.logoUrl;
            }

            // OG Tags
            if (data.pageTitle) pageTitle.textContent = data.pageTitle;
            if (data.metaDescription) metaDescription.content = data.metaDescription;
            if (data.metaKeywords) metaKeywords.content = data.metaKeywords;
            if (data.ogTitle) ogTitle.content = data.ogTitle;
            if (data.ogDescription) ogDescription.content = data.ogDescription;
            if (data.ogUrl) ogUrl.content = data.ogUrl;
            if (data.ogSiteName) ogSiteName.content = data.ogSiteName;
            if (data.twitterTitle) twitterTitle.content = data.twitterTitle;
            if (data.twitterDescription) twitterDescription.content = data.twitterDescription;

            // صور OG
            if (data.logoUrl) {
                ogImage.content = data.logoUrl;
                twitterImage.content = data.logoUrl;
                favicon.href = data.logoUrl;
                appleIcon.href = data.logoUrl;
            }

            // الألوان
            if (data.colors) {
                applyColors(data.colors);
            }
        }

        // ============================================================
        // 6. جلب الإعدادات من Firestore
        // ============================================================
        async function loadSettingsFromFirestore() {
            try {
                const docRef = db.collection('settings').doc('general');
                const doc = await docRef.get();

                if (doc.exists) {
                    const data = doc.data();
                    
                    // نصوص
                    if (data.unionName) settings.unionName = data.unionName;
                    if (data.committeeName) settings.committeeName = data.committeeName;
                    if (data.presidentName) settings.presidentName = data.presidentName;
                    if (data.presidentLabel) settings.presidentLabel = data.presidentLabel;
                    if (data.splashDuration) settings.splashDuration = data.splashDuration * 1000;
                    if (data.logoUrl) settings.logoUrl = data.logoUrl;
                    if (data.systemVersion) settings.systemVersion = data.systemVersion;
                    if (data.subtitle) settings.subtitle = data.subtitle;
                    if (data.footerText) settings.footerText = data.footerText;
                    if (data.skipText) settings.skipText = data.skipText;
                    if (data.pageTitle) settings.pageTitle = data.pageTitle;
                    if (data.metaDescription) settings.metaDescription = data.metaDescription;
                    if (data.metaKeywords) settings.metaKeywords = data.metaKeywords;
                    if (data.ogTitle) settings.ogTitle = data.ogTitle;
                    if (data.ogDescription) settings.ogDescription = data.ogDescription;
                    if (data.ogUrl) settings.ogUrl = data.ogUrl;
                    if (data.ogSiteName) settings.ogSiteName = data.ogSiteName;
                    if (data.twitterTitle) settings.twitterTitle = data.twitterTitle;
                    if (data.twitterDescription) settings.twitterDescription = data.twitterDescription;
                    if (data.loadingMessages) settings.loadingMessages = data.loadingMessages;
                    if (data.colors) settings.colors = { ...settings.colors, ...data.colors };

                    applySettings(settings);
                    console.log('✅ تم جلب الإعدادات من Firestore');
                } else {
                    console.log('ℹ️ استخدام الإعدادات الافتراضية');
                    applySettings(settings);
                }
            } catch (err) {
                console.error('❌ خطأ في جلب الإعدادات:', err.message);
                applySettings(settings);
            }
        }

        // ============================================================
        // 7. تشغيل شريط التحميل
        // ============================================================
        function startLoading() {
            let progress = 0;
            const interval = 25;
            const totalSteps = settings.splashDuration / interval;
            const increment = 100 / totalSteps;

            const defaultMessages = [
                'جاري تجهيز المنصة',
                'جاري تحميل البيانات',
                'جاري تهيئة النظام',
                'أوشكنا على الانتهاء',
                'مرحباً بك في المنصة'
            ];

            const statusMessages = settings.loadingMessages.length > 0 ? settings.loadingMessages : defaultMessages;

            const loadingInterval = setInterval(() => {
                progress += increment;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(loadingInterval);
                    loadingStatus.textContent = 'جاري التوجيه...';
                    setTimeout(() => {
                        auth.onAuthStateChanged(function(user) {
                            if (user) {
                                window.location.href = 'home.html';
                            } else {
                                window.location.href = 'login.html';
                            }
                        });
                    }, 400);
                }

                loadingBar.style.width = progress + '%';
                loadingPercent.textContent = Math.round(progress) + '%';

                const index = Math.min(Math.floor(progress / 25), statusMessages.length - 1);
                loadingStatus.textContent = statusMessages[index];

            }, interval);
        }

        // ============================================================
        // 8. تخطي شاشة الترحيب
        // ============================================================
        function skipSplash() {
            auth.onAuthStateChanged(function(user) {
                if (user) {
                    window.location.href = 'home.html';
                } else {
                    window.location.href = 'login.html';
                }
            });
        }

        // ============================================================
        // 9. التحقق من حالة المستخدم
        // ============================================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                db.collection('users').doc(user.uid).get()
                    .then(function(doc) {
                        if (doc.exists) {
                            const data = doc.data();
                            sessionStorage.setItem('userData', JSON.stringify({
                                uid: user.uid,
                                email: user.email,
                                displayName: data.displayName || 'مستخدم',
                                role: data.role || 'user',
                                isActive: data.isActive !== false
                            }));
                        }
                    })
                    .catch(function(err) {
                        console.error('❌ خطأ في جلب بيانات المستخدم:', err);
                    });
            } else {
                sessionStorage.removeItem('userData');
            }
        });

        // ============================================================
        // 10. تشغيل الصفحة
        // ============================================================
        async function init() {
            await loadSettingsFromFirestore();
            startLoading();

            splashLogo.onerror = function() {
                this.src = 'https://placehold.co/160x160/0A0E1A/C9A84C/png?text=ن.ت';
            };
        }

        init();

        console.log('✅ الصفحة الترحيبية - كل حرف من الإعدادات');
        console.log('📌 الإصدار:', settings.systemVersion);
        console.log('👤 النقيب العام:', settings.presidentName);
        console.log('🎨 الألوان من الإعدادات');
        console.log('🔄 دوران اللوجو بطيء وأنيق');
        console.log('🚀 التوجيه إلى home.html أو login.html');
    </script>

</body>
</html>
