    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.06);
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.12);
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.12);
            --info: #3B82F6;
            --info-bg: rgba(59,130,246,0.12);
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.03);
            --card-bg: rgba(255,255,255,0.04);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 22s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 550px; height: 550px; border-color: rgba(124,58,237,0.04); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 750px; height: 750px; border-color: rgba(59,130,246,0.03); animation-duration: 60s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -150px;
            background: var(--primary-glow);
        }

        .glow-orb:nth-child(2) {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -200px;
            background: var(--accent-glow);
            animation-delay: 6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: headerFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: logoSpin 20s linear infinite;
            box-shadow: 0 0 35px var(--primary-glow);
            position: relative;
            background-size: cover;
            background-position: center;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-box:hover {
            animation-duration: 3s;
            transform: scale(1.08);
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
        }

        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-president {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 14px;
            background: var(--bg-hover);
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-president:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .header-president .president-icon { font-size: 16px; }
        .header-president .president-label { font-size: 11px; color: var(--text-muted); font-weight: 300; }
        .header-president .president-name {
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 25px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 40px var(--primary-glow); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--primary-color); transform: translateY(-3px); }

        .btn-sm { padding: 5px 14px; font-size: 12px; }

        .hero-section {
            text-align: center;
            margin-bottom: 25px;
            animation: heroAppear 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes heroAppear {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .hero-title {
            font-size: 44px;
            font-weight: 900;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--text-color) 0%, var(--primary-color) 40%, var(--accent-light) 70%, var(--text-color) 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titleFlow 7s ease-in-out infinite;
            letter-spacing: 1px;
        }

        @keyframes titleFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .info-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 28px;
            margin: 0 auto 25px;
            max-width: 880px;
            text-align: center;
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            animation: infoSlide 1s ease-out;
        }

        @keyframes infoSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .info-box:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 40px var(--primary-glow);
            transform: translateY(-2px);
        }

        .info-box p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .tabs {
            display: flex;
            gap: 6px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 6px;
            margin-bottom: 24px;
            max-width: 700px;
            margin-right: auto;
            margin-left: auto;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            position: relative;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: inherit;
            position: relative;
            z-index: 2;
        }

        .tab-btn.active {
            color: var(--text-color);
            background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(124,58,237,0.15));
            box-shadow: 0 0 40px var(--primary-glow);
        }

        .tab-btn:hover:not(.active) {
            color: var(--text-secondary);
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
            animation: tabFade 0.6s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes tabFade {
            0% { opacity: 0; transform: translateY(20px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .search-card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 30px 34px;
            box-shadow: var(--shadow);
            max-width: 850px;
            margin: 0 auto;
            transition: all 0.4s ease;
        }

        .search-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 25px 70px rgba(0,0,0,0.2);
            transform: translateY(-3px);
        }

        .search-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-row input {
            flex: 1;
            min-width: 180px;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            transition: all 0.4s ease;
            font-family: inherit;
        }

        .search-row input::placeholder {
            color: var(--text-muted);
        }

        .search-row input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 40px var(--primary-glow);
            background: rgba(255,255,255,0.06);
            transform: translateY(-2px);
        }

        .search-hint {
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .result-box {
            display: none;
            margin-top: 24px;
            animation: resultAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-box.active {
            display: block;
        }

        @keyframes resultAppear {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .certificate-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 26px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .certificate-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-color);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        .certificate-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        .cert-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid var(--border);
            padding-bottom: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .cert-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
        }

        .cert-status.valid {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.2);
        }

        .cert-status.invalid {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid rgba(239,68,68,0.2);
        }

        .cert-code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg-hover);
            padding: 4px 14px;
            border-radius: 8px;
        }

        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 14px;
        }

        .cert-item {
            padding: 10px 14px;
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .cert-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--primary-color);
        }

        .cert-item .label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .cert-item .value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-color);
        }

        .cert-item .value.grade-a { color: var(--success); }
        .cert-item .value.grade-b { color: var(--info); }
        .cert-item .value.grade-c { color: var(--warning); }
        .cert-item .value.grade-d { color: #f97316; }
        .cert-item .value.grade-f { color: var(--error); }

        .cert-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .cert-actions .btn {
            flex: 1;
            justify-content: center;
            min-width: 80px;
        }

        .academy-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 26px;
            transition: all 0.4s ease;
        }

        .academy-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-color);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        .academy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
            margin-bottom: 16px;
        }

        .academy-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-color);
        }

        .academy-badge {
            padding: 4px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.2);
        }

        .branch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .branch-item {
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;

        .branch-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--primary-color);
            transform: translateY(-2px);

        .branch-item .gov {
            font-weight: 700;
            color: var(--text-color);
            font-size: 15px;
        }

        .branch-item .addr {
            font-size: 12px;
            color: var(--text-muted);
            margin: 2px 0;
        }

        .branch-item .phone {
            font-size: 12px;
            color: var(--text-dim);
        }

        .branch-item .main-badge {
            font-size: 10px;
            color: var(--primary-color);
            background: var(--primary-glow);
            padding: 2px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 4px;
        }

        .student-certificates-list {
            margin-top: 16px;
        }

        .student-cert-item {
            background: var(--bg-hover);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .student-cert-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--primary-color);
            transform: translateX(-4px);
        }

        .student-cert-item .cert-actions-sm {
            display: flex;
            gap: 4px;
        }

        .student-cert-item .cert-actions-sm .btn {
            padding: 3px 10px;
            font-size: 11px;
            border-radius: 20px;
        }

        .msg {
            display: none;
            border-radius: var(--radius-sm);
            padding: 14px 22px;
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }

        .msg.show { display: block; animation: msgIn 0.4s ease; }
        .msg.success { background: var(--success-bg); border: 1px solid rgba(16,185,129,0.2); color: var(--success); }
        .msg.error { background: var(--error-bg); border: 1px solid rgba(239,68,68,0.2); color: var(--error); }
        .msg.info { background: var(--info-bg); border: 1px solid rgba(59,130,246,0.2); color: var(--info); }

        @keyframes msgIn {
            0% { opacity: 0; transform: translateY(-10px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .loader { display: none; text-align: center; padding: 30px 0; }
        .loader.show { display: block; }
        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .services-btn-container {
            text-align: center;
            margin-top: 28px;
        }

        .services-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 36px;
            border-radius: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            font-family: inherit;
            backdrop-filter: blur(8px);
        }

        .services-btn:hover {
            background: var(--bg-hover);
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            border-color: var(--primary-color);
        }

        .services-btn .arrow {
            font-size: 16px;
            transition: transform 0.4s ease;
        }

        .services-btn:hover .arrow {
            transform: translateX(-6px);
        }

        .footer {
            text-align: center;
            padding: 20px 0 12px;
            border-top: 1px solid var(--border);
            margin-top: 35px;
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 1px;
        }

        #print-container {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 800px;
            z-index: 9999;
        }

        .academies-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(25px);
            justify-content: center;
            align-items: center;
            padding: 30px;
            animation: modalIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .academies-modal.active { display: flex; }

        @keyframes modalIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .academies-modal .modal-content {
            background: var(--card-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 36px;
            max-width: 950px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: var(--shadow);
            animation: modalContent 0.5s ease;
        }

        .academies-modal .modal-content::-webkit-scrollbar { width: 6px; }
        .academies-modal .modal-content::-webkit-scrollbar-track { background: var(--bg-hover); border-radius: 10px; }
        .academies-modal .modal-content::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); border-radius: 10px; }

        .academies-modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
            margin-bottom: 18px;
        }

        .academies-modal .modal-header h2 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .academies-modal .modal-header .close-btn {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .academies-modal .modal-header .close-btn:hover {
            background: var(--error-bg);
            color: var(--error);
            border-color: var(--error);
            transform: rotate(90deg);
        }

        .academies-modal .academy-item {
            background: var(--bg-hover);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .academies-modal .academy-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--primary-color);
            transform: translateX(-4px);
        }

        .academies-modal .academy-item .name {
            font-weight: 700;
            color: var(--text-color);
            font-size: 16px;
        }

        .academies-modal .academy-item .license {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
        }

        .academies-modal .academy-item .badge {
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 20px;
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.1);
        }

        .academies-modal .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .academies-modal .pagination button {
            padding: 8px 22px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 600;
        }

        .academies-modal .pagination button:hover:not(:disabled) {
            background: var(--primary-glow);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .academies-modal .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .academies-modal .pagination span {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ===== زر الثيم ===== */
        .theme-toggle-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 999;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--border);
            color: var(--text-color);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.1);
            border-color: var(--primary-color);
            box-shadow: 0 0 40px var(--primary-glow);
        }

        .theme-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .theme-modal.active {
            display: flex;
        }

        .theme-modal .modal-content {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow);
            animation: modalIn 0.4s ease;
        }

        .theme-modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .theme-modal .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-color);
        }

        .theme-modal .modal-header .close-btn {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-modal .modal-header .close-btn:hover {
            background: var(--error-bg);
            color: var(--error);
            border-color: var(--error);
            transform: rotate(90deg);
        }

        .theme-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .theme-btn {
            padding: 14px 12px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .theme-btn:hover {
            border-color: var(--primary-color);
            background: var(--bg-hover);
            transform: translateY(-2px);
        }

        .theme-btn.active {
            border-color: var(--primary-color);
            background: var(--primary-glow);
        }

        .theme-btn.reset {
            border-color: rgba(239,68,68,0.2);
            color: var(--error);
            background: rgba(239,68,68,0.08);
        }

        .theme-btn.reset:hover {
            border-color: var(--error);
            background: rgba(239,68,68,0.15);
        }

        @keyframes modalIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; gap: 12px; padding: 14px 18px; border-radius: 20px; }
            .header-right { justify-content: center; flex-wrap: wrap; }
            .header-left { justify-content: center; flex-wrap: wrap; }
            .hero-title { font-size: 28px; }
            .hero-subtitle { font-size: 15px; }
            .search-row { flex-direction: column; }
            .search-row input { min-width: unset; }
            .cert-grid { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; max-width: 100%; border-radius: var(--radius-sm); }
            .tab-btn { border-radius: 10px; min-width: unset; }
            .services-btn { width: 100%; justify-content: center; }
            .search-card { padding: 20px; }
            .certificate-card { padding: 20px; }
            .academy-card { padding: 20px; }
            .info-box { padding: 14px 18px; }
            .info-box p { font-size: 14px; }
            .glow-orb { display: none; }
            .ring { display: none; }
            .cert-actions { flex-direction: column; }
            .cert-actions .btn { width: 100%; }
            .cert-header { flex-direction: column; }
            .branch-grid { grid-template-columns: 1fr; }
            .main-container { padding: 12px; }
            .student-cert-item { flex-direction: column; align-items: flex-start; }
            .student-cert-item .cert-actions-sm { width: 100%; justify-content: flex-start; }
            .academies-modal .modal-content { padding: 20px; margin: 10px; border-radius: 20px; max-height: 90vh; }
            .academies-modal .academy-item { flex-direction: column; align-items: flex-start; }
            .academies-modal .modal-header h2 { font-size: 18px; }
            .academies-modal .pagination button { padding: 6px 16px; font-size: 12px; }
            .header-president { padding: 3px 10px; }
            .header-president .president-name { font-size: 12px; }
            .theme-toggle-btn { width: 40px; height: 40px; font-size: 16px; bottom: 16px; left: 16px; }
            .theme-modal .modal-content { padding: 20px; margin: 10px; }
            .theme-grid { grid-template-columns: 1fr 1fr; }
            .theme-btn { padding: 10px 8px; font-size: 12px; }
        }

        @media (max-width: 480px) {
            .hero-title { font-size: 24px; }
            .hero-subtitle { font-size: 13px; }
            .header-title h1 { font-size: 16px; }
            .header-title p { font-size: 10px; }
            .btn { padding: 8px 16px; font-size: 12px; }
            .search-card { padding: 16px; border-radius: var(--radius-sm); }
            .certificate-card { padding: 16px; }
            .academy-card { padding: 16px; }
            .info-box { padding: 12px 14px; }
            .info-box p { font-size: 13px; }
            .cert-actions .btn { min-width: 60px; font-size: 11px; padding: 6px 12px; }
            .cert-item .value { font-size: 14px; }
            .logo-box { width: 40px; height: 40px; font-size: 16px; }
            .academies-modal .modal-content { padding: 16px; }
            .academies-modal .academy-item .name { font-size: 14px; }
            .header-president .president-name { font-size: 11px; }
            .theme-toggle-btn { width: 36px; height: 36px; font-size: 14px; bottom: 12px; left: 12px; }
            .theme-modal .modal-content { padding: 16px; }
            .theme-grid { grid-template-columns: 1fr 1fr; }
            .theme-btn { padding: 8px 6px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="page-bg"></div>

    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="grid-lines"></div>

    <div class="orbital-ring">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="glow-orb"></div>
    <div class="glow-orb"></div>

    <div class="main-container" id="mainContainer">

        <header class="header">
            <div class="header-left">
                <div class="logo-box" id="logoBox" onclick="window.location.href='home.html'"></div>
                <div class="header-title">
                    <h1 id="unionName"></h1>
                    <p id="committeeName"></p>
                </div>
                <div class="header-president">
                    <span class="president-icon">👤</span>
                    <span class="president-label">النقيب العام:</span>
                    <span class="president-name" id="headerPresidentName"></span>
                </div>
            </div>
            <div class="header-right">
                <a href="#" class="btn btn-outline btn-sm" id="loginBtn">تسجيل الدخول</a>
                <a href="#" class="btn btn-primary btn-sm" id="adminBtn" style="display:none;">لوحة التحكم</a>
                <a href="#" class="btn btn-outline btn-sm" id="logoutBtn" style="display:none;">تسجيل الخروج</a>
            </div>
        </header>

        <div class="hero-section">
            <h1 class="hero-title" id="heroTitle"></h1>
            <p class="hero-subtitle" id="heroSubtitle"></p>
        </div>

        <div class="info-box" id="infoBox">
            <p id="infoBoxText"></p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="tabCertificate" id="tabCertBtn">بحث عن شهادة</button>
            <button class="tab-btn" data-tab="tabStudent" id="tabStudentBtn">بحث عن متدرب</button>
            <button class="tab-btn" data-tab="tabAcademy" id="tabAcademyBtn">بحث عن أكاديمية</button>
        </div>

        <div class="tab-content active" id="tabCertificate">
            <div class="search-card">
                <form id="certificateSearchForm" onsubmit="return searchCertificate(event)">
                    <div class="search-box">
                        <div class="search-row">
                            <input type="text" id="certCode" placeholder="أدخل كود الشهادة" required />
                            <button type="submit" class="btn btn-primary" id="searchCertBtn">بحث</button>
                        </div>
                        <div class="search-hint" id="certHint"></div>
                    </div>
                </form>

                <div class="loader" id="certLoader">
                    <div class="spinner"></div>
                    <div style="color:var(--text-muted);" id="certLoaderText">جاري البحث...</div>
                </div>

                <div class="msg" id="certError"></div>
                <div class="msg" id="certSuccess"></div>

                <div class="result-box" id="certResult"></div>
            </div>
        </div>

        <div class="tab-content" id="tabStudent">
            <div class="search-card">
                <form id="studentSearchForm" onsubmit="return searchStudent(event)">
                    <div class="search-box">
                        <div class="search-row">
                            <input type="text" id="studentNationalId" placeholder="الرقم القومي (14 رقم)" maxlength="14" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
                            <button type="submit" class="btn btn-primary" id="searchStudentBtn">بحث</button>
                        </div>
                        <div class="search-hint" id="studentHint">ابحث بالرقم القومي لعرض جميع شهاداته وسجل التدريب الكامل</div>
                    </div>
                </form>

                <div class="loader" id="studentLoader">
                    <div class="spinner"></div>
                    <div style="color:var(--text-muted);" id="studentLoaderText">جاري البحث...</div>
                </div>

                <div class="msg" id="studentError"></div>
                <div class="msg" id="studentSuccess"></div>

                <div class="result-box" id="studentResult"></div>
            </div>
        </div>

        <div class="tab-content" id="tabAcademy">
            <div class="search-card">
                <form id="academySearchForm" onsubmit="return searchAcademy(event)">
                    <div class="search-box">
                        <div class="search-row">
                            <input type="text" id="academySearchInput" placeholder="اسم الأكاديمية أو الرقم الاعتمادي" required />
                            <button type="submit" class="btn btn-primary" id="searchAcademyBtn">بحث</button>
                        </div>
                        <div class="search-hint" id="academyHint"></div>
                    </div>
                </form>

                <div style="text-align:center;margin-top:16px;">
                    <button class="btn btn-primary" onclick="openAcademiesModal()" id="showAllAcademiesBtn" style="padding:10px 30px;font-size:14px;">
                        عرض جميع الأكاديميات المعتمدة
                    </button>
                </div>

                <div class="loader" id="academyLoader">
                    <div class="spinner"></div>
                    <div style="color:var(--text-muted);" id="academyLoaderText">جاري البحث...</div>
                </div>

                <div class="msg" id="academyError"></div>
                <div class="msg" id="academySuccess"></div>

                <div class="result-box" id="academyResult"></div>
            </div>
        </div>

        <div class="services-btn-container">
            <a href="#" class="services-btn" id="servicesBtn">
                <span id="servicesBtnText"></span>
                <span class="arrow">←</span>
            </a>
        </div>

        <footer class="footer">
            <span id="footerText"></span>
            <div style="margin-top:4px;font-size:11px;color:var(--text-dim);">
                <span id="presidentFooter"></span>
                <span id="presidentName"></span>
            </div>
        </footer>

    </div>

    <!-- ===== زر تغيير الثيم ===== -->
    <button class="theme-toggle-btn" id="themeToggleBtn" onclick="openThemeModal()">
        🎨
    </button>

    <!-- ===== مودال الثيمات ===== -->
    <div class="theme-modal" id="themeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🎨 تغيير الثيم</h3>
                <button class="close-btn" onclick="closeThemeModal()">✕</button>

        let currentTheme = localStorage.getItem('homeTheme') || 'dark';

        function applyTheme(themeName) {
            const theme = THEMES[themeName];
            if (!theme) return;

            currentTheme = themeName;
            localStorage.setItem('homeTheme', themeName);

            const root = document.documentElement;
            Object.keys(theme).forEach(function(key) {
                root.style.setProperty('--' + key, theme[key]);
            });

            const primaryGlow = theme.primary ? theme.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            const accentGlow = theme.accent ? theme.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            document.body.style.background = theme.background;

            closeThemeModal();
            showToast('تم تغيير الثيم إلى: ' + getThemeName(themeName));
        }

        function getThemeName(name) {
            const names = {
                dark: 'داكن',
                light: 'فاتح',
                gold: 'ذهبي',
                blue: 'أزرق',
                purple: 'بنفسجي'
            };
            return names[name] || name;

            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.textContent = msg;
            Object.assign(toast.style, {
                position: 'fixed',
                bottom: '80px',
                left: '50%',
                transform: 'translateX(-50%)',
                background: 'rgba(0,0,0,0.8)',
                backdropFilter: 'blur(10px)',

                transition: 'all 0.3s ease',
                opacity: '0',
                pointerEvents: 'none',
                fontFamily: "'Cairo', sans-serif"
            });
            document.body.appendChild(toast);

            setTimeout(function() { toast.style.opacity = '1'; }, 10);
            setTimeout(function() {
                toast.style.opacity = '0';
                setTimeout(function() { toast.remove(); }, 300);

        function showLoader(id) { document.getElementById(id).classList.add('show'); }
        function hideLoader(id) { document.getElementById(id).classList.remove('show'); }
        function showMsg(id, msg, type) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = msg;
            el.className = 'msg show ' + type;
            setTimeout(function() { el.className = 'msg'; }, 4000);
        }
        function hideMsg(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.className = 'msg';
        }
        function showResult(id) { document.getElementById(id).classList.add('active'); }
        function hideResult(id) { document.getElementById(id).classList.remove('active'); }

        function formatDate(date) {
            if (!date) return '-';
            const d = date.toDate ? date.toDate() : new Date(date);
            return d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function getGradeClass(grade) {
            if (!grade) return '';
            const g = grade.toUpperCase();
            if (g.startsWith('A')) return 'grade-a';
            if (g.startsWith('B')) return 'grade-b';
            if (g.startsWith('C')) return 'grade-c';
            if (g.startsWith('D')) return 'grade-d';
            return 'grade-f';
        }

        auth.onAuthStateChanged(function(user) {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-flex';

                db.collection('users').doc(user.uid).get().then(function(doc) {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.role === 'super_admin' || data.role === 'admin' || data.role === 'committee_manager') {
                            isAdmin = true;
                            document.getElementById('adminBtn').style.display = 'inline-flex';
                        }
                    }
                });
            } else {
                currentUser = null;
                isAdmin = false;

        // ============================================================
        // 13. البحث عن متدرب
        // ============================================================
        function searchStudent(e) {
            e.preventDefault();

            const nationalId = document.getElementById('studentNationalId').value.trim();

            if (!nationalId) {
                showMsg('studentError', 'الرجاء إدخال الرقم القومي', 'error');
                return false;
            }

            hideMsg('studentError');
            hideMsg('studentSuccess');
            hideResult('studentResult');
            showLoader('studentLoader');

            let results = allCertificates.filter(function(c) {
                return c.studentNationalId === nationalId;
            });

            setTimeout(function() {
                hideLoader('studentLoader');

                if (results.length === 0) {
                    showMsg('studentError', 'لم يتم العثور على شهادات لهذا الرقم القومي', 'error');
                    return;
                }

                const studentData = {
                    name: results[0]?.studentName || 'متدرب',
                    nationalId: results[0]?.studentNationalId || '-',
                    certificates: results,
                    total: results.length,
                    grades: results.filter(c => c.grade).map(c => c.grade),
                    firstDate: results.reduce((min, c) => {
                        const d = c.issuedAt ? (c.issuedAt.toDate ? c.issuedAt.toDate() : new Date(c.issuedAt)) :
                            null;
                        if (!d) return min;
                        return !min || d < min ? d : min;
                    }, null),
                    lastDate: results.reduce((max, c) => {
                        const d = c.issuedAt ? (c.issuedAt.toDate ? c.issuedAt.toDate() : new Date(c.issuedAt)) :
                            null;
                        if (!d) return max;
                        return !max || d > max ? d : max;
                    }, null)
                };

                renderStudentResults(studentData);
                showResult('studentResult');
                showMsg('studentSuccess', 'تم العثور على ' + results.length + ' شهادة للمتدرب', 'success');
            }, 500);

            return false;
        }

        function renderStudentResults(data) {
            const container = document.getElementById('studentResult');

            const avgGrade = data.grades.length > 0 ? data.grades.join('، ') : '-';
            const firstDate = data.firstDate ? data.firstDate.toLocaleDateString('ar-EG') : '-';
            const lastDate = data.lastDate ? data.lastDate.toLocaleDateString('ar-EG') : '-';

            const printText = settings.printBtnText || 'طباعة';
            const pdfText = settings.pdfBtnText || 'تحميل PDF';
            const shareText = settings.shareBtnText || 'مشاركة';

            let certsHtml = data.certificates.map(function(cert) {
                const gradeClass = getGradeClass(cert.grade);
                return `
                        <div class="student-cert-item">
                            <div>
                                <span style="font-weight:600;color:var(--text-color);">${cert.courseName}</span>
                                <span style="font-family:'Courier New',monospace;font-size:12px;color:var(--text-muted);margin-right:8px;">${cert.certificateCode}</span>
                                <span class="value ${gradeClass}" style="margin-right:8px;font-weight:700;">${cert.grade}</span>
                            </div>
                            <div style="font-size:12px;color:var(--text-muted);">${formatDate(cert.issuedAt)}</div>
                            <div class="cert-actions-sm">
                                <button class="btn btn-success btn-sm" onclick="printCertificate('${cert.certificateCode}')">${printText}</button>
                                <button class="btn btn-primary btn-sm" onclick="downloadCertificatePDF('${cert.certificateCode}')">${pdfText}</button>
                                <button class="btn btn-ghost btn-sm" onclick="shareCertificate('${cert.certificateCode}')">${shareText}</button>
                            </div>
                        </div>
                    `;
            }).join('');

            container.innerHTML = `
                    <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:24px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:16px;">
                            <div>
                                <h3 style="font-size:20px;font-weight:700;color:var(--text-color);">${data.name}</h3>
                                <p style="font-size:13px;color:var(--text-muted);">الرقم القومي: ${data.nationalId}</p>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                                <span style="font-size:14px;color:var(--primary-color);font-weight:600;">${data.total} شهادة</span>
                                <span style="font-size:11px;background:var(--success-bg);color:var(--success);padding:2px 12px;border-radius:20px;border:1px solid rgba(16,185,129,0.2);">🏅 وسام النقابة</span>
                            </div>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;background:var(--bg-hover);padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border-light);">
                            <div><span style="font-size:10px;color:var(--text-muted);">أول شهادة</span><br><span style="font-weight:600;">${firstDate}</span></div>
                            <div><span style="font-size:10px;color:var(--text-muted);">آخر شهادة</span><br><span style="font-weight:600;">${lastDate}</span></div>
                            <div><span style="font-size:10px;color:var(--text-muted);">التقديرات</span><br><span style="font-weight:600;">${avgGrade}</span></div>
                        </div>
                        <div class="student-certificates-list">
                            ${certsHtml}
                        </div>
                        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;">
                            <button class="btn btn-success btn-sm" onclick="printAllStudentCertificates('${data.name}')">${printText} الكل</button>
                            <button class="btn btn-primary btn-sm" onclick="downloadAllStudentCertificates('${data.name}')">${pdfText} الكل</button>
                        </div>
                    </div>
                `;
        }

        function printAllStudentCertificates(studentName) {
            const certs = allCertificates.filter(function(c) {
                return c.studentName === studentName && c.isActive !== false;
            });

            if (certs.length === 0) {
                alert('لا توجد شهادات للمتدرب');
                return;
            }

            alert('جاري طباعة ' + certs.length + ' شهادة للمتدرب ' + studentName);
        }

        function downloadAllStudentCertificates(studentName) {
            const certs = allCertificates.filter(function(c) {
                return c.studentName === studentName && c.isActive !== false;
            });

            if (certs.length === 0) {
                alert('لا توجد شهادات للمتدرب');
                return;
            }

            alert('جاري تحميل ' + certs.length + ' شهادة للمتدرب ' + studentName);
        }

        // ============================================================
        // 14. البحث عن أكاديمية
        // ============================================================
        function searchAcademy(e) {
            e.preventDefault();

            const searchValue = document.getElementById('academySearchInput').value.trim();
            if (!searchValue) {
                showMsg('academyError', 'الرجاء إدخال اسم الأكاديمية أو الرقم الاعتمادي', 'error');
                return false;
            }

            hideMsg('academyError');
            hideMsg('academySuccess');
            hideResult('academyResult');
            showLoader('academyLoader');

            const results = allAcademies.filter(function(a) {
                return (a.name && a.name.includes(searchValue)) ||
                    (a.licenseNumber && a.licenseNumber.includes(searchValue));
            });

            setTimeout(function() {
                hideLoader('academyLoader');

                if (results.length === 0) {
                    showMsg('academyError', 'لم يتم العثور على أكاديمية', 'error');
                    return;
                }

                renderAcademy(results[0]);
                showResult('academyResult');
                showMsg('academySuccess', 'تم العثور على الأكاديمية', 'success');

                if (results.length > 1) {
                    const container = document.getElementById('academyResult');
                    const extra = document.createElement('div');
                    extra.style.cssText =
                        'text-align:center;margin-top:12px;color:var(--text-muted);font-size:13px;';
                    extra.textContent = `يوجد ${results.length} نتائج. يتم عرض الأولى.`;
                    container.appendChild(extra);
                }
            }, 500);

            return false;
        }

        function renderAcademy(data) {
            const container = document.getElementById('academyResult');

            let branchesHtml = '';
            if (data.branches && data.branches.length > 0) {
                branchesHtml = data.branches.map(function(b) {
                    return `
                            <div class="branch-item">
                                <div class="gov">${b.governorate || '-'}</div>
                                <div class="addr">${b.address || '-'}</div>
                                <div class="phone">${b.phone || '-'}</div>
                                ${b.isMainBranch ? '<div class="main-badge">الرئيسي</div>' : ''}
                            </div>
                        `;
                }).join('');
            } else {
                branchesHtml = '<div style="color:var(--text-muted);font-size:14px;">لا توجد فروع مسجلة</div>';
            }

            const certCount = allCertificates.filter(function(c) {
                return c.academyId === data.id && c.isActive !== false;
            }).length;

            container.innerHTML = `
                    <div class="academy-card">
                        <div class="academy-header">
                            <div>
                                <div class="academy-name">${data.name || '-'}</div>
                                <div style="font-size:13px;color:var(--text-muted);">
                                    الرقم الاعتمادي: ${data.licenseNumber || '-'}
                                </div>
                                <div style="font-size:12px;color:var(--text-dim);margin-top:2px;">
                                    عدد الشهادات الصادرة: ${certCount}
                                </div>
                            </div>
                            <div>
                                <span class="academy-badge">معتمدة</span>
                                <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">
                                    البطاقة الضريبية: ${data.taxNumber || '-'}
                                </div>
                            </div>
                        </div>

                        <div style="font-weight:700;color:var(--text-color);font-size:15px;margin-bottom:8px;">
                            الفروع (${data.branches ? data.branches.length : 0})
                        </div>
                        <div class="branch-grid">
                            ${branchesHtml}
                        </div>

                        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim);">
                            تم التسجيل: ${formatDate(data.createdAt)}
                        </div>
                    </div>
                `;
        }

        // ============================================================
        // 15. مودال الأكاديميات
        // ============================================================
        function openAcademiesModal() {
            document.getElementById('academiesModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            loadModalAcademies();
        }

        function closeAcademiesModal() {
            document.getElementById('academiesModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function populateModalGovernorates() {
            const select = document.getElementById('modalFilterGovernorate');
            if (!select) return;
            const govs = new Set();
            allAcademies.forEach(function(a) {
                if (a.branches) {
                    a.branches.forEach(function(b) {
                        if (b.governorate) govs.add(b.governorate);
                    });
                }
            });
            govs.forEach(function(g) {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                select.appendChild(opt);
            });
        }

        function applyModalFilters() {
            const nameFilter = document.getElementById('modalFilterName').value.trim().toLowerCase();
            const licenseFilter = document.getElementById('modalFilterLicense').value.trim().toLowerCase();
            const govFilter = document.getElementById('modalFilterGovernorate').value;

            filteredAcademies = allAcademies.filter(function(item) {
                let match = true;
                if (nameFilter) {
                    match = match && (item.name || '').toLowerCase().includes(nameFilter);
                }
                if (licenseFilter) {
                    match = match && (item.licenseNumber || '').toLowerCase().includes(licenseFilter);
                }
                if (govFilter) {
                    let hasGov = false;
                    if (item.branches) {
                        for (var i = 0; i < item.branches.length; i++) {
                            if (item.branches[i].governorate === govFilter) {
                                hasGov = true;
                                break;
                            }
                        }
                    }
                    match = match && hasGov;
                }
                return match;
            });

            modalPage = 1;
            renderModalAcademies();
        }

        function loadModalAcademies() {
            document.getElementById('modalAcademiesLoader').style.display = 'block';
            document.getElementById('modalAcademiesContent').style.display = 'none';

            filteredAcademies = [...allAcademies];
            modalPage = 1;
            renderModalAcademies();
            document.getElementById('modalAcademiesLoader').style.display = 'none';
            document.getElementById('modalAcademiesContent').style.display = 'block';
        }

        function renderModalAcademies() {
            const start = (modalPage - 1) * modalItemsPerPage;
            const end = start + modalItemsPerPage;
            const pageItems = filteredAcademies.slice(start, end);
            const totalPages = Math.ceil(filteredAcademies.length / modalItemsPerPage);

            const container = document.getElementById('modalAcademiesContent');

            if (filteredAcademies.length === 0) {
                container.innerHTML =
                    '<div style="text-align:center;color:var(--text-muted);padding:30px;">لا توجد أكاديميات تطابق معايير البحث</div>';
            } else {
                container.innerHTML = pageItems.map(function(item) {
                    const certCount = allCertificates.filter(function(c) {
                        return c.academyId === item.id && c.isActive !== false;
                    }).length;

                    return `
                            <div class="academy-item" onclick="showAcademyDetails('${item.id}')">
                                <div>
                                    <div class="name">${item.name || '-'}</div>
                                    <div class="license">${item.licenseNumber || '-'}</div>
                                </div>
                                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                                    <span class="badge">${certCount} شهادة</span>
                                    <span style="font-size:11px;color:var(--text-muted);">${item.branches ? item.branches.length : 0} فرع</span>
                                </div>
                            </div>
                        `;
                }).join('');
            }

            document.getElementById('modalPageInfo').textContent = 'صفحة ' + modalPage + ' من ' + Math.max(totalPages, 1);
            document.getElementById('modalPrevPage').disabled = modalPage <= 1;
            document.getElementById('modalNextPage').disabled = modalPage >= totalPages;
        }

        function changeModalPage(delta) {
            const totalPages = Math.ceil(filteredAcademies.length / modalItemsPerPage);
            const newPage = modalPage + delta;
            if (newPage < 1 || newPage > totalPages) return;
            modalPage = newPage;
            renderModalAcademies();
        }

        function showAcademyDetails(academyId) {
            const academy = allAcademies.find(function(a) { return a.id === academyId; });
            if (academy) {
                closeAcademiesModal();
                document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
                document.querySelector('[data-tab="tabAcademy"]').classList.add('active');
                document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
                document.getElementById('tabAcademy').classList.add('active');

                document.getElementById('academySearchInput').value = academy.name || academy.licenseNumber || '';
                setTimeout(function() {
                    document.getElementById('academySearchForm').dispatchEvent(new Event('submit'));
                }, 300);
            }
        }

        document.getElementById('academiesModal').addEventListener('click', function(e) {
            if (e.target === this) closeAcademiesModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeAcademiesModal();
        });

        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');

                document.querySelectorAll('.tab-content').forEach(function(tab) { tab.classList.remove('active'); });
                document.getElementById(this.dataset.tab).classList.add('active');

                document.querySelectorAll('.result-box').forEach(function(r) { r.classList.remove('active'); });
                document.querySelectorAll('.msg').forEach(function(m) { m.className = 'msg'; });
            });
        });

        // ============================================================
        // 16. بدء التشغيل
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('الصفحة الرئيسية - جاري التحميل');

            // تحميل الثيم المحلي أولاً
            loadTheme();

            // إظهار المحتوى
            document.getElementById('mainContainer').style.display = 'block';

            startListeners();

            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                document.getElementById('certCode').value = code;
                setTimeout(function() {
                    document.getElementById('certificateSearchForm').dispatchEvent(new Event('submit'));
                }, 500);
            }

            console.log('الصفحة الرئيسية - التحميل المسبق للإعدادات');
            console.log('أي تغيير في الإعدادات يظهر فوراً');
            console.log('الأكاديميات مرتبة حسب الرقم الاعتمادي');
            console.log('🎨 الثيمات محلية لكل مستخدم');
            console.log('🚫 تم منع قائمة النقر بزر الماوس الأيمن');
        });
    </script>

</body>
</html>
