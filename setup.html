<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تهيئة النظام - نقابة تكنولوجيا المعلومات</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tahoma', 'Segoe UI', Arial, sans-serif;
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-box {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #0055e6, #5c00e6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
        }
        .logo h1 {
            font-size: 20px;
            font-weight: 800;
        }
        .logo p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            width: 100%;
            justify-content: center;
        }
        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.4);
        }
        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
            width: auto;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #0055e6;
            box-shadow: 0 0 0 3px rgba(0, 85, 230, 0.15);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .msg {
            display: none;
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        .msg.show {
            display: block;
        }
        .msg.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
        .msg.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        .msg.info {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #3b82f6;
        }
        .loader {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        .loader.show {
            display: block;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top-color: #0055e6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .log {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 16px;
            max-height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            direction: ltr;
            text-align: left;
            margin-top: 16px;
        }
        .log .line {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .log .line.success {
            color: #22c55e;
        }
        .log .line.error {
            color: #ef4444;
        }
        .log .line.info {
            color: #3b82f6;
        }
        .log .line.warning {
            color: #f59e0b;
        }
        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            margin-top: 20px;
        }
        .flex {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 16px 0;
        }
        .status-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .status-item .icon {
            font-size: 22px;
        }
        .status-item .title {
            font-weight: 700;
            font-size: 11px;
            color: #fff;
        }
        .status-item .value {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 700;
        }
        .status-item .value.done {
            color: #22c55e;
        }
        .status-item .value.pending {
            color: #f59e0b;
        }
        .status-item .value.error {
            color: #ef4444;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 12px;
            }
            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="card">
            <div class="header">
                <div class="logo">
                    <div class="logo-box">ن.ت</div>
                    <div>
                        <h1>تهيئة النظام</h1>
                        <p>نقابة تكنولوجيا المعلومات</p>
                    </div>
                </div>
                <a href="index.html" class="btn btn-outline btn-sm">🏠 الرئيسية</a>
            </div>

            <div class="msg" id="msg"></div>

            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div style="color:rgba(255,255,255,0.3);" id="loaderText">جاري التنفيذ...</div>
            </div>

            <!-- حالة الجداول -->
            <div class="status-grid" id="statusGrid">
                <div class="status-item">
                    <div class="icon">👤</div>
                    <div class="title">المستخدمين</div>
                    <div class="value pending" id="sUsers">⏳</div>
                </div>
                <div class="status-item">
                    <div class="icon">🏛️</div>
                    <div class="title">الأكاديميات</div>
                    <div class="value pending" id="sAcademies">⏳</div>
                </div>
                <div class="status-item">
                    <div class="icon">📜</div>
                    <div class="title">الشهادات</div>
                    <div class="value pending" id="sCertificates">⏳</div>
                </div>
                <div class="status-item">
                    <div class="icon">📊</div>
                    <div class="title">النشاطات</div>
                    <div class="value pending" id="sActivities">⏳</div>
                </div>
                <div class="status-item">
                    <div class="icon">🔍</div>
                    <div class="title">سجل البحث</div>
                    <div class="value pending" id="sSearchLogs">⏳</div>
                </div>
            </div>

            <!-- زر إعادة تعيين Auth (جديد) -->
            <button class="btn btn-danger" onclick="resetAuth()" id="resetAuthBtn" style="margin-bottom:12px;">
                🔄 إعادة تعيين المصادقة
            </button>

            <!-- الزر الرئيسي -->
            <button class="btn btn-success" onclick="runSetup()" id="mainBtn">
                🚀 تهيئة النظام وإضافة المستخدم
            </button>

            <!-- بيانات المستخدم -->
            <div style="margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06);">
                <h3 style="font-weight:700;color:#fff;font-size:15px;margin-bottom:12px;">👑 بيانات المستخدم</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>📧 البريد الإلكتروني</label>
                        <input type="email" id="adminEmail" value="superadmin@itws.com" />
                    </div>
                    <div class="form-group">
                        <label>🔒 كلمة المرور</label>
                        <input type="password" id="adminPassword" value="Admin@2026" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>👤 الاسم الكامل</label>
                        <input type="text" id="adminName" value="سوبر أدمن النظام" />
                    </div>
                    <div class="form-group">
                        <label>📞 رقم الهاتف</label>
                        <input type="text" id="adminPhone" value="01234567890" />
                    </div>
                </div>
            </div>

            <!-- سجل العمليات -->
            <div style="margin-top:16px;">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                    <h3 style="font-weight:700;color:#fff;font-size:14px;">📋 سجل العمليات</h3>
                    <button class="btn btn-outline btn-sm" onclick="clearLog()">🗑️ مسح</button>
                </div>
                <div class="log" id="log">
                    <div class="line info">⏳ جاهز - اضغط على الزر أعلاه</div>
                </div>
            </div>

        </div>

        <div class="footer">
            © 2026 نقابة تكنولوجيا المعلومات والبرمجيات
        </div>

    </div>

    <script>
        // ============================================================
        // 1. تهيئة Firebase
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBfrK1IBCk2mim6cVbbtSd1e4FOQcpYQeo",
            authDomain: "itwsaccertification.firebaseapp.com",
            projectId: "itwsaccertification",
            storageBucket: "itwsaccertification.firebasestorage.app",
            messagingSenderId: "521196512526",
            appId: "1:521196512526:web:b78b06dd87cf4f5ca1e35f",
            measurementId: "G-JBMGW74DV4"
        };

        // إعادة تهيئة Firebase (حل المشكلة)
        try {
            // محاولة حذف التطبيق القديم
            if (firebase.apps.length > 0) {
                firebase.apps.forEach(app => app.delete());
            }
        } catch (e) {
            console.log('⚠️', e.message);
        }

        // تهيئة جديدة
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(app);
        const auth = firebase.auth(app);

        // إعدادات إضافية لـ Auth
        auth.useDeviceLanguage();

        // ============================================================
        // 2. دوال مساعدة
        // ============================================================
        function addLog(msg, type = 'info') {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString('ar-EG');
            const div = document.createElement('div');
            div.className = `line ${type}`;
            div.textContent = `[${time}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            addLog('🗑️ تم مسح السجل', 'info');
        }

        function showMsg(msg, type = 'info') {
            const el = document.getElementById('msg');
            el.textContent = msg;
            el.className = `msg show ${type}`;
        }

        function hideMsg() {
            document.getElementById('msg').className = 'msg';
        }

        function showLoader(text = 'جاري...') {
            document.getElementById('loader').classList.add('show');
            document.getElementById('loaderText').textContent = text;
        }

        function hideLoader() {
            document.getElementById('loader').classList.remove('show');
        }

        function setStatus(id, text, type = 'pending') {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = text;
                el.className = `value ${type}`;
            }
        }

        function getEgyptTime() {
            const now = new Date();
            return new Date(now.toLocaleString('en-US', { timeZone: 'Africa/Cairo' }));
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ============================================================
        // 3. إعادة تعيين المصادقة (حل المشكلة)
        // ============================================================
        async function resetAuth() {
            hideMsg();
            showLoader('جاري إعادة تعيين المصادقة...');
            addLog('🔄 جاري إعادة تعيين المصادقة...', 'warning');

            try {
                // تسجيل الخروج
                await auth.signOut();
                addLog('✅ تم تسجيل الخروج', 'success');

                // مسح التخزين المحلي
                localStorage.clear();
                sessionStorage.clear();
                addLog('✅ تم مسح التخزين المحلي', 'success');

                // إعادة تحميل الصفحة بعد 1 ثانية
                await sleep(1000);
                showMsg('✅ تم إعادة تعيين المصادقة بنجاح! سيتم تحديث الصفحة...', 'success');
                addLog('🔄 جاري تحديث الصفحة...', 'info');

                setTimeout(() => {
                    window.location.reload();
                }, 1500);

            } catch (err) {
                showMsg('❌ خطأ: ' + err.message, 'error');
                addLog(`❌ خطأ: ${err.message}`, 'error');
                hideLoader();
            }
        }

        // ============================================================
        // 4. إنشاء جدول
        // ============================================================
        async function ensureCollection(name) {
            try {
                const snap = await db.collection(name).limit(1).get();
                if (snap.empty) {
                    await db.collection(name).doc('_init').set({
                        initialized: true,
                        createdAt: getEgyptTime()
                    });
                    addLog(`✅ تم إنشاء جدول: ${name}`, 'success');
                    return true;
                }
                addLog(`✅ جدول موجود: ${name}`, 'info');
                return true;
            } catch (err) {
                addLog(`❌ خطأ في جدول ${name}: ${err.message}`, 'error');
                return false;
            }
        }

        // ============================================================
        // 5. إنشاء المستخدم (الحل النهائي)
        // ============================================================
        async function createUser(email, password, name, phone) {
            addLog(`👑 جاري إنشاء المستخدم: ${email}`, 'info');

            try {
                // الخطوة 1: تسجيل الخروج
                try {
                    await auth.signOut();
                    addLog(`🔄 تم تسجيل الخروج`, 'info');
                } catch (e) {
                    // تجاهل
                }

                await sleep(500);

                // الخطوة 2: محاولة إنشاء المستخدم (بدون تسجيل دخول مسبق)
                let uid = null;
                let isNew = false;

                try {
                    // محاولة إنشاء مستخدم جديد مباشرة
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    uid = cred.user.uid;
                    isNew = true;
                    addLog(`✅ تم إنشاء مستخدم جديد`, 'success');
                } catch (err) {
                    if (err.code === 'auth/email-already-in-use') {
                        // المستخدم موجود - جرب تسجيل الدخول
                        try {
                            const cred = await auth.signInWithEmailAndPassword(email, password);
                            uid = cred.user.uid;
                            addLog(`✅ المستخدم موجود مسبقاً`, 'success');
                        } catch (loginErr) {
                            if (loginErr.code === 'auth/wrong-password') {
                                // حذف المستخدم وإعادة إنشائه (حل جذري)
                                addLog(`⚠️ كلمة المرور غير صحيحة، جاري حذف المستخدم...`, 'warning');
                                // لا يمكن حذف المستخدم من العميل، نستخدم حل بديل
                                // نطلب من المستخدم تغيير كلمة المرور
                                throw new Error('المستخدم موجود بكلمة مرور مختلفة. الرجاء تغيير كلمة المرور أو استخدام بريد آخر.');
                            }
                            throw loginErr;
                        }
                    } else {
                        throw err;
                    }
                }

                if (!uid) {
                    throw new Error('لم يتم الحصول على UID');
                }

                // الخطوة 3: حفظ في Firestore
                const userData = {
                    uid: uid,
                    email: email,
                    displayName: name,
                    phone: phone,
                    role: 'super_admin',
                    isActive: true,
                    createdAt: getEgyptTime(),
                    lastLogin: getEgyptTime(),
                    updatedAt: getEgyptTime()
                };

                await db.collection('users').doc(uid).set(userData, { merge: true });
                addLog(`✅ تم حفظ بيانات المستخدم في Firestore`, 'success');

                // الخطوة 4: تسجيل نشاط
                try {
                    await db.collection('activities').add({
                        userId: uid,
                        userEmail: email,
                        userName: name,
                        userRole: 'super_admin',
                        type: 'user_create',
                        description: `${isNew ? 'إنشاء' : 'تحديث'} مستخدم: ${email}`,
                        timestamp: getEgyptTime(),
                        ipAddress: 'auto',
                        userAgent: navigator.userAgent
                    });
                    addLog(`✅ تم تسجيل النشاط`, 'success');
                } catch (err) {
                    addLog(`⚠️ نشاط: ${err.message}`, 'warning');
                }

                return { success: true, uid, isNew };

            } catch (err) {
                addLog(`❌ فشل: ${err.message}`, 'error');
                throw err;
            }
        }

        // ============================================================
        // 6. التحقق من الحالة
        // ============================================================
        async function checkStatus() {
            try {
                const collections = [
                    { name: 'users', id: 'sUsers' },
                    { name: 'academies', id: 'sAcademies' },
                    { name: 'certificates', id: 'sCertificates' },
                    { name: 'activities', id: 'sActivities' },
                    { name: 'searchLogs', id: 'sSearchLogs' },
                ];

                for (const col of collections) {
                    try {
                        const snap = await db.collection(col.name).get();
                        const count = snap.size;
                        setStatus(col.id, count > 0 ? `${count} سجل` : 'فارغ', count > 0 ? 'done' : 'pending');
                    } catch (err) {
                        setStatus(col.id, '❌', 'error');
                    }
                }
            } catch (err) {
                // تجاهل
            }
        }

        // ============================================================
        // 7. التشغيل الرئيسي
        // ============================================================
        async function runSetup() {
            hideMsg();

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const name = document.getElementById('adminName').value.trim();
            const phone = document.getElementById('adminPhone').value.trim();

            if (!email || !password || !name || !phone) {
                showMsg('❌ الرجاء ملء جميع الحقول', 'error');
                return;
            }
            if (password.length < 6) {
                showMsg('❌ كلمة المرور 6 أحرف على الأقل', 'error');
                return;
            }

            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.textContent = '⏳ جاري التنفيذ...';

            showLoader('جاري تهيئة النظام...');
            addLog('🚀 بدء التهيئة...', 'info');

            try {
                // 1. إنشاء الجداول
                addLog('📊 إنشاء الجداول...', 'info');
                const collections = ['users', 'academies', 'certificates', 'activities', 'searchLogs'];
                for (const name of collections) {
                    await ensureCollection(name);
                    await sleep(300);
                }

                // 2. إنشاء المستخدم
                addLog('👑 إنشاء المستخدم...', 'info');
                const result = await createUser(email, password, name, phone);

                // 3. تحديث الحالة
                await checkStatus();

                if (result.success) {
                    showMsg(`✅ تمت التهيئة بنجاح!\n👑 ${email} / ${password}`, 'success');
                    addLog(`🎉 اكتملت التهيئة`, 'success');
                    addLog(`👑 ${email} / ${password}`, 'info');
                    addLog(`🔑 يمكنك تسجيل الدخول الآن`, 'info');
                }

            } catch (err) {
                showMsg('❌ خطأ: ' + err.message, 'error');
                addLog(`❌ خطأ: ${err.message}`, 'error');

                // إذا كان الخطأ بسبب المصادقة، اقترح إعادة التعيين
                if (err.message.includes('credential') || err.message.includes('auth')) {
                    addLog(`💡 حاول الضغط على "إعادة تعيين المصادقة" أولاً`, 'warning');
                }
            }

            hideLoader();
            btn.disabled = false;
            btn.textContent = '🚀 تهيئة النظام وإضافة المستخدم';
        }

        // ============================================================
        // 8. تحميل الصفحة
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // تسجيل الخروج عند التحميل
            auth.signOut().catch(() => {});
            checkStatus();
            addLog('🚀 جاهز', 'info');
