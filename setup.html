<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle"></title>
    <meta name="description" id="metaDescription" content="" />
    <meta name="keywords" id="metaKeywords" content="" />

    <!-- Open Graph -->
    <meta property="og:title" id="ogTitle" content="" />
    <meta property="og:description" id="ogDescription" content="" />
    <meta property="og:image" id="ogImage" content="" />
    <meta property="og:url" id="ogUrl" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" id="ogSiteName" content="" />
    <meta property="og:locale" content="ar_EG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="twitterTitle" content="" />
    <meta name="twitter:description" id="twitterDescription" content="" />
    <meta name="twitter:image" id="twitterImage" content="" />

    <!-- Icons -->
    <link rel="icon" id="favicon" href="" />
    <link rel="apple-touch-icon" id="appleIcon" href="" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <!-- Cloudinary Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript">
    </script>

    <style>
        /* ============================================================
           التصميم المتطور لتهيئة النظام
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.06);
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.12);
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.12);
            --info: #3B82F6;
            --info-bg: rgba(59,130,246,0.12);
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.03);
            --card-bg: rgba(255,255,255,0.04);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 22s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 550px; height: 550px; border-color: rgba(124,58,237,0.04); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 750px; height: 750px; border-color: rgba(59,130,246,0.03); animation-duration: 60s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -150px;
            background: var(--primary-glow);
        }

        .glow-orb:nth-child(2) {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -200px;
            background: var(--accent-glow);
            animation-delay: 6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 950px;
            margin: 0 auto;
            padding: 16px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            position: relative;
            z-index: 2;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-box {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 0 40px var(--primary-glow);
            animation: logoSpin 20s linear infinite;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-color), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 300;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 4px 25px rgba(16,185,129,0.3);
        }
        .btn-success:hover { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(16,185,129,0.4); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--primary-color); transform: translateY(-3px); }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 25px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 40px var(--primary-glow); }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), #dc2626);
            color: #fff;
            box-shadow: 0 4px 25px rgba(239,68,68,0.3);
        }
        .btn-danger:hover { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(239,68,68,0.4); }

        .btn-sm { padding: 5px 14px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .form-group select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.10);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background: var(--bg-hover);
        }

        .upload-area .preview {
            max-width: 100px;
            max-height: 100px;
            margin: 0 auto 8px;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .upload-area .preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .upload-area .text {
            font-size: 13px;
            color: var(--text-muted);
        }
        .upload-area .sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .upload-status {
            display: none;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 8px;
            margin-top: 6px;
        }

        .upload-status.show { display: inline-block; }
        .upload-status.success { color: var(--success); background: var(--success-bg); }
        .upload-status.error { color: var(--error); background: var(--error-bg); }

        .msg {
            display: none;
            border-radius: var(--radius-sm);
            padding: 14px 20px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
            position: relative;
            z-index: 2;
        }
        .msg.show { display: block; animation: fadeIn 0.4s ease; }
        .msg.success { background: var(--success-bg); border: 1px solid var(--success); color: var(--success); }
        .msg.error { background: var(--error-bg); border: 1px solid var(--error); color: var(--error); }
        .msg.info { background: var(--info-bg); border: 1px solid var(--info); color: var(--info); }
        .msg.warning { background: var(--warning-bg); border: 1px solid var(--warning); color: var(--warning); }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px 0;
            position: relative;
            z-index: 2;
        }
        .loader.show { display: block; }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid var(--border);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .log {
            background: rgba(0,0,0,0.4);
            border-radius: var(--radius-sm);
            padding: 16px;
            max-height: 280px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-muted);
            direction: ltr;
            text-align: left;
            margin-top: 12px;
            border: 1px solid var(--border-light);
            position: relative;
            z-index: 2;
        }

        .log::-webkit-scrollbar { width: 4px; }
        .log::-webkit-scrollbar-track { background: var(--bg-hover); border-radius: 4px; }
        .log::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        .log .line {
            padding: 3px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 11px;
        }
        .log .line.success { color: var(--success); }
        .log .line.error { color: var(--error); }
        .log .line.info { color: var(--info); }
        .log .line.warning { color: var(--warning); }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 11px;
            margin-top: 20px;
            position: relative;
            z-index: 2;
        }

        .flex {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 16px 0;
            position: relative;
            z-index: 2;
        }

        .status-item {
            background: var(--bg-hover);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .status-item:hover {
            background: var(--bg-hover);
            border-color: var(--primary-color);
        }

        .status-item .icon { font-size: 22px; margin-bottom: 2px; }
        .status-item .title { font-weight: 700; font-size: 11px; color: var(--text-muted); }
        .status-item .value { font-size: 11px; margin-top: 4px; font-weight: 700; }
        .status-item .value.done { color: var(--success); }
        .status-item .value.pending { color: var(--warning); }
        .status-item .value.error { color: var(--error); }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 2;
        }

        .border-top {
            border-top: 1px solid var(--border);
            padding-top: 16px;
            margin-top: 16px;
            position: relative;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .form-row-3 { grid-template-columns: 1fr 1fr; }
            .container { padding: 12px; }
            .card { padding: 18px; border-radius: 20px; }
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .logo { justify-content: center; }
        }

        @media (max-width: 480px) {
            .btn { width: 100%; justify-content: center; }
            .flex { flex-direction: column; }
            .status-grid { grid-template-columns: repeat(2, 1fr); }
            .logo h1 { font-size: 18px; }
            .logo-box { width: 44px; height: 44px; font-size: 16px; }
            .form-row-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="page-bg"></div>

    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="grid-lines"></div>

    <div class="orbital-ring">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="glow-orb"></div>
    <div class="glow-orb"></div>

    <div class="container">

        <div class="card">

            <div class="header">
                <div class="logo">
                    <div class="logo-box">ن.ت</div>
                    <div>
                        <h1 id="pageTitleHeader"></h1>
                        <p id="pageSubtitle"></p>
                    </div>
                </div>
                <div class="flex" style="gap:8px;">
                    <a href="index.html" class="btn btn-outline btn-sm" id="homeBtn"></a>
                </div>
            </div>

            <div class="msg" id="msg"></div>

            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div style="color:var(--text-muted);" id="loaderText"></div>
            </div>

            <div class="status-grid" id="statusGrid">
                <div class="status-item">
                    <div class="icon">🔥</div>
                    <div class="title" id="statusFirebaseTitle"></div>
                    <div class="value pending" id="sFirebase"></div>
                </div>
                <div class="status-item">
                    <div class="icon">☁️</div>
                    <div class="title" id="statusCloudTitle"></div>
                    <div class="value pending" id="sCloudinary"></div>
                </div>
                <div class="status-item">
                    <div class="icon">👤</div>
                    <div class="title" id="statusUsersTitle"></div>
                    <div class="value pending" id="sUsers"></div>
                </div>
                <div class="status-item">
                    <div class="icon">🏛️</div>
                    <div class="title" id="statusAcademiesTitle"></div>
                    <div class="value pending" id="sAcademies"></div>
                </div>
                <div class="status-item">
                    <div class="icon">📜</div>
                    <div class="title" id="statusCertificatesTitle"></div>
                    <div class="value pending" id="sCertificates"></div>
                </div>
                <div class="status-item">
                    <div class="icon">📊</div>
                    <div class="title" id="statusActivitiesTitle"></div>
                    <div class="value pending" id="sActivities"></div>
                </div>
                <div class="status-item">
                    <div class="icon">🔍</div>
                    <div class="title" id="statusSearchTitle"></div>
                    <div class="value pending" id="sSearchLogs"></div>
                </div>
                <div class="status-item">
                    <div class="icon">⚙️</div>
                    <div class="title" id="statusSettingsTitle"></div>
                    <div class="value pending" id="sSettings"></div>
                </div>

        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
            if (colors.success) root.style.setProperty('--success', colors.success);
            if (colors.error) root.style.setProperty('--error', colors.error);
            if (colors.warning) root.style.setProperty('--warning', colors.warning);
            if (colors.info) root.style.setProperty('--info', colors.info);
            if (colors.border) root.style.setProperty('--border', colors.border);
            if (colors.cardBg) root.style.setProperty('--card-bg', colors.cardBg);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

                    } else {
                        applyColors(settings.colors);
                    }
                })
                .catch(function() {
                    applyColors(settings.colors);
                });

            applyTextSettings();
        }

                showMsg('حجم الصورة يتجاوز 2MB', 'error');
                e.target.value = '';
                return;
            }
            logoFile = file;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = document.querySelector('#logoPreview img');
                img.src = ev.target.result;
                img.style.display = 'block';
                document.getElementById('logoPlaceholder').textContent = file.name;
            };
            reader.readAsDataURL(file);
        }

        function uploadToCloudinary(file, publicId) {
            return new Promise(function(resolve, reject) {
                const widget = cloudinary.createUploadWidget({
                    cloudName: CLOUDINARY.cloudName,
                    uploadPreset: CLOUDINARY.uploadPreset,
                    folder: CLOUDINARY.folder,
                    publicId: publicId,
                    multiple: false,
                    sources: ['local', 'url'],
                    cropping: true,
                    croppingAspectRatio: 1,
                    styles: {
                        palette: {
                            window: '#0a0e1a',
                            windowBorder: '#C9A84C',
                            tabIcon: '#C9A84C',
                            menuIcons: '#C9A84C',
                            textDark: '#ffffff',
                            textLight: '#ffffff',
                            link: '#C9A84C',
                            action: '#C9A84C',
                            inactiveTabIcon: '#666666',
                            error: '#ef4444',
                            inProgress: '#C9A84C',
                            complete: '#22c55e',
                            sourceBg: '#0a0e1a'
                        }
                    }
                }, function(error, result) {
                    if (error) { reject(error); return; }
                    if (result.event === 'success') {
                        resolve({ secure_url: result.info.secure_url });
                    } else if (result.event === 'close') {
                        reject(new Error('تم إلغاء الرفع'));
                    }
                });
                widget.open();
            });
        }

        function uploadLogoToCloudinary() {
            if (!logoFile) {
                showMsg('الرجاء اختيار صورة اللوجو أولاً', 'info');
                return;
            }
            const btn = document.getElementById('uploadLogoBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الرفع...';
            uploadToCloudinary(logoFile, 'union_logo')
                .then(function(data) {
                    const url = data.secure_url;
                    return db.collection('settings').doc('general').set({
                        logoUrl: url,
                        updatedAt: getEgyptTime()
                    }, { merge: true }).then(function() { return url; });
                })
                .then(function() {
                    showMsg('تم رفع اللوجو بنجاح', 'success');
                    document.getElementById('logoStatus').textContent = 'تم الرفع';
                    document.getElementById('logoStatus').className = 'upload-status show success';
                    btn.disabled = false;
                    btn.textContent = settings.uploadLogoBtn;
                    logoFile = null;
                    addLog('تم رفع اللوجو', 'success');
                    loadImagesFromFirestore();
                })
                .catch(function(err) {
                    showMsg('حدث خطأ: ' + (err.message || err), 'error');
                    document.getElementById('logoStatus').textContent = 'فشل الرفع';
                    document.getElementById('logoStatus').className = 'upload-status show error';
                    btn.disabled = false;
                    btn.textContent = settings.uploadLogoBtn;
                    addLog('فشل رفع اللوجو: ' + (err.message || err), 'error');
                });
        }

            const btn = document.getElementById('uploadStampBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الرفع...';
            uploadToCloudinary(stampFile, 'union_stamp')
                .then(function(data) {
                    const url = data.secure_url;
                    return db.collection('settings').doc('general').set({
                        stampUrl: url,
                        updatedAt: getEgyptTime()
                    }, { merge: true }).then(function() { return url; });
                })
                .then(function() {
                    showMsg('تم رفع الختم بنجاح', 'success');
                    document.getElementById('stampStatus').textContent = 'تم الرفع';
                    document.getElementById('stampStatus').className = 'upload-status show success';
                    btn.disabled = false;
                    btn.textContent = settings.uploadStampBtn;
                    stampFile = null;
                    addLog('تم رفع الختم', 'success');
                    loadImagesFromFirestore();
                })
                .catch(function(err) {
                    showMsg('حدث خطأ: ' + (err.message || err), 'error');
                    document.getElementById('stampStatus').textContent = 'فشل الرفع';
                    document.getElementById('stampStatus').className = 'upload-status show error';
                    btn.disabled = false;
                    btn.textContent = settings.uploadStampBtn;
                    addLog('فشل رفع الختم: ' + (err.message || err), 'error');
                });
        }

        function loadImagesFromFirestore() {
            db.collection('settings').doc('general').get()
                .then(function(doc) {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.logoUrl) {
                            const img = document.querySelector('#logoPreview img');
                            img.src = data.logoUrl;
                            img.style.display = 'block';
                            document.getElementById('logoPlaceholder').textContent = 'لوجو موجود';
                        }
                        if (data.stampUrl) {
                            const img = document.querySelector('#stampPreview img');
                            img.src = data.stampUrl;
                            img.style.display = 'block';
                            document.getElementById('stampPlaceholder').textContent = 'ختم موجود';
                        }
                    }
                })
                .catch(function() {});
        }

        function clearImages() {
            if (!confirm('هل أنت متأكد من حذف اللوجو والختم؟')) return;
            db.collection('settings').doc('general').set({
                logoUrl: '',
                stampUrl: '',
                updatedAt: getEgyptTime()
            }, { merge: true })
            .then(function() {
                document.querySelector('#logoPreview img').style.display = 'none';
                document.getElementById('logoPlaceholder').textContent = settings.logoPlaceholder;
                document.querySelector('#stampPreview img').style.display = 'none';
                document.getElementById('stampPlaceholder').textContent = settings.stampPlaceholder;
                showMsg('تم حذف الصور بنجاح', 'success');
                addLog('تم حذف الصور', 'success');
            })
            .catch(function(err) {
                showMsg('حدث خطأ: ' + err.message, 'error');
                addLog('خطأ: ' + err.message, 'error');
            });
        }

        // ============================================================
        // 9. مسح جميع المجموعات (ما عدا settings)
        // ============================================================
        async function clearAllCollections() {
            const collections = ['users', 'academies', 'certificates', 'activities', 'searchLogs'];
            let cleared = 0;

            for (const name of collections) {
                try {
                    const snap = await db.collection(name).get();
                    if (snap.empty) {
                        addLog('جدول ' + name + ' فارغ', 'info');
                        continue;
                    }

                    const batch = db.batch();
                    snap.docs.forEach(function(doc) {
                        if (doc.id !== '_init') {
                            batch.delete(doc.ref);
                        }
                    });

                    await batch.commit();
                    cleared++;
                    addLog('تم مسح جدول: ' + name + ' (' + snap.size + ' وثيقة)', 'warning');

                    await sleep(200);

                    await db.collection(name).doc('_init').set({
                        initialized: true,
                        createdAt: getEgyptTime(),
                        clearedAt: getEgyptTime()
                    });

                } catch (err) {
                    addLog('خطأ في مسح ' + name + ': ' + err.message, 'error');
                }
            }

            addLog('تم مسح ' + cleared + ' جداول', 'success');
            return cleared;
        }

        // ============================================================
        // 10. إنشاء المستخدم - حل مشكلة auth/invalid-credential
        // ============================================================
        async function createUser(email, password, name, phone) {
            addLog('جاري إنشاء المستخدم: ' + email, 'info');

            try {
                // 1. تسجيل الخروج من أي جلسة سابقة
                try { await auth.signOut(); } catch(e) {}
                await sleep(500);

                // 2. محاولة تسجيل الدخول (لو المستخدم موجود)
                try {
                    const cred = await auth.signInWithEmailAndPassword(email, password);
                    const uid = cred.user.uid;
                    addLog('المستخدم موجود مسبقاً', 'success');

                    await db.collection('users').doc(uid).set({
                        uid: uid,
                        email: email,
                        displayName: name,
                        phone: phone,
                        role: 'super_admin',
                        isActive: true,
                        lastLogin: getEgyptTime(),
                        updatedAt: getEgyptTime()
                    }, { merge: true });

                    return { success: true, uid, isNew: false };
                } catch (loginErr) {
                    // 3. لو المستخدم غير موجود → ننشئه
                    if (loginErr.code === 'auth/user-not-found') {
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        const uid = cred.user.uid;
                        addLog('تم إنشاء مستخدم جديد', 'success');

                        await db.collection('users').doc(uid).set({
                            uid: uid,
                            email: email,
                            displayName: name,
                            phone: phone,
                            role: 'super_admin',
                            isActive: true,
                            createdAt: getEgyptTime(),
                            lastLogin: getEgyptTime()
                        });

                        return { success: true, uid, isNew: true };
                    } else if (loginErr.code === 'auth/invalid-credential') {
                        // 4. مشكلة في بيانات الاعتماد - نعيد المحاولة مع تنظيف كامل
                        addLog('مشكلة في بيانات الاعتماد، جاري إعادة المحاولة...', 'warning');
                        await sleep(1000);

                        // التأكد من أن البريد صحيح
                        if (!email || email.length < 5 || !email.includes('@')) {
                            throw new Error('البريد الإلكتروني غير صحيح');
                        }

                        // نحاول إنشاء المستخدم من جديد
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        const uid = cred.user.uid;
                        addLog('تم إنشاء المستخدم بعد إعادة المحاولة', 'success');

                        await db.collection('users').doc(uid).set({
                            uid: uid,
                            email: email,
                            displayName: name,
                            phone: phone,
                            role: 'super_admin',
                            isActive: true,
                            createdAt: getEgyptTime(),
                            lastLogin: getEgyptTime()
                        });

                        return { success: true, uid, isNew: true };
                    } else {
                        throw loginErr;
                    }
                }
            } catch (err) {
                addLog('فشل: ' + err.message, 'error');
                throw err;
            }
        }

        // ============================================================
        // 11. حفظ الإعدادات
        // ============================================================
        async function saveSettings() {
            const data = {
                unionName: document.getElementById('unionName').value.trim() || settings.unionName,
                committeeName: document.getElementById('committeeName').value.trim() || settings.committeeName,
                splashDuration: parseInt(document.getElementById('splashDuration').value) || settings.splashDuration,
                infoBoxText: document.getElementById('infoBoxText').value.trim() || settings.infoBoxText,
                footerText: document.getElementById('footerText').value.trim() || settings.footerText,
                sessionTimeout: parseInt(document.getElementById('sessionTimeout').value) || settings.sessionTimeout,
                presidentName: document.getElementById('presidentName').value.trim() || settings.presidentName,
                updatedAt: getEgyptTime()
            };

            await db.collection('settings').doc('general').set(data, { merge: true });
            addLog('تم حفظ الإعدادات العامة', 'success');

            const servicesData = {
                text: document.getElementById('servicesBtnText').value.trim() || settings.servicesText,
                link: document.getElementById('servicesBtnLink').value.trim() || settings.servicesLink,
                updatedAt: getEgyptTime()
            };
            await db.collection('settings').doc('servicesButton').set(servicesData, { merge: true });
            addLog('تم حفظ زر الخدمات', 'success');

            setStatus('sSettings', 'جاهز', 'done');
            return true;
        }

        // ============================================================
        // 12. التحقق من Firebase
        // ============================================================
        async function checkFirebase() {
            try {
                await db.collection('users').limit(1).get();
                setStatus('sFirebase', 'متصل', 'done');
                addLog('Firebase متصل', 'success');
                return true;
            } catch (err) {
                setStatus('sFirebase', 'خطأ', 'error');
                addLog('Firebase: ' + err.message, 'error');
                return false;
            }
        }

        // ============================================================
        // 13. التحقق من Cloudinary
        // ============================================================
        async function checkCloudinary() {
            try {
                if (typeof cloudinary !== 'undefined' && cloudinary.createUploadWidget) {
                    setStatus('sCloudinary', 'متصل', 'done');
                    addLog('Cloudinary متصل', 'success');
                    return true;
                } else {
                    setStatus('sCloudinary', 'غير متصل', 'warning');
                    addLog('Cloudinary غير متصل', 'warning');
                    return false;
                }
            } catch (err) {
                setStatus('sCloudinary', 'غير متصل', 'warning');
                addLog('Cloudinary: ' + err.message, 'warning');
                return false;
            }
        }

        // ============================================================
        // 14. تشغيل التهيئة الكاملة (ضغطة واحدة)
        // ============================================================
        async function runFullSetup() {
            if (isRunning) {
                showMsg('جاري التنفيذ حالياً، انتظر قليلاً', 'warning');
                return;
            }

            hideMsg();

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const name = document.getElementById('adminName').value.trim();
            const phone = document.getElementById('adminPhone').value.trim();

            if (!email || !password || !name || !phone) {
                showMsg('الرجاء ملء جميع الحقول', 'error');
                return;
            }
            if (password.length < 6) {
                showMsg('كلمة المرور 6 أحرف على الأقل', 'error');
                return;
            }
            if (!email.includes('@') || email.length < 5) {
                showMsg('البريد الإلكتروني غير صحيح', 'error');
                return;
            }

            if (!confirm('تحذير: هذا الإجراء سيمسح جميع البيانات الحالية في Firebase\n' +
                         'ويقوم بإنشاء قاعدة بيانات جديدة مهيأة للمنصة.\n\n' +
                         'المستخدم الجديد: ' + email + '\n' +
                         'هل أنت متأكد؟')) {
                return;
            }

            isRunning = true;
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.textContent = 'جاري التهيئة...';

            showLoader('جاري تهيئة النظام بالكامل...');
            addLog('بدء التهيئة الكاملة للنظام...', 'info');

            try {
                // 1. التحقق من الاتصالات
                await checkFirebase();
                await sleep(300);
                await checkCloudinary();
                await sleep(300);

                // 2. مسح جميع الجداول
                addLog('جاري مسح جميع البيانات...', 'warning');
                await clearAllCollections();
                await sleep(500);

                // 3. حفظ الإعدادات
                await saveSettings();
                await sleep(300);

                // 4. إنشاء المستخدم (مع حل مشكلة المصادقة)
                await createUser(email, password, name, phone);
                await sleep(300);

                // 5. تحميل الصور إن وجدت
                loadImagesFromFirestore();

                // 6. تحديث الحالة النهائية
                setStatus('sUsers', '✅ ' + email, 'done');
                setStatus('sAcademies', 'جاهز', 'done');
                setStatus('sCertificates', 'جاهز', 'done');
                setStatus('sActivities', 'جاهز', 'done');
                setStatus('sSearchLogs', 'جاهز', 'done');

                showMsg('تمت تهيئة النظام بالكامل بنجاح!\n' + email + ' / ' + password, 'success');
                addLog('اكتملت تهيئة النظام بالكامل', 'success');
                addLog(email + ' / ' + password, 'info');
                addLog('يمكنك تسجيل الدخول الآن', 'info');

            } catch (err) {
                showMsg('خطأ: ' + err.message, 'error');
                addLog('خطأ: ' + err.message, 'error');

                if (err.message.includes('auth/invalid-credential') || err.message.includes('credential')) {
                    addLog('حاول تغيير البريد الإلكتروني أو كلمة المرور', 'warning');
                    addLog('تأكد من أن البريد صالح (مثل: admin@example.com)', 'warning');
                }
            }

            hideLoader();
            btn.disabled = false;
            btn.textContent = settings.mainBtnText;
            isRunning = false;
        }

        // ============================================================
        // 15. تحميل الصفحة
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // تسجيل الخروج من أي جلسة سابقة لتجنب مشاكل المصادقة
            auth.signOut().catch(() => {});

            loadSettings();

            setTimeout(function() {
                db.collection('users').limit(1).get()
                    .then(() => {
                        setStatus('sFirebase', 'متصل', 'done');
                    })
                    .catch(() => {
                        setStatus('sFirebase', 'خطأ', 'error');
                    });

                if (typeof cloudinary !== 'undefined' && cloudinary.createUploadWidget) {
                    setStatus('sCloudinary', 'متصل', 'done');
                } else {
                    setStatus('sCloudinary', 'غير متصل', 'warning');
                }
            }, 500);

            loadImagesFromFirestore();
            addLog(settings.logReady, 'info');
            addLog('اضغط "تهيئة النظام بالكامل" لإنشاء قاعدة البيانات', 'info');
            addLog('تم إصلاح مشكلة auth/invalid-credential', 'success');
        });
    </script>

</body>
