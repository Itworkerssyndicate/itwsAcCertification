<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle"></title>
    <meta name="description" id="metaDescription" content="" />
    <meta name="keywords" id="metaKeywords" content="" />

    <!-- Open Graph -->
    <meta property="og:title" id="ogTitle" content="" />
    <meta property="og:description" id="ogDescription" content="" />
    <meta property="og:image" id="ogImage" content="" />
    <meta property="og:url" id="ogUrl" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" id="ogSiteName" content="" />
    <meta property="og:locale" content="ar_EG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="twitterTitle" content="" />
    <meta name="twitter:description" id="twitterDescription" content="" />
    <meta name="twitter:image" id="twitterImage" content="" />

    <!-- Icons -->
    <link rel="icon" id="favicon" href="" />
    <link rel="apple-touch-icon" id="appleIcon" href="" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js">
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>

    <style>
        /* ============================================================
           التصميم الخرافي للوحة التحكم
           كل حرف ولون من الإعدادات
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        :root {
            --primary-color: #C9A84C;
            --primary-dark: #A8893A;
            --primary-light: #E8D5A3;
            --primary-glow: rgba(201,168,76,0.3);
            --secondary-color: #0A1628;
            --accent-color: #7C3AED;
            --accent-light: #A78BFA;
            --accent-glow: rgba(124,58,237,0.2);
            --bg-color: #0A0E1A;
            --bg-card: rgba(255,255,255,0.04);
            --bg-hover: rgba(255,255,255,0.06);
            --text-color: #FFFFFF;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --text-dim: rgba(255,255,255,0.15);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.12);
            --error: #EF4444;
            --error-bg: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.12);
            --info: #3B82F6;
            --info-bg: rgba(59,130,246,0.12);
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.03);
            --card-bg: rgba(255,255,255,0.04);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 28px;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.04) rotate(1.5deg); opacity: 0.9; }
        }

        .page-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 22s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 6px; height: 6px; top: 5%; left: 5%; animation-delay: 0s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(2) { width: 8px; height: 8px; top: 15%; left: 30%; animation-delay: 2s; background: var(--accent-color); opacity: 0.3; }
        .particle:nth-child(3) { width: 4px; height: 4px; top: 25%; left: 70%; animation-delay: 4s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(4) { width: 7px; height: 7px; top: 40%; left: 10%; animation-delay: 1s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(5) { width: 5px; height: 5px; top: 50%; left: 85%; animation-delay: 3s; background: var(--primary-color); opacity: 0.3; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 65%; left: 20%; animation-delay: 5s; background: var(--accent-color); opacity: 0.25; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 75%; left: 60%; animation-delay: 2.5s; background: var(--primary-color); opacity: 0.4; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 88%; left: 40%; animation-delay: 4.5s; background: var(--accent-color); opacity: 0.3; }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            20% { transform: translate(40px, -30px) scale(1.3); opacity: 0.6; }
            40% { transform: translate(-20px, -60px) scale(0.7); opacity: 0.3; }
            60% { transform: translate(50px, -20px) scale(1.4); opacity: 0.7; }
            80% { transform: translate(-30px, -80px) scale(0.8); opacity: 0.4; }
            100% { transform: translate(10px, 0) scale(1); opacity: 0.1; }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(30px); }
        }

        .orbital-ring {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.04);
            animation: ringSpin 40s linear infinite;
        }

        .ring:nth-child(1) { width: 350px; height: 350px; border-color: rgba(201,168,76,0.06); }
        .ring:nth-child(2) { width: 550px; height: 550px; border-color: rgba(124,58,237,0.04); animation-duration: 50s; animation-direction: reverse; }
        .ring:nth-child(3) { width: 750px; height: 750px; border-color: rgba(59,130,246,0.03); animation-duration: 60s; }

        @keyframes ringSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }

        .glow-orb:nth-child(1) {
            width: 450px;
            height: 450px;
            top: -150px;
            right: -150px;
            background: var(--primary-glow);
        }

        .glow-orb:nth-child(2) {
            width: 550px;
            height: 550px;
            bottom: -200px;
            left: -200px;
            background: var(--accent-glow);
            animation-delay: 6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(60px, 40px) scale(1.15); opacity: 0.8; }
        }

        .dashboard-container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        /* ===== الهيدر ===== */
        .header {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: headerFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: logoSpin 20s linear infinite;
            box-shadow: 0 0 35px var(--primary-glow);
            position: relative;
            background-size: cover;
            background-position: center;
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-box:hover {
            animation-duration: 3s;
            transform: scale(1.08);
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
        }

        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-president {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 14px;
            background: var(--bg-hover);
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-president:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .header-president .president-icon { font-size: 16px; }
        .header-president .president-label { font-size: 11px; color: var(--text-muted); font-weight: 300; }
        .header-president .president-name {
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            box-shadow: 0 4px 25px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 40px var(--primary-glow); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--primary-color); transform: translateY(-3px); }

        .btn-sm { padding: 5px 14px; font-size: 12px; }

        .role-badge {
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 20px;
            background: var(--primary-glow);
            color: var(--primary-color);
            font-weight: 600;
        }

        /* ===== البطاقات الإحصائية ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--primary-glow), transparent 50%);
            pointer-events: none;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-color);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        .stat-card .stat-icon { font-size: 28px; margin-bottom: 4px; display: inline-block; }
        .stat-card .stat-number {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-color), var(--primary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }
        .stat-card .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 300; }

        /* ===== الشبكة الداخلية ===== */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 992px) { .content-grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover { border-color: var(--primary-color); }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-title .badge {
            font-size: 10px;
            background: var(--primary-glow);
            color: var(--primary-color);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* ===== قائمة النشاطات ===== */
        .activity-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .activity-list::-webkit-scrollbar { width: 4px; }
        .activity-list::-webkit-scrollbar-track { background: var(--bg-hover); border-radius: 4px; }
        .activity-list::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .activity-item:hover {
            background: var(--bg-hover);
            padding-right: 8px;
            border-radius: 8px;
        }

        .activity-item .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-glow), var(--accent-glow));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-color);
            flex-shrink: 0;
        }

        .activity-item .info { flex: 1; min-width: 0; }
        .activity-item .info .text { font-size: 13px; color: var(--text-secondary); }
        .activity-item .info .time { font-size: 10px; color: var(--text-muted); }

        .activity-item .type-badge {
            font-size: 9px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .type-badge.login { background: var(--info-bg); color: var(--info); }
        .type-badge.logout { background: var(--error-bg); color: var(--error); }
        .type-badge.create { background: var(--success-bg); color: var(--success); }
        .type-badge.update { background: var(--warning-bg); color: var(--warning); }
        .type-badge.delete { background: var(--error-bg); color: var(--error); }
        .type-badge.search { background: var(--accent-glow); color: var(--accent-light); }
        .type-badge.export { background: rgba(236,72,153,0.15); color: #ec4899; }

        /* ===== الروابط السريعة ===== */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .quick-action {
            background: var(--bg-hover);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-color);
        }

        .quick-action:hover {
            background: var(--bg-hover);
            transform: translateY(-4px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .quick-action .icon { font-size: 28px; margin-bottom: 4px; }
        .quick-action .label { font-size: 11px; font-weight: 600; color: var(--text-muted); }

        /* ===== الرسم البياني ===== */
        .chart-container {
            position: relative;
            height: 200px;
            width: 100%;
        }

        /* ===== رسائل ===== */
        .msg {
            display: none;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }
        .msg.show { display: block; animation: fadeIn 0.3s ease; }
        .msg.error { background: var(--error-bg); border: 1px solid var(--error); color: var(--error); }
        .msg.success { background: var(--success-bg); border: 1px solid var(--success); color: var(--success); }
        .msg.info { background: var(--info-bg); border: 1px solid var(--info); color: var(--info); }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .loader { display: none; text-align: center; padding: 30px 0; }
        .loader.show { display: block; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid var(--border);
            margin-top: 24px;
            color: var(--text-dim);
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px 16px; border-radius: 20px; }
            .header-right { justify-content: center; flex-wrap: wrap; }
            .header-left { justify-content: center; flex-wrap: wrap; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-card .stat-number { font-size: 24px; }
            .quick-actions { grid-template-columns: repeat(3, 1fr); }
            .dashboard-container { padding: 10px; }
            .card { padding: 14px 16px; }
            .glow-orb { display: none; }
            .ring { display: none; }
            .header-title { text-align: center; }
            .header-president { padding: 3px 10px; }
            .header-president .president-name { font-size: 12px; }
            .content-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .stat-card { padding: 12px 14px; }
            .stat-card .stat-number { font-size: 20px; }
            .quick-actions { grid-template-columns: repeat(2, 1fr); }
            .header-title h1 { font-size: 15px; }
            .btn { padding: 6px 14px; font-size: 11px; }
            .logo-box { width: 36px; height: 36px; font-size: 14px; }
            .card-title { font-size: 14px; }
            .activity-item .info .text { font-size: 12px; }
            .stat-card .stat-icon { font-size: 20px; }
            .header-president .president-name { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="page-bg"></div>

    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="grid-lines"></div>

    <div class="orbital-ring">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="glow-orb"></div>
    <div class="glow-orb"></div>

        function loadSettings() {
            db.collection('settings').doc('general').get()
                .then(function(doc) {
                    if (doc.exists) {
                        const data = doc.data();

                        if (data.dashboardTitle) settings.dashboardTitle = data.dashboardTitle;
                        if (data.committeeName) settings.committeeName = data.committeeName;
                        if (data.logoUrl) settings.logoUrl = data.logoUrl;
                        if (data.footerText) settings.footerText = data.footerText;
                        if (data.presidentName) settings.presidentName = data.presidentName;
                        if (data.presidentLabel) settings.presidentLabel = data.presidentLabel;
                        if (data.colors) settings.colors = { ...settings.colors, ...data.colors };

                        // نصوص إضافية
                        db.collection('settings').doc('texts').get()
                            .then(function(textsDoc) {
                                if (textsDoc.exists) {
                                    const texts = textsDoc.data();
                                    if (texts.searchBtn) settings.searchBtn = texts.searchBtn;
                                    if (texts.logoutBtn) settings.logoutBtn = texts.logoutBtn;
                                    if (texts.settingsBtn) settings.settingsBtn = texts.settingsBtn;
                                    if (texts.usersBtn) settings.usersBtn = texts.usersBtn;
                                    if (texts.statCertificatesLabel) settings.statCertificatesLabel = texts.statCertificatesLabel;
                                    if (texts.statAcademiesLabel) settings.statAcademiesLabel = texts.statAcademiesLabel;
                                    if (texts.statUsersLabel) settings.statUsersLabel = texts.statUsersLabel;
                                    if (texts.statSearchesLabel) settings.statSearchesLabel = texts.statSearchesLabel;
                                    if (texts.statActivitiesLabel) settings.statActivitiesLabel = texts.statActivitiesLabel;
                                    if (texts.activityTitle) settings.activityTitle = texts.activityTitle;
                                    if (texts.activityBadge) settings.activityBadge = texts.activityBadge;
                                    if (texts.activityEmpty) settings.activityEmpty = texts.activityEmpty;
                                    if (texts.viewAllBtn) settings.viewAllBtn = texts.viewAllBtn;
                                    if (texts.quickActionsTitle) settings.quickActionsTitle = texts.quickActionsTitle;
                                    if (texts.quickAcademiesLabel) settings.quickAcademiesLabel = texts.quickAcademiesLabel;
                                    if (texts.quickCertificatesLabel) settings.quickCertificatesLabel = texts.quickCertificatesLabel;
                                    if (texts.quickActivitiesLabel) settings.quickActivitiesLabel = texts.quickActivitiesLabel;
                                    if (texts.quickReportsLabel) settings.quickReportsLabel = texts.quickReportsLabel;
                                    if (texts.quickSettingsLabel) settings.quickSettingsLabel = texts.quickSettingsLabel;
                                    if (texts.quickUsersLabel) settings.quickUsersLabel = texts.quickUsersLabel;
                                    if (texts.quickSearchLabel) settings.quickSearchLabel = texts.quickSearchLabel;

                                    if (texts.presidentFooter) settings.presidentFooter = texts.presidentFooter;

                                applyColors(settings.colors);
                            })

                                applySettings();
                                applyColors(settings.colors);
                            });

                    } else {
                        applySettings();
                        applyColors(settings.colors);
                    }
                })
                .catch(function() {
                    applySettings();
                    applyColors(settings.colors);
                });

        function applyColors(colors) {
            const root = document.documentElement;
            if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
            if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
            if (colors.background) root.style.setProperty('--bg-color', colors.background);
            if (colors.text) root.style.setProperty('--text-color', colors.text);
            if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
            if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
            if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
            if (colors.success) root.style.setProperty('--success', colors.success);
            if (colors.error) root.style.setProperty('--error', colors.error);
            if (colors.warning) root.style.setProperty('--warning', colors.warning);
            if (colors.info) root.style.setProperty('--info', colors.info);
            if (colors.border) root.style.setProperty('--border', colors.border);
            if (colors.cardBg) root.style.setProperty('--card-bg', colors.cardBg);

            const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
            root.style.setProperty('--primary-glow', primaryGlow);
            const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
            root.style.setProperty('--accent-glow', accentGlow);

            if (colors.background) {
                document.body.style.background = colors.background;
            }
        }

        // ============================================================

        // ============================================================
        function loadLocalSettings() {
            try {
                const localSettings = localStorage.getItem('userSettings');
                if (localSettings) {
                    const parsed = JSON.parse(localSettings);
                    if (parsed.theme && parsed.theme.colors) {
                        const root = document.documentElement;
                        const colors = parsed.theme.colors;
                        if (colors.primary) root.style.setProperty('--primary-color', colors.primary);
                        if (colors.accent) root.style.setProperty('--accent-color', colors.accent);
                        if (colors.background) root.style.setProperty('--bg-color', colors.background);
                        if (colors.text) root.style.setProperty('--text-color', colors.text);
                        if (colors.textSecondary) root.style.setProperty('--text-secondary', colors.textSecondary);
                        if (colors.textMuted) root.style.setProperty('--text-muted', colors.textMuted);
                        if (colors.textDim) root.style.setProperty('--text-dim', colors.textDim);
                        if (colors.success) root.style.setProperty('--success', colors.success);
                        if (colors.error) root.style.setProperty('--error', colors.error);
                        if (colors.warning) root.style.setProperty('--warning', colors.warning);
                        if (colors.info) root.style.setProperty('--info', colors.info);
                        if (colors.border) root.style.setProperty('--border', colors.border);
                        if (colors.cardBg) root.style.setProperty('--card-bg', colors.cardBg);

                        const primaryGlow = colors.primary ? colors.primary + '30' : 'rgba(201,168,76,0.3)';
                        root.style.setProperty('--primary-glow', primaryGlow);
                        const accentGlow = colors.accent ? colors.accent + '20' : 'rgba(124,58,237,0.2)';
                        root.style.setProperty('--accent-glow', accentGlow);

                        if (colors.background) {
                            document.body.style.background = colors.background;
                        }
                        console.log('✅ تم تطبيق الإعدادات المحلية');
                    }
                }
            } catch (e) {
                console.log('ℹ️ لا توجد إعدادات محلية');
            }
        }

        auth.onAuthStateChanged(function(user) {
            if (user) {
                currentUser = user;
                db.collection('users').doc(user.uid).get()
                    .then(function(doc) {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.role === 'super_admin' || data.role === 'admin' || data.role === 'committee_manager') {
                                userRole = data.role;

                                const settingsBtn = document.getElementById('settingsBtn');
                                const settingsQuick = document.getElementById('quickSettings');
                                const usersBtn = document.getElementById('usersBtn');
                                const usersQuick = document.getElementById('quickUsers');

                                if (data.role === 'super_admin') {
                                    if (settingsBtn) settingsBtn.style.display = 'inline-flex';
                                    if (settingsQuick) settingsQuick.style.display = 'flex';
                                    if (usersBtn) usersBtn.style.display = 'inline-flex';
                                    if (usersQuick) usersQuick.style.display = 'flex';
                                }

                                loadDashboard();
                            } else {
                                showMsg('غير مصرح بالوصول إلى لوحة التحكم', 'error');
                                setTimeout(function() { window.location.href = 'home.html'; }, 2000);
                            }
                        } else {
                            showMsg('المستخدم غير موجود', 'error');
                            setTimeout(function() { window.location.href = 'login.html'; }, 2000);
                        }
                    })
                    .catch(function(err) {
                        showMsg('حدث خطأ: ' + err.message, 'error');
                    });
            } else {
                window.location.href = 'login.html';
            }
        });

        // ============================================================
        // 6. تحميل لوحة التحكم
        // ============================================================
        function loadDashboard() {
            const loader = document.getElementById('dashboardLoader');
            if (loader) loader.classList.add('show');

            Promise.all([
                db.collection('certificates').where('isActive', '==', true).get(),
                db.collection('academies').where('isDeleted', '==', false).get(),
                db.collection('users').where('isActive', '==', true).get(),
                db.collection('searchLogs').get(),
                db.collection('activities').orderBy('timestamp', 'desc').limit(15).get(),
                db.collection('certificates').get(),
            ]).then(function(results) {
                const certActiveSnap = results[0];
                const acadSnap = results[1];
                const userSnap = results[2];
                const searchSnap = results[3];
                const activitySnap = results[4];
                const allCertSnap = results[5];

                const statCert = document.getElementById('statCertificates');
                const statAcad = document.getElementById('statAcademies');
                const statUsers = document.getElementById('statUsers');
                const statSearches = document.getElementById('statSearches');
                const statActivities = document.getElementById('statActivities');

                if (statCert) statCert.textContent = certActiveSnap.size || 0;
                if (statAcad) statAcad.textContent = acadSnap.size || 0;
                if (statUsers) statUsers.textContent = userSnap.size || 0;
                if (statSearches) statSearches.textContent = searchSnap.size || 0;
                if (statActivities) statActivities.textContent = activitySnap.size || 0;

                renderActivities(activitySnap);
                renderChart(allCertSnap);

                if (loader) loader.classList.remove('show');
                const content = document.getElementById('dashboardContent');
                if (content) content.style.display = 'block';

            }).catch(function(err) {
                console.error(err);
                if (loader) loader.classList.remove('show');
                const content = document.getElementById('dashboardContent');
                if (content) content.style.display = 'block';
                showMsg('حدث خطأ في تحميل البيانات', 'error');
            });
        }

        // ============================================================
        // 7. عرض النشاطات
        // ============================================================
        function renderActivities(snapshot) {
            const container = document.getElementById('activityList');
            if (!container) return;

            container.innerHTML = '';

            if (snapshot.empty) {
                const empty = document.getElementById('activityEmpty');
                if (empty) container.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:20px 0;font-size:13px;">${empty.textContent || 'لا توجد نشاطات حديثة'}</div>`;
                return;
            }

            const typeMap = {
                'login': { label: 'تسجيل دخول', cls: 'login' },
                'logout': { label: 'تسجيل خروج', cls: 'logout' },
                'create_academy': { label: 'إضافة أكاديمية', cls: 'create' },
                'update_academy': { label: 'تعديل أكاديمية', cls: 'update' },
                'delete_academy': { label: 'حذف أكاديمية', cls: 'delete' },
                'create_certificate': { label: 'إضافة شهادة', cls: 'create' },
                'update_certificate': { label: 'تعديل شهادة', cls: 'update' },
                'delete_certificate': { label: 'حذف شهادة', cls: 'delete' },
                'search_certificate': { label: 'بحث شهادة', cls: 'search' },
                'search_academy': { label: 'بحث أكاديمية', cls: 'search' },
                'export_pdf': { label: 'تصدير PDF', cls: 'export' },
                'export_excel': { label: 'تصدير Excel', cls: 'export' },
            };

            let count = 0;
            snapshot.forEach(function(doc) {
                if (count >= 10) return;
                const data = doc.data();
                const typeInfo = typeMap[data.type] || { label: data.type || 'نشاط', cls: 'info' };

                const item = document.createElement('div');
                item.className = 'activity-item';

                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = (data.userName || 'م').charAt(0);

                const info = document.createElement('div');
                info.className = 'info';
                const timeStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString('ar-EG') : 'الآن';
                info.innerHTML =
                    `<div class="text">${data.description || typeInfo.label}</div><div class="time">${data.userName || 'مستخدم'} • ${timeStr}</div>`;

                const badge = document.createElement('span');
                badge.className = 'type-badge ' + typeInfo.cls;
                badge.textContent = typeInfo.label;

                item.appendChild(avatar);
                item.appendChild(info);
                item.appendChild(badge);
                container.appendChild(item);
                count++;
            });
        }

        // ============================================================
        // 8. الرسم البياني
        // ============================================================
        function renderChart(snapshot) {
            const canvas = document.getElementById('chartCanvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');

            const grades = {};
            snapshot.forEach(function(doc) {
                const data = doc.data();
                if (data.grade) {
                    grades[data.grade] = (grades[data.grade] || 0) + 1;
                }
            });

            const labels = Object.keys(grades).sort();
            const values = labels.map(function(key) { return grades[key]; });
            const colors = ['#10b981', '#3b82f6', '#eab308', '#f97316', '#ef4444', '#8b5cf6', '#ec4899'];

            if (chartInstance) { chartInstance.destroy(); }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.length > 0 ? labels : ['لا توجد بيانات'],
                    datasets: [{
                        label: 'عدد الشهادات',
                        data: values.length > 0 ? values : [0],
                        backgroundColor: labels.map(function(_, i) {
                            return colors[i % colors.length] + '40';
                        }),
                        borderColor: labels.map(function(_, i) {
                            return colors[i % colors.length];
                        }),
                        borderWidth: 2,
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 10 } },
                            grid: { color: 'rgba(255,255,255,0.04)' }
                        },
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 10 } },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // ============================================================
        // 9. عرض الرسائل
        // ============================================================
        function showMsg(msg, type) {
            const el = document.getElementById('dashboardMsg');
            if (!el) return;
            el.textContent = msg;
            el.className = 'msg show ' + type;
            setTimeout(function() { el.className = 'msg'; }, 5000);
        }

        // ============================================================
        // 10. تحميل الصفحة
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            console.log('✅ لوحة التحكم - كل حرف من الإعدادات');
            console.log('👤 النقيب العام: ' + settings.presidentName);
            console.log('🎨 الألوان من الإعدادات مع دعم المظهر المحلي');
            console.log('📊 لوحة تحكم متطورة');
            console.log('📊 تم إضافة زر التقارير');
            console.log('🔗 زر البحث يودي إلى شاشة البحث (home.html)');
        });
    </script>
